<!-- IMTI Admin Common navi-bar -->
<style>
    #admin-topnav { align-items: stretch; border-bottom: 1px solid transparent; }
    #admin-topnav .topnav-logo-area { align-self: center; }
    #admin-topnav .topnav-menu { flex: 1; min-width: 20px; }
    #admin-topnav .topnav-btn.current {
        color: var(--gray-text);
        font-weight: 700;
        position: relative;
    }
    /* 일반 메뉴 current — # # # 표시 */
    #admin-topnav .topnav-btn.current::before {
        content: '# # #';
        position: absolute;
        top: -4px;
        left: 50%;
        transform: translateX(-50%) rotate(180deg);
        font-size: 0.65rem;
        color: var(--gray-text);
        line-height: 1;
    }
    /* 드롭다운 하위 메뉴 current — # # # 숨김 */
    .dropdown-menu .topnav-btn.current::before {
        display: none;
    }
    /* 드롭다운 부모 버튼 active (하위 페이지 선택됨) — # # # 표시 */
    .nav-dropdown.active > .topnav-btn {
        color: var(--gray-text);
        font-weight: 700;
        position: relative;
    }
    .nav-dropdown.active > .topnav-btn::before {
        content: '# # #';
        position: absolute;
        top: -4px;
        left: 50%;
        transform: translateX(-50%) rotate(180deg);
        font-size: 0.65rem;
        color: var(--gray-text);
        line-height: 1;
    }

    /* ── 드롭다운 ── */
    .nav-dropdown {
        position: relative;
        display: flex;
        align-items: center;
    }
    .nav-dropdown .dropdown-menu {
        display: none;
        position: absolute;
        top: 100%;
        left: 50%;
        transform: translateX(-50%);
        background: #fff;
        border: 1px solid #e9ecef;
        border-top: none;
        z-index: 200;
        min-width: 180px;
        flex-direction: column;
    }
    .nav-dropdown:hover .dropdown-menu,
    .nav-dropdown.open .dropdown-menu {
        display: flex;
    }
    .dropdown-menu .topnav-btn {
        height: 44px;
        width: 100%;
        justify-content: flex-start;
        padding: 0 20px;
        border-bottom: 1px solid #f1f3f5;
        font-size: 0.75rem;
    }
    .dropdown-menu .topnav-btn:last-child {
        border-bottom: none;
    }
    .dropdown-menu .topnav-btn:hover {
        background: #f8f9fa;
    }
    /* 드롭다운 부모 버튼 화살표 */
    .topnav-btn.has-dropdown::after {
        content: '▾';
        font-size: 0.65rem;
        margin-left: 4px;
        opacity: 0.5;
    }
</style>

<div class="popup-overlay" id="logout-popup">
    <div class="popup-box">
        <p class="popup-message">Would you like to log out as an administrator?</p>
        <div class="popup-btn-row">
            <button class="popup-cancel-btn" onclick="closeLogoutPopup()">Cancel</button>

        </div>
    </div>
</div>

<script>
    /* 드롭다운 토글 — 클릭 시 열고 외부 클릭 시 닫기 */
    function toggleDropdown(id) {
        const el = document.getElementById(id);
        const isOpen = el.classList.contains('open');
        document.querySelectorAll('.nav-dropdown.open').forEach(d => d.classList.remove('open'));
        if (!isOpen) el.classList.add('open');
    }

    document.addEventListener('click', function(e) {
        if (!e.target.closest('.nav-dropdown')) {
            document.querySelectorAll('.nav-dropdown.open').forEach(d => d.classList.remove('open'));
        }
    });

    /* 현재 페이지가 드롭다운 하위 메뉴이면 부모 .nav-dropdown 에 active 추가 */
    (function markActiveDropdown() {
        const cur = location.pathname.split('/').pop();
        document.querySelectorAll('.nav-dropdown').forEach(dropdown => {
            const matched = Array.from(dropdown.querySelectorAll('.dropdown-menu .topnav-btn[onclick]'))
                .some(btn => {
                    const m = btn.getAttribute('onclick').match(/location\.href='([^']+)'/);
                    return m && m[1] === cur;
                });
            if (matched) dropdown.classList.add('active');
        });
    })();
</script>
