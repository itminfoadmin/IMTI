<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IMTI - MTI Comment Management</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&family=Noto+Sans+KR:wght@400;500;700;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link href="https://googleapis.com/css2?family=Gowun+Batang:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="ad_common.css">
    <style>
        /* ── Main ── */
        .main { display: flex; flex-direction: column; margin: 24px; border: 1px dashed #fff; border-radius: 2px; padding: 36px; overflow-x: auto; }

        /* ── Status Message ── */
        .status-msg { font-family: 'Gowun Batang', serif; font-size: 0.85rem; color: var(--gray-mid); text-align: center; padding: 60px 0; }
        .status-msg.error { color: #e03131; }

        /* ── Exp Table ── */
        .member-table { width: 90%; margin: 0 auto; border-collapse: collapse; font-family: 'Gowun Batang', serif; font-size: 0.78rem; border: 1px dashed #ccc; }
        .member-table thead tr { border-bottom: 1px dashed #ccc; }
        .member-table th { font-weight: 700; letter-spacing: 0.04em; color: var(--gray-dark); padding: 10px 14px; text-align: center; white-space: nowrap; }
        .member-table tbody tr { border-bottom: 0px dashed #e9ecef; transition: background 0.15s; }
        .member-table tbody tr:hover { background: #f8f9fa; }
        .member-table td { padding: 10px 14px; text-align: center; color: var(--gray-text); white-space: nowrap; }
        .member-table td.align-left { text-align: left; max-width: 200px; overflow: hidden; text-overflow: ellipsis; }

        /* ── Table Buttons ── */
        .tbl-btn-wrap { display: flex; gap: 6px; justify-content: center; }
        .tbl-btn { display: inline-flex; align-items: center; background: #fff; border: 1.5px solid #adb5bd; border-radius: 20px; padding: 4px 14px; font-family: 'Gowun Batang', serif; font-size: 0.72rem; font-weight: 700; letter-spacing: 0.05em; color: var(--gray-text); cursor: pointer; transition: all 0.18s; white-space: nowrap; }
        .tbl-btn:hover { background: var(--gray-text); color: #fff; border-color: var(--gray-text); }
        .tbl-btn.del { color: #e03131; border-color: #e03131; }
        .tbl-btn.del:hover { background: #e03131; color: #fff; border-color: #e03131; }

        /* ── View Popup 내 상세 테이블 ── */
        .detail-table { width: 100%; border-collapse: collapse; font-family: 'Gowun Batang', serif; font-size: 0.8rem; margin-top: 8px; }
        .detail-table td { padding: 9px 14px; border-bottom: 1px solid #e9ecef; vertical-align: top; }
        .detail-table td:first-child { width: 120px; font-weight: 700; color: var(--gray-dark); white-space: nowrap; background: #f8f9fa; }
        .detail-table td:last-child { color: var(--gray-text); word-break: break-all; white-space: pre-wrap; line-height: 1.7; }

        /* ── View Popup ── */
        .view-popup-box {
            background: #fff;
            border-radius: 2px;
            border: 1px solid #ced4da;
            width: 92vw;
            max-width: 860px;
            max-height: 90vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 12px 48px rgba(0,0,0,0.14);
        }
        /* 모달 제목 바 */
        .view-popup-title {
            background: #343a40;
            padding: 13px 48px;
            display: flex;
            align-items: center;
            gap: 10px;
            flex-shrink: 0;
            position: relative;
        }
        .view-popup-title-text {
            font-family: 'Gowun Batang', serif;
            font-size: 0.78rem;
            font-weight: 700;
            letter-spacing: 0.14em;
            text-transform: uppercase;
            color: #adb5bd;
        }
        .view-popup-title-dot {
            width: 5px; height: 5px;
            border-radius: 50%;
            background: #adb5bd;
            flex-shrink: 0;
        }
        /* 작성자 / 작성일시 헤더 */
        .view-popup-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 48px 14px;
            border-bottom: 1px dashed #dee2e6;
            flex-shrink: 0;
        }
        .view-header-writer {
            font-family: 'Noto Sans KR', sans-serif;
            font-size: 0.88rem;
            font-weight: 700;
            color: #495057;
        }
        .view-header-date {
            font-family: 'Gowun Batang', serif;
            font-size: 0.80rem;
            font-weight: 500;
            color: #495057;
        }
        .view-header-lbl {
            color: #6c757d;
            font-weight: 700;
            margin-right: 4px;
        }
        /* 테이블 본문 */
        .view-popup-body {
            overflow-y: auto;
            flex: 1;
            padding: 20px 48px 16px;
        }
        .view-detail-table {
            width: 100%;
            border-collapse: collapse;
            font-family: 'Noto Sans KR', sans-serif;
            font-size: 0.84rem;
        }
        .view-detail-table tr:first-child td { border-top: 1.5px solid #adb5bd; }
        .view-detail-table tr:last-child  td { border-bottom: 1.5px solid #adb5bd; }
        .view-detail-table td {
            border: 1px solid #dee2e6;
            padding: 12px 24px;
            vertical-align: top;
            line-height: 1.8;
        }
        .view-detail-table td:first-child {
            width: 110px;
            font-weight: 700;
            font-size: 0.80rem;
            color: #495057;
            background: #f8f9fa;
            white-space: nowrap;
            text-align: center;
            vertical-align: middle;
            border-right: 1.5px solid #dee2e6;
        }
        .view-detail-table td:last-child {
            color: #343a40;
            word-break: break-word;
            white-space: pre-wrap;
        }
        /* 푸터 */
        .view-popup-footer {
            padding: 16px 48px 20px;
            display: flex;
            justify-content: center;
            border-top: 1px dashed #dee2e6;
            flex-shrink: 0;
        }
        /* 제목 바 우측 버튼 영역 */
        .view-title-right {
            margin-left: auto;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        /* 삭제 버튼 — 제목 바 안 */
        .view-delete-btn {
            background: transparent;
            border: 1px solid #adb5bd;
            border-radius: 12px;
            padding: 4px 14px;
            font-family: 'Gowun Batang', serif;
            font-size: 0.72rem;
            font-weight: 700;
            letter-spacing: 0.05em;
            color: #adb5bd;
            cursor: pointer;
            transition: all 0.15s;
        }
        .view-delete-btn:hover { background: #495057; border-color: #495057; color: #fff; }
        .view-delete-btn:disabled { opacity: 0.4; cursor: not-allowed; }
        /* X 닫기 버튼 */
        .view-x-btn {
            background: none;
            border: none;
            cursor: pointer;
            color: #868e96;
            font-size: 1.1rem;
            line-height: 1;
            padding: 4px 6px;
            transition: color 0.15s;
        }
        .view-x-btn:hover { color: #fff; }
        /* 삭제 결과 메시지 */
        .view-del-result {
            font-family: 'Gowun Batang', serif;
            font-size: 0.75rem;
            color: #e03131;
            text-align: center;
            padding: 4px 48px 0;
            min-height: 1em;
        }

        /* ── 삭제 확인 모달 (View 모달과 동일 톤) ── */
        .del-modal-box {
            background: #fff;
            border-radius: 2px;
            border: 1px solid #ced4da;
            width: 92vw;
            max-width: 480px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 12px 48px rgba(0,0,0,0.14);
            animation: popupIn 0.18s ease;
        }
        .del-modal-title {
            background: #343a40;
            padding: 13px 24px;
            display: flex;
            align-items: center;
            gap: 10px;
            flex-shrink: 0;
            position: relative;
        }
        .del-modal-body {
            padding: 28px 32px 20px;
            display: flex;
            flex-direction: column;
            gap: 18px;
        }
        .del-modal-msg {
            font-family: 'Gowun Batang', serif;
            font-size: 0.88rem;
            color: #343a40;
            line-height: 1.8;
            text-align: center;
        }
        .del-info-table {
            width: 100%;
            border-collapse: collapse;
            font-family: 'Gowun Batang', serif;
            font-size: 0.82rem;
        }
        .del-info-table td {
            padding: 9px 16px;
            border: 1px solid #dee2e6;
        }
        .del-info-table td:first-child {
            width: 80px;
            font-weight: 700;
            color: #495057;
            background: #f8f9fa;
            text-align: center;
        }
        .del-info-table td:last-child { color: #343a40; }
        .del-modal-footer {
            padding: 14px 32px 22px;
            display: flex;
            justify-content: center;
            gap: 12px;
            border-top: 1px dashed #dee2e6;
        }
        .del-cancel-btn {
            background: #fff;
            border: 1.5px solid #adb5bd;
            border-radius: 20px;
            padding: 8px 36px;
            font-family: 'Gowun Batang', serif;
            font-size: 0.80rem;
            font-weight: 700;
            letter-spacing: 0.06em;
            color: #6c757d;
            cursor: pointer;
            transition: all 0.2s;
        }
        .del-cancel-btn:hover  { background: #f1f3f5; border-color: #868e96; }
        .del-cancel-btn:focus  { outline: none; background: #f1f3f5; border-color: #495057; color: #343a40; }
        .del-confirm-btn {
            background: #343a40;
            border: 1.5px solid #343a40;
            border-radius: 20px;
            padding: 8px 36px;
            font-family: 'Gowun Batang', serif;
            font-size: 0.80rem;
            font-weight: 700;
            letter-spacing: 0.06em;
            color: #fff;
            cursor: pointer;
            transition: all 0.2s;
        }
        .del-confirm-btn:hover { background: #495057; border-color: #495057; }
        .del-confirm-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    </style>
</head>
<body>

<!-- ※ 네비바 + 로그아웃 팝업은 ad_common.js 가 자동 삽입합니다 -->

<!-- ── Main ── -->
<div class="page-body">
<div class="main">
    <div id="table-area">
        <p class="status-msg" id="loading-msg">Loading comment data...</p>
    </div>
</div>
</div>
<!-- ── Popup: View ── -->
<div class="popup-overlay" id="view-popup" onclick="outsideCloseView(event)">
    <div class="view-popup-box" onclick="event.stopPropagation()">
        <!-- 제목 바 -->
        <div class="view-popup-title">
            <span class="view-popup-title-dot"></span>
            <span class="view-popup-title-text">Experience Comment Detail</span>
            <div class="view-title-right">
                <button class="view-delete-btn" id="view-delete-btn" onclick="handleViewDelete()">Delete</button>
                <button class="view-x-btn" onclick="closeViewPopup()">&#x2715;</button>
            </div>
        </div>
        <!-- 헤더: 작성자 / 작성일시 -->
        <div class="view-popup-header">
            <span class="view-header-writer"><span class="view-header-lbl">Writer :</span> <span id="view-writer"></span></span>
            <span class="view-header-date"><span class="view-header-lbl">Date/Time :</span> <span id="view-date"></span></span>
        </div>
        <!-- 상세 테이블 -->
        <div class="view-popup-body">

        <!-- 푸터: 결과 메시지 -->
        <div class="view-popup-footer" style="padding:8px 48px 14px;">
            <div id="view-del-result" class="view-del-result"></div>
        </div>

</div>

<!-- ── Popup: Delete 1단계 확인 ── -->
<div class="popup-overlay" id="del-popup" style="z-index:1100;">
    <div class="del-modal-box">
        <div class="del-modal-title">
            <span class="view-popup-title-dot"></span>
            <span class="view-popup-title-text">Delete Comment</span>
            <div class="view-title-right">
                <button class="view-x-btn" onclick="closeDelPopup()">&#x2715;</button>
            </div>
        </div>
        <div class="del-modal-body">
            <p class="del-modal-msg">Do you want delete the comment below?<br></p>
            <table class="del-info-table">
                <tr><td>No.</td>    <td id="del-target-no">-</td></tr>
                <tr><td>Writer</td> <td id="del-target-writer">-</td></tr>
                <tr><td>MTI</td>    <td id="del-target-mti">-</td></tr>
            </table>
        </div>
        <div class="del-modal-footer">
            <button class="del-cancel-btn" onclick="closeDelPopup()">Cancel</button>
            <button class="del-confirm-btn" onclick="openDelReconfirmPopup()">Confirm</button>
        </div>
    </div>
</div>

<!-- ── Popup: Delete 2단계 재확인 ── -->
<div class="popup-overlay" id="del-reconfirm-popup" style="z-index:1200;">
    <div class="del-modal-box">
        <div class="del-modal-title">
            <span class="view-popup-title-dot"></span>
            <span class="view-popup-title-text">Delete Comment — Final Confirm</span>
            <div class="view-title-right">
                <button class="view-x-btn" onclick="closeDelReconfirmPopup()">&#x2715;</button>
            </div>
        </div>
        <div class="del-modal-body">
            <p class="del-modal-msg">Do you want delete the comment really?<br></p>
            <div id="del-result" style="font-family:'Gowun Batang', serif;font-size:0.78rem;color:#e03131;min-height:1.1em;text-align:center;margin-top:4px;"></div>
        </div>
        <div class="del-modal-footer">
            <button class="del-cancel-btn" onclick="closeDelReconfirmPopup()">Cancel</button>
            <button class="del-confirm-btn" id="del-confirm-btn" onclick="handleDelete()">Delete</button>
        </div>
    </div>
</div>

<!-- ── Popup: Delete 완료 ── -->
<div class="popup-overlay" id="del-ok-popup" style="z-index:1300;">
    <div class="del-modal-box">
        <div class="del-modal-title">
            <span class="view-popup-title-dot"></span>
            <span class="view-popup-title-text">Delete Complete</span>
        </div>
        <div class="del-modal-body" style="align-items:center; padding:32px;">
            <p class="del-modal-msg">The comment has been deleted.<br></p>
        </div>
        <div class="del-modal-footer">
            <button class="del-confirm-btn" style="padding:8px 56px;" onclick="closeDelOkPopup()">확인 (Confirm)</button>
        </div>
    </div>
</div>

<!-- ── 공통 스크립트 ── -->
<script src="ad_common.js"></script>

<script>
    /* ── 페이지 초기화 등록 ── */
    window.__pageInit = function() { loadData(); };

    /* ── URL ── */
    const EXP_GAS_URL  = 'https://script.google.com/macros/s/AKfycbye_Tya-8ItxfkD3DLYysmXImC4FM-N7nb_clv3AWuM59Mb389oZ1E6bp9YCy_MxYRt/exec';
    const EXP_SHEET_ID = '1nF6oXqXkEvUHtokWDbcXYn-NOTbSL6W7_YQ7j2-W8gg';
    const EXP_CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRu8rnCQm2t9HzfDAgttuJkZGLOCtOK-Wj2Z82gAn4OpwMrghDhMdPey8O7sacx4jAerSVJhNJpc8pX/pub?gid=0&single=true&output=csv';

    function parseCSV(text) {
        var rows = [];
        var lines = text.split('\n');
        for (var i = 0; i < lines.length; i++) {
            var line = lines[i].replace(/\r$/, '');
            var cells = [], cur = '', inQ = false;
            for (var j = 0; j < line.length; j++) {
                var ch = line[j];
                if (ch === '"') { inQ = !inQ; }
                else if (ch === ',' && !inQ) { cells.push(cur.trim()); cur = ''; }
                else { cur += ch; }
            }
            cells.push(cur.trim());
            rows.push(cells);
        }
        return rows;
    }

    function fmtDate(raw) {
        if (!raw || raw.trim() === '' || raw.trim() === '-') return '-';
        var s = raw.trim().replace(/오전|오후/g, '').replace(/\./g, '-').replace(/\s+/g, ' ').trim();
        var d = new Date(s);
        if (isNaN(d.getTime())) return raw.trim();
        var pad = function(n) { return String(n).padStart(2, '0'); };
        return d.getFullYear() + '/' + pad(d.getMonth()+1) + '/' + pad(d.getDate())
             + ' ' + pad(d.getHours()) + ':' + pad(d.getMinutes()) + ':' + pad(d.getSeconds());
    }

    var expData     = [];
    var selectedRow = null;

    /* ── 데이터 로드 — fetch + redirect:follow ── */
    async function loadData() {
        var msgEl = document.getElementById('loading-msg');
        try {
            var url = EXP_GAS_URL + '?action=getAllExpSurvey&t=' + Date.now();
            var res = await fetch(url, { method: 'GET', redirect: 'follow', cache: 'no-cache' });
            var rows = await res.json();
            if (!Array.isArray(rows)) throw new Error('Response is not array: ' + JSON.stringify(rows));
            expData = rows.map(function(r, i) {
                return {
                    no:           i + 1,
                    timestamp:    r.timestamp    || '-',
                    mtiId:        r.mti_id       || '-',
                    userId:       r.user_ID      || '-',
                    subContents:  r.sub_contents || '-',
                    participants: r.participants  || '-',
                    advantage:    r.advantage     || '-',
                    disadvantage: r.disadvantage  || '-',
                    etc:          r.etc           || '-',
                    rowIndex:     i + 2,   // 하위 호환 유지
                    sheetRow:     i + 2    // 삭제에 사용할 불변 시트 행 번호 — 절대 재계산 금지
                };
            });
            console.log('[DEBUG] expData.length:', expData.length);
            renderTable();
        } catch(e) {
            console.error('[loadData error]', e);
            if (msgEl) { msgEl.textContent = 'Failed to load data. (' + e.message + ')'; msgEl.classList.add('error'); }
        }
    }

    /* ── 테이블 렌더링 ── */
    function renderTable() {
        var area = document.getElementById('table-area');
        if (!expData.length) {
            area.innerHTML = '<p class="status-msg">No comment data found.</p>';
            return;
        }
        var rows = '';
        expData.forEach(function(m, idx) {
            var content = m.subContents || '-';
            rows += '<tr>'
                + '<td>' + String(m.no).padStart(3, '0') + '</td>'
                + '<td>' + (m.timestamp || '-') + '</td>'
                + '<td>' + (m.mtiId     || '-') + '</td>'
                + '<td>' + ((m.participants || '-').length > 20 ? (m.participants || '-').slice(0, 20) + '…' : (m.participants || '-')) + '</td>'
                + '<td class="align-center">' + (content.length > 40 ? content.slice(0, 40) + '…' : content) + '</td>'
                + '<td>' + (m.userId    || '-') + '</td>'
                + '<td><div class="tbl-btn-wrap">'
                +   '<button class="tbl-btn" onclick="openViewPopup(' + idx + ')">View</button>'
                + '</div></td>'
                + '</tr>';
        });
        area.innerHTML = '<table class="member-table" style="table-layout:fixed;width:90%;">'
            + '<colgroup>'
            + '<col style="width:7%"><col style="width:18%"><col style="width:18%">'
            + '<col style="width:14%"><col style="width:21%"><col style="width:14%"><col style="width:8%">'
            + '</colgroup>'
            + '<thead><tr>'
            + '<th>No.</th><th>Date/Time</th><th>MTI-ID</th><th>Participants</th>'
            + '<th>Content</th><th>Writer</th><th>View</th>'
            + '</tr></thead>'
            + '<tbody>' + rows + '</tbody>'
            + '</table>'
            + '<p style="text-align:right; font-family:\'Gowun Batang\',serif; font-size:0.72rem; color:#adb5bd; letter-spacing:0.08em; margin-top:10px; padding-right:5%;">— End of List —</p>';
    }

    /* ── View Popup ── */
    function openViewPopup(idx) {
        selectedRow = expData[idx];
        var m = selectedRow;

        /* 헤더: 작성자 / 작성일 (timestamp 앞 날짜 부분만 추출) */
        document.getElementById('view-writer').textContent = m.userId || '-';
        document.getElementById('view-date').textContent = m.timestamp || '-';

        /* 상세 테이블: 작성자·날짜 제외한 항목들 */
        var fields = [
            ['수업 모형',   m.mtiId        || '-'],
            ['수업 대상',   m.participants || '-'],
            ['수업 내용',   m.subContents  || '-'],
            ['좋았던 점',   m.advantage    || '-'],
            ['문 제 점',    m.disadvantage || '-'],
            ['기타/조언',   m.etc          || '-']
        ];
        var html = fields.map(function(f) {
            return '<tr><td>' + f[0] + '</td><td>' + (f[1] || '-') + '</td></tr>';
        }).join('');
        document.getElementById('view-detail-table').innerHTML = html;
        document.getElementById('view-popup').classList.add('active');
    }
    function closeViewPopup() {
        document.getElementById('view-popup').classList.remove('active');
        var r = document.getElementById('view-del-result');
        if (r) { r.textContent = ''; }
        var b = document.getElementById('view-delete-btn');
        if (b) { b.disabled = false; b.textContent = '삭제 (Delete)'; }
        selectedRow = null;
    }
    function outsideCloseView(e) { if (e.target === document.getElementById('view-popup')) closeViewPopup(); }

    /* ── Delete Popup ── */
    function openDelPopup(idx) {
        selectedRow = expData[idx];
        document.getElementById('del-target-no').textContent     = String(selectedRow.no).padStart(3, '0');
        document.getElementById('del-target-writer').textContent = selectedRow.userId || '-';
        document.getElementById('del-target-mti').textContent    = selectedRow.mtiId  || '-';
        document.getElementById('del-popup').classList.add('active');
        setTimeout(function() {
            var cb = document.querySelector('#del-popup .del-cancel-btn');
            if (cb) cb.focus();
        }, 50);
    }
    function closeDelPopup() {
        document.getElementById('del-popup').classList.remove('active');
        // View 모달이 열려 있는 경우(View → Delete 경로)에는 selectedRow를 유지
        if (!document.getElementById('view-popup').classList.contains('active')) {
            selectedRow = null;
        }
    }

    function openDelReconfirmPopup() {
        document.getElementById('del-popup').classList.remove('active');
        document.getElementById('del-result').textContent = '';
        document.getElementById('del-result').className   = 'popup-result';
        var btn = document.getElementById('del-confirm-btn');
        btn.disabled = false; btn.textContent = 'Confirm';
        document.getElementById('del-reconfirm-popup').classList.add('active');
        setTimeout(function() {
            var cb = document.querySelector('#del-reconfirm-popup .del-cancel-btn');
            if (cb) cb.focus();
        }, 50);
    }
    function closeDelReconfirmPopup() { document.getElementById('del-reconfirm-popup').classList.remove('active'); selectedRow = null; }
    function closeDelOkPopup()        { document.getElementById('del-ok-popup').classList.remove('active'); }

    /* ── Delete 처리 (GAS deleteExpComment 액션 호출) ── */
    function gasJsonpCall(url, params) {
        return new Promise(function(resolve, reject) {
            var cbName = 'mgcb_' + Date.now() + '_' + Math.floor(Math.random() * 1e6);
            var timer  = setTimeout(function() { cleanup(); reject(new Error('Timeout')); }, 15000);
            function cleanup() {
                delete window[cbName];
                var el = document.getElementById('s_' + cbName);
                if (el) el.remove();
            }
            window[cbName] = function(data) { clearTimeout(timer); cleanup(); resolve(data); };
            var merged = Object.assign({}, params, { callback: cbName });
            var qsParts = [];
            for (var k in merged) {
                if (merged.hasOwnProperty(k)) qsParts.push(encodeURIComponent(k) + '=' + encodeURIComponent(merged[k]));
            }
            var qs = qsParts.join('&');
            var script = document.createElement('script');
            script.id  = 's_' + cbName;
            script.src = url + '?' + qs;
            script.onerror = function() { clearTimeout(timer); cleanup(); reject(new Error('Load error')); };
            document.head.appendChild(script);
        });
    }



    /* ── View 모달 내 삭제 버튼 → 1단계 확인 모달 열기 ── */
    function handleViewDelete() {
        if (!selectedRow) return;
        /* 기존 del-popup 재활용 — 정보 채우고 열기 */
        document.getElementById('del-target-no').textContent     = String(selectedRow.no).padStart(3, '0');
        document.getElementById('del-target-writer').textContent = selectedRow.userId || '-';
        document.getElementById('del-target-mti').textContent    = selectedRow.mtiId  || '-';
        document.getElementById('del-result').textContent = '';
        document.getElementById('del-result').className   = 'popup-result';
        var btn = document.getElementById('del-confirm-btn');
        btn.disabled = false; btn.textContent = '삭제 (Delete)';
        document.getElementById('del-popup').classList.add('active');
    }

    /* ── 실제 삭제 실행 — fetch 방식 ── */
    async function handleDelete() {
        var btn      = document.getElementById('del-confirm-btn');
        var resultEl = document.getElementById('del-result');
        btn.disabled = true; btn.textContent = '삭제 중...';
        resultEl.textContent = '';

        try {
            var url = EXP_GAS_URL + '?action=deleteExpComment&rowIndex=' + encodeURIComponent(selectedRow.sheetRow) + '&t=' + Date.now();
            var res = await fetch(url, { method: 'GET', redirect: 'follow', cache: 'no-cache' });
            var data = await res.json();
            if (data && data.status === 'OK') {
                var deletedSheetRow = selectedRow.sheetRow;
                expData = expData.filter(function(m) { return m.sheetRow !== deletedSheetRow; });
                expData.forEach(function(m, i) { m.no = i + 1; /* sheetRow는 변경하지 않음 */ });
                renderTable();
                closeDelReconfirmPopup();
                closeViewPopup();
                document.getElementById('del-ok-popup').classList.add('active');
            } else {
                resultEl.textContent = '삭제 실패: ' + ((data && data.error) || 'ERROR');
                resultEl.className   = 'popup-result err';
                btn.disabled = false; btn.textContent = '삭제 (Delete)';
            }
        } catch(e) {
            resultEl.textContent = '네트워크 오류. 다시 시도해주세요.';
            resultEl.className   = 'popup-result err';
            btn.disabled = false; btn.textContent = '삭제 (Delete)';
        }
    }
</script>
