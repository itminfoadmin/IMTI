<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>IMTI — 자료실 대화방</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Gowun+Batang:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{
    --gray-text:#343a40; --gray-dark:#495057; --gray-mid:#868e96;
    --accent:#e8590c;
    --term-bg:#101418; --term-fg:#c9d1cb; --term-dim:#5c6b62;
    --term-amber:#d8b14a; --term-cyan:#6fb7b0; --term-magenta:#c98ab5;
    --term-green:#7fb069; --term-line:#1d262b; --term-red:#c0573b;
}
*{box-sizing:border-box;}
html,body{height:100%;margin:0;padding:0;}
body{
    background:var(--term-bg);
    font-family:'DM Mono',monospace;
    color:var(--term-fg);
    font-size:92%;
    display:flex; flex-direction:column; height:100dvh; overflow:hidden;
    -webkit-font-smoothing:antialiased;
    -webkit-text-size-adjust:100%;
}
.shell{
    flex:1; min-height:0; display:flex; flex-direction:column;
    background:var(--term-bg); position:relative;
    /* composer fixed 전환으로 인한 하단 여백 */
    padding-bottom:56px;
}
.shell::after{
    content:""; position:absolute; inset:0; pointer-events:none; z-index:5;
    background:repeating-linear-gradient(to bottom, rgba(255,255,255,.018) 0 1px, transparent 1px 3px);
    mix-blend-mode:overlay;
}
.term{display:flex; flex-direction:column; flex:1; min-height:0;}

/* 상단 바 — 모바일 축약 */
.term-bar{
    display:flex; align-items:center; gap:8px;
    padding:8px 12px; background:#0a0d10; border-bottom:1px solid #1d262b;
    height:48px; font-size:.78rem; letter-spacing:.06em; color:var(--term-dim); flex:none;
    flex-wrap:nowrap; overflow:hidden;
}
.term-bar .leds{display:flex; gap:4px; flex-shrink:0;}
.term-bar .leds i{width:8px;height:8px;border-radius:50%;display:block;opacity:.85;}
.term-bar .leds i:nth-child(1){background:#c0573b;}
.term-bar .leds i:nth-child(2){background:#c8a23e;}
.term-bar .leds i:nth-child(3){background:#5f8d57;}
.term-bar .title-txt{flex:1; min-width:0; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; font-size:.72rem;}
.term-bar .conn{display:flex; align-items:center; gap:5px; color:var(--term-amber); opacity:.85; flex-shrink:0;}
.term-bar .conn .ind{width:6px;height:6px;border-radius:50%;background:var(--term-dim);}
.term-bar .conn.on .ind{background:var(--term-green);}
.term-bar .conn.err .ind{background:var(--term-red);}

/* 폰트 크기 조절 — 모바일 간소화 */
.bar-ctrl{display:flex;align-items:center;gap:4px;flex-shrink:0;}
.bar-ctrl-group{display:flex;align-items:center;gap:3px;padding:3px 6px;border:1px solid #2b3640;border-radius:5px;background:#0d1115;}
.bar-ctrl-group label{font-size:.62rem;color:#4a5a52;letter-spacing:.05em;white-space:nowrap;}
.bar-btn{background:none;border:1px solid #2b3640;border-radius:3px;color:#8a9e94;font-family:'DM Mono',monospace;font-size:.78rem;width:22px;height:22px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0;}
.bar-btn:hover{border-color:var(--term-cyan);color:var(--term-cyan);background:#0f1e1d;}
.bar-val{font-size:.68rem;color:#8a9e94;min-width:30px;text-align:center;}

/* 채팅 로그 */
.log{
    flex:1; min-height:0; overflow-y:auto; padding:12px 12px 8px;
    font-size:inherit; line-height:1.7; color:var(--term-fg);
    scrollbar-width:thin; scrollbar-color:#2b3640 transparent;
    -webkit-overflow-scrolling:touch;
}
.log::-webkit-scrollbar{width:4px;}
.log::-webkit-scrollbar-thumb{background:#2b3640;}
.log .line{margin:1px 0; display:flex; align-items:baseline;}
.log .line .prefix{white-space:nowrap; flex-shrink:0;}
.log .line .body{word-break:break-word; white-space:pre-wrap; min-width:0; flex:1;}
.log .line .sys{word-break:break-word; white-space:pre-wrap; flex:1;}
.log .ts{color:var(--term-dim); margin-right:5px; font-size:.8em;}
.log .nick{font-weight:500;}
.log .arrow{color:var(--term-dim); margin:0 3px;}
.log .body.sys{color:var(--term-amber); letter-spacing:.02em;}
.log .sys-label{color:var(--term-amber);}
.log .me .nick{color:var(--term-cyan);}
.log .body{color:var(--term-fg);}
.log .whisper{color:var(--term-magenta);}
.log .whisper::after{content:" (귓속말)"; color:var(--term-dim); font-size:.7em;}

/* 접속자 사이드바 — 모바일에서 숨김 */
.side{display:none}

/* 입력창 — visualViewport 키보드 대응 */
.composer{
    position:fixed; left:0; right:0; bottom:0;
    display:flex; align-items:center; gap:8px;
    padding:0 12px; height:56px; background:#0a0d10; border-top:1px solid #000;
    z-index:10;
    padding-bottom:env(safe-area-inset-bottom);
}
.composer .ps1{color:var(--term-green); font-size:inherit; user-select:none; flex:none;}
#msg{
    flex:1; background:none; border:none; outline:none;
    font-family:'DM Mono',monospace; font-size:inherit;
    color:var(--term-fg); padding:0; caret-color:var(--term-green);
}
#msg::placeholder{color:var(--term-dim); font-size:.85em;}
#msg:disabled{opacity:.5;}
.cursor{display:inline-block;width:8px;animation:blink 1.05s steps(1) infinite;}
@keyframes blink{50%{opacity:0;}}

/* 게이트 (입장 팝업) */
.gate{
    position:fixed; inset:0; z-index:50;
    background:rgba(16,20,24,.88); backdrop-filter:blur(7px);
    display:flex; align-items:center; justify-content:center; padding:16px;
}
.gate-box{
    background:#fff; border-radius:14px; width:100%; max-width:420px;
    box-shadow:0 30px 80px rgba(0,0,0,.4); overflow:hidden;
}
.gate-top{background:var(--term-bg); padding:18px 20px 16px; font-family:'DM Mono',monospace; color:var(--term-fg);}
.gate-top .ln{font-size:.72rem; line-height:1.85; color:var(--term-dim); word-break:keep-all;}
.gate-top .ln b{color:var(--term-green); font-weight:500;}
.gate-top .ln .amber{color:var(--term-amber);}
.gate-body{padding:18px 20px 22px;}
.gate-body label{display:block; font-family:'Gowun Batang',serif; font-weight:700; font-size:.88rem; color:var(--gray-dark); margin-bottom:8px; letter-spacing:.04em;}
.gate-body input{
    width:100%; border:none; outline:none; border-bottom:1px solid #ced4da;
    font-family:'DM Mono',monospace; font-size:.9rem; color:var(--gray-text);
    padding:7px 2px; transition:border-color .2s; background:none;
}
.gate-body input:focus{border-bottom-color:var(--accent);}
.gate-body .row{display:flex; justify-content:flex-end; gap:8px; margin-top:20px; flex-wrap:wrap;}
.gate-err{font-family:'DM Mono',monospace; font-size:.82rem; color:#e03131; min-height:1em; margin-top:8px;}
.pill{
    background:#fff; border:1.5px solid var(--gray-text); border-radius:20px;
    padding:7px 20px; font-family:'Gowun Batang',serif; font-weight:700;
    font-size:.88rem; letter-spacing:.06em; color:var(--gray-text);
    cursor:pointer; transition:all .18s;
}
.pill:hover{background:var(--gray-text); color:#fff;}
.pill:disabled{opacity:.5; cursor:not-allowed;}

/* ── 파일 전송 모달 ── */
.ft-modal{
    position:fixed; inset:0; z-index:200;
    background:rgba(16,20,24,.92); backdrop-filter:blur(8px);
    display:none; align-items:flex-end; justify-content:center;
    padding:0;
}
.ft-modal.open{ display:flex; }
.ft-box{
    background:#0d1115; border:1px solid #2b3640; border-radius:14px 14px 0 0;
    width:100%; max-width:100%; overflow:hidden;
    box-shadow:0 -8px 40px rgba(0,0,0,.6);
    font-family:'DM Mono',monospace;
}
.ft-head{
    background:#070a0c; padding:14px 18px;
    border-bottom:1px solid #1d262b;
    display:flex; align-items:center; gap:8px;
}
.ft-head .ft-icon{ font-size:1rem; }
.ft-head .ft-title{ color:var(--term-amber); letter-spacing:.08em; font-size:.85rem; }
.ft-head .ft-sub{ color:var(--term-dim); font-size:.72rem; margin-left:auto; }
.ft-body{ padding:18px 18px 22px; }

.ft-drop{
    border:1.5px dashed #2b3640; border-radius:10px;
    padding:24px 16px; text-align:center; cursor:pointer;
    transition:border-color .2s, background .2s;
    color:var(--term-dim); font-size:.82rem; line-height:2;
}
.ft-drop:hover, .ft-drop.over{ border-color:var(--term-cyan); background:rgba(111,183,176,.05); color:var(--term-cyan); }
.ft-drop .ft-drop-icon{ font-size:1.6rem; display:block; margin-bottom:6px; }
.ft-selected{
    display:none; background:#0a0d10; border:1px solid #2b3640;
    border-radius:8px; padding:10px 14px; margin-top:12px;
    font-size:.78rem; color:var(--term-fg);
}
.ft-selected.show{ display:block; }
.ft-selected .ft-fname{ color:var(--term-cyan); word-break:break-all; }
.ft-selected .ft-fsize{ color:var(--term-dim); font-size:.72rem; margin-top:2px; }

.ft-target-wrap{ margin-top:12px; }
.ft-target-wrap label{ display:block; color:var(--term-dim); font-size:.72rem; letter-spacing:.08em; margin-bottom:6px; }
.ft-target-list{ display:flex; flex-wrap:wrap; gap:6px; }
.ft-target-btn{
    background:#0a0d10; border:1px solid #2b3640; border-radius:6px;
    color:var(--term-fg); font-family:'DM Mono',monospace; font-size:.78rem;
    padding:5px 12px; cursor:pointer; transition:all .15s;
}
.ft-target-btn:hover{ border-color:var(--term-cyan); color:var(--term-cyan); }
.ft-target-btn.sel{ border-color:var(--term-cyan); background:rgba(111,183,176,.12); color:var(--term-cyan); }
.ft-target-btn.all{ border-color:var(--term-amber); color:var(--term-amber); }
.ft-target-btn.all.sel{ background:rgba(216,177,74,.12); }

.ft-row{ display:flex; justify-content:flex-end; gap:8px; margin-top:16px; flex-wrap:wrap; }
.ft-btn{
    background:none; border:1.5px solid #2b3640; border-radius:20px;
    padding:7px 18px; font-family:'Gowun Batang',serif; font-weight:700;
    font-size:.85rem; letter-spacing:.05em; color:var(--term-fg);
    cursor:pointer; transition:all .18s;
}
.ft-btn:hover{ border-color:var(--term-fg); }
.ft-btn.primary{ border-color:var(--term-cyan); color:var(--term-cyan); }
.ft-btn.primary:hover{ background:var(--term-cyan); color:#0d1115; }
.ft-btn.danger{ border-color:var(--term-red); color:var(--term-red); }
.ft-btn.danger:hover{ background:var(--term-red); color:#fff; }
.ft-btn:disabled{ opacity:.4; cursor:not-allowed; }

.ft-prog-wrap{ margin-top:14px; display:none; }
.ft-prog-wrap.show{ display:block; }
.ft-prog-label{ font-size:.72rem; color:var(--term-dim); margin-bottom:5px; display:flex; justify-content:space-between; }
.ft-prog-bar{ height:4px; background:#1d262b; border-radius:3px; overflow:hidden; }
.ft-prog-fill{ height:100%; background:var(--term-cyan); border-radius:3px; width:0%; transition:width .15s; }
.ft-prog-fill.done{ background:var(--term-green); }
.ft-prog-fill.err{ background:var(--term-red); }

.ft-recv-info{ background:#070a0c; border:1px solid #1d262b; border-radius:8px; padding:12px 14px; margin-bottom:6px; }
.ft-recv-info .ft-rname{ color:var(--term-cyan); font-size:.88rem; word-break:break-all; }
.ft-recv-info .ft-rmeta{ color:var(--term-dim); font-size:.72rem; margin-top:3px; }
.ft-recv-from{ color:var(--term-amber); font-size:.78rem; margin-bottom:12px; }

/* 나가기 확인 모달 */
#leave-modal{
    display:none;position:fixed;inset:0;z-index:9999;
    background:rgba(16,20,24,.88);backdrop-filter:blur(6px);
    align-items:flex-end;justify-content:center;padding:0;
}
#leave-modal-box{
    background:#fff;border-radius:14px 14px 0 0;width:100%;overflow:hidden;
    box-shadow:0 -8px 40px rgba(0,0,0,.6);
}
</style>
</head>
<body>

<div class="shell">
    <div class="term">
        <div class="term-bar">
            <span class="leds"><i></i><i></i><i></i></span>
            <span class="title-txt">IMTI-BBS · 대화방 · <span id="userCount">0</span>명</span>
            <!-- 폰트 크기만 유지 -->
            <div class="bar-ctrl">
                <div class="bar-ctrl-group">
                    <label>SIZE</label>
                    <button class="bar-btn" onclick="adjustFontSize(-5)">−</button>
                    <span class="bar-val" id="font-size-display">100%</span>
                    <button class="bar-btn" onclick="adjustFontSize(5)">＋</button>
                </div>
            </div>
            <span class="conn" id="conn"><span class="ind"></span><span id="connTxt">연결대기</span></span>
        </div>
        <div class="log" id="log"></div>
    </div>
</div>

<div class="composer">
    <span class="ps1" id="ps1">guest&gt;</span>
    <input id="msg" type="text" maxlength="300" autocomplete="off"
           placeholder="입력 후 엔터 (전송: Enter · 명령: /누구 /파일 /나가기)" disabled>
    <button onclick="leaveRoom()" style="flex:none;background:none;border:1px solid #2b3640;border-radius:6px;color:#5c6b62;font-family:'DM Mono',monospace;font-size:.72rem;padding:5px 8px;cursor:pointer;white-space:nowrap;transition:all .15s;" onmouseover="this.style.borderColor='#c0573b';this.style.color='#c0573b'" onmouseout="this.style.borderColor='#2b3640';this.style.color='#5c6b62'">나가기</button>
</div>

<div class="gate" id="gate">
    <div class="gate-box">
        <div class="gate-top">
            <div class="ln">IMTI BBS에 연결되었습니다 ......... <b>OK</b></div>
            <div class="ln">사용자 인증 <span class="amber">[자유대화방]</span></div>
            <div class="ln" id="gate-hint">대화명을 확인하십시오.<span class="cursor">_</span></div>
        </div>
        <div class="gate-body">
            <label for="nick">대화명</label>
            <input id="nick" type="text" maxlength="12" autocomplete="off"
                   placeholder="예) 모뎀소년" onkeydown="if(event.key==='Enter')enterRoom()">
            <div class="gate-err" id="gateErr"></div>
            <div class="row" id="gate-btns">
                <button class="pill" id="editBtn" onclick="enableEdit()" style="display:none">수정</button>
                <button class="pill" id="enterBtn" onclick="enterRoom()">접속</button>
                <button class="pill" onclick="closeTab()" style="border-color:#c0573b;color:#c0573b;" onmouseover="this.style.background='#c0573b';this.style.color='#fff'" onmouseout="this.style.background='#fff';this.style.color='#c0573b'">나가기</button>
            </div>
        </div>
    </div>
</div>

<!-- ── 파일 전송 모달 (발신자) ── -->
<div class="ft-modal" id="ft-send-modal">
    <div class="ft-box">
        <div class="ft-head">
            <span class="ft-icon">📤</span>
            <span class="ft-title">FILE TRANSFER</span>
            <span class="ft-sub" id="fts-status">파일 선택 후 대상을 지정하세요</span>
        </div>
        <div class="ft-body">
            <div class="ft-drop" id="ft-drop" onclick="document.getElementById('ft-file-input').click()">
                <span class="ft-drop-icon">⬡</span>
                탭하여 파일 선택
                <br><span style="font-size:.68rem;color:var(--term-dim)">최대 500MB · 모든 파일 형식</span>
            </div>
            <input type="file" id="ft-file-input" style="display:none" onchange="ftFileSelected(this.files[0])">
            <div class="ft-selected" id="ft-selected">
                <div class="ft-fname" id="ft-fname"></div>
                <div class="ft-fsize" id="ft-fsize"></div>
            </div>
            <div class="ft-target-wrap" id="ft-target-wrap" style="display:none">
                <label>▸ 전송 대상</label>
                <div class="ft-target-list" id="ft-target-list"></div>
            </div>
            <div class="ft-prog-wrap" id="fts-prog-wrap">
                <div class="ft-prog-label"><span id="fts-prog-txt">전송 중…</span><span id="fts-prog-pct">0%</span></div>
                <div class="ft-prog-bar"><div class="ft-prog-fill" id="fts-prog-fill"></div></div>
            </div>
            <div class="ft-row">
                <button class="ft-btn" onclick="closeFtSend()">닫기</button>
                <button class="ft-btn" id="fts-resend-btn" onclick="ftResend()" style="display:none;border-color:var(--term-amber);color:var(--term-amber)">재전송</button>
                <button class="ft-btn primary" id="fts-send-btn" onclick="ftStartSend()" disabled>전송</button>
            </div>
        </div>
    </div>
</div>

<!-- ── 파일 수신 모달 (수신자) ── -->
<div class="ft-modal" id="ft-recv-modal">
    <div class="ft-box">
        <div class="ft-head">
            <span class="ft-icon">📥</span>
            <span class="ft-title">FILE INCOMING</span>
            <span class="ft-sub" id="ftr-status">수신 대기</span>
        </div>
        <div class="ft-body">
            <div class="ft-recv-from" id="ftr-from"></div>
            <div class="ft-recv-info">
                <div class="ft-rname" id="ftr-fname"></div>
                <div class="ft-rmeta" id="ftr-fmeta"></div>
            </div>
            <div class="ft-prog-wrap" id="ftr-prog-wrap">
                <div class="ft-prog-label"><span id="ftr-prog-txt">수신 중…</span><span id="ftr-prog-pct">0%</span></div>
                <div class="ft-prog-bar"><div class="ft-prog-fill" id="ftr-prog-fill"></div></div>
            </div>
            <div class="ft-row" id="ftr-btns">
                <button class="ft-btn danger" onclick="ftReject()">거절</button>
                <button class="ft-btn primary" onclick="ftAccept()">수락</button>
            </div>
        </div>
    </div>
</div>

<!-- ── 나가기 확인 모달 ── -->
<div id="leave-modal" style="display:none;position:fixed;inset:0;z-index:9999;background:rgba(16,20,24,.88);backdrop-filter:blur(6px);align-items:flex-end;justify-content:center;">
    <div id="leave-modal-box" style="background:#fff;border-radius:14px 14px 0 0;width:100%;overflow:hidden;box-shadow:0 -8px 40px rgba(0,0,0,.6);">
        <div style="background:#101418;padding:18px 20px;font-family:'DM Mono',monospace;line-height:1.8;">
            <div style="color:#5c6b62;font-size:.78rem;">※ 대화방 퇴장 확인</div>
            <div style="color:#d8b14a;font-size:.88rem;margin-top:4px;">정말 대화방을 나가시겠습니까?</div>
        </div>
        <div style="padding:16px 20px 22px;display:flex;justify-content:flex-end;gap:8px;background:#f8f9fa;flex-wrap:wrap;">
            <button onclick="closeLeaveModal()" style="background:#fff;border:1.5px solid #495057;border-radius:20px;padding:7px 20px;font-family:'Gowun Batang',serif;font-weight:700;font-size:.88rem;letter-spacing:.06em;color:#495057;cursor:pointer;">취소</button>
            <button id="leave-confirm-btn" onclick="doLeave()" style="background:#343a40;border:1.5px solid #343a40;border-radius:20px;padding:7px 20px;font-family:'Gowun Batang',serif;font-weight:700;font-size:.88rem;letter-spacing:.06em;color:#fff;cursor:pointer;">나가기</button>
        </div>
    </div>
</div>

<script>
/* ═══════════════════════════════════════════════════════════════
   IMTI BBS 자유대화방 — 모바일 버전 (WebRTC P2P Mesh + GAS 폴백)
   ═══════════════════════════════════════════════════════════════ */

/* ===== 1) 설정 ===== */
var CHAT_URL   = 'https://script.google.com/macros/s/AKfycbxvzqBreeGNXXlqz-g7pI7qKeo_tel0j7PVYQYA_qeXDWZiR3TLkRcDIYmiEISmNm39/exec';
var ROOM       = 'room-07';
var POLL_MS    = 1000;
var PRESENCE_MS= 40000;

var ICE_SERVERS = [
    { urls: 'stun:stun.l.google.com:19302' },
    { urls: 'stun:stun1.l.google.com:19302' }
];

/* ===== 2) 상태 변수 ===== */
var me       = { id: 'u'+Math.random().toString(36).slice(2,8)+Date.now().toString(36).slice(-4), nick: null };
var sinceTs  = 0;
var presence = {};
var peers    = {};
var pollTimer = null, presenceBeat = null;
var seen     = {};
var polling  = false;

/* ===== 3) DOM 참조 ===== */
var logEl    = document.getElementById('log');
var usersEl  = null; // 모바일에서 side panel 없음
var msgEl    = document.getElementById('msg');
var connEl   = document.getElementById('conn');
var connTxt  = document.getElementById('connTxt');

/* ===== 4) UI 유틸 ===== */
var BASE_FONT = 92;
var currentFontPct = 100;
function adjustFontSize(delta){
    currentFontPct = Math.min(200, Math.max(60, currentFontPct + delta));
    document.body.style.fontSize = (BASE_FONT * currentFontPct / 100) + '%';
    document.getElementById('font-size-display').textContent = Math.round(currentFontPct) + '%';
}
function now(){ var d=new Date(); function p(n){return String(n).padStart(2,'0');} return p(d.getHours())+':'+p(d.getMinutes())+':'+p(d.getSeconds()); }
function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function colorFor(nick){ var c=['#7fb069','#d8b14a','#c98ab5','#6fb7b0','#cf8e6d','#9aa7d6']; var h=0; for(var i=0;i<nick.length;i++) h=(h*31+nick.charCodeAt(i))>>>0; return c[h%c.length]; }

function addLine(html, cls){ var div=document.createElement('div'); div.className='line'+(cls?' '+cls:''); div.innerHTML=html; logEl.appendChild(div); logEl.scrollTop=logEl.scrollHeight; }
function sysLine(t){ addLine('<span class="prefix"><span class="ts">['+now()+']</span><span class="sys-label">※ </span></span><span class="body sys">'+esc(t)+'</span>'); }
function chatLine(nick, text, mine, whisper){
    var col = colorFor(nick);
    addLine(
        '<span class="prefix"><span class="ts">['+now()+']</span>'+
        '<span class="nick" style="color:'+(mine?'var(--term-cyan)':col)+'">'+esc(nick)+'</span>'+
        '<span class="arrow">&gt;</span></span>'+
        '<span class="body'+(whisper?' whisper':'')+'">'+esc(text)+'</span>',
        mine?'me':'');
}

function p2pCount(){
    var n=0; for(var uid in peers){ if(peers[uid].connected) n++; } return n;
}
function updateConnLabel(){
    var n     = p2pCount();
    var total = Object.keys(presence).length;
    if(n > 0){
        connEl.className = 'conn on';
        connTxt.textContent = 'P2P '+n+'/'+total;
    } else if(total > 0){
        connEl.className = 'conn on';
        connTxt.textContent = '연결됨';
    } else {
        connEl.className = 'conn on';
        connTxt.textContent = '연결됨';
    }
}
function setConn(state){
    if(state==='err'){ connEl.className='conn err'; connTxt.textContent='재연결중'; }
    else if(state==='on'){ updateConnLabel(); }
    else { connEl.className='conn'; connTxt.textContent='연결대기'; }
}

/* ===== 5) GAS 통신 레이어 (JSONP) ===== */
function gasJsonp(params, cbName){
    return new Promise(function(resolve, reject){
        if(CHAT_URL.indexOf('PASTE_YOUR')===0){ reject(new Error('CHAT_URL 미설정')); return; }
        var cb  = cbName + Math.random().toString(36).slice(2,8);
        var url = CHAT_URL + '?callback=' + cb;
        for(var k in params){ if(params[k]!=null) url += '&'+k+'='+encodeURIComponent(params[k]); }
        var s    = document.createElement('script');
        var done = false;
        window[cb] = function(res){ done=true; cleanup(); resolve(res); };
        function cleanup(){ try{delete window[cb];}catch(e){window[cb]=undefined;} if(s.parentNode) s.parentNode.removeChild(s); }
        s.onerror = function(){ if(!done){ cleanup(); reject(new Error('network')); } };
        s.src = url;
        document.head.appendChild(s);
        setTimeout(function(){ if(!done){ cleanup(); reject(new Error('timeout')); } }, 12000);
    });
}
function sendToServer(type, text, target){
    return gasJsonp({
        action:'send', room:ROOM, uid:me.id, nick:me.nick||'',
        type:type, text:text||'', target:target||''
    }, 'scb').catch(function(){ setConn('err'); });
}

/* ===== 6) WebRTC — Peer 관리 ===== */
function createPeer(uid, initiator){
    if(peers[uid]) return peers[uid];
    var pc = new RTCPeerConnection({ iceServers: ICE_SERVERS });
    var peer = { pc: pc, dc: null, connected: false, uid: uid };
    peers[uid] = peer;

    pc.onicecandidate = function(e){
        if(e.candidate){
            sendToServer('signal', JSON.stringify({ type:'candidate', candidate: e.candidate }), uid);
        }
    };

    pc.onconnectionstatechange = function(){
        var s = pc.connectionState;
        if(s === 'connected'){
            peer.connected = true;
            updateConnLabel();
        } else if(s === 'failed' || s === 'disconnected' || s === 'closed'){
            peer.connected = false;
            updateConnLabel();
            delete peers[uid];
        }
    };

    pc.ondatachannel = function(e){
        peer.dc = e.channel;
        setupDataChannel(peer);
    };

    if(initiator){
        var dc = pc.createDataChannel('chat');
        peer.dc = dc;
        setupDataChannel(peer);
        pc.createOffer().then(function(offer){
            return pc.setLocalDescription(offer);
        }).then(function(){
            sendToServer('signal', JSON.stringify({ type:'offer', sdp: pc.localDescription }), uid);
        }).catch(function(err){ console.warn('offer failed', err); });
    }

    return peer;
}

function setupDataChannel(peer){
    peer.dc.onopen = function(){
        peer.connected = true;
        updateConnLabel();
        var nick = presence[peer.uid] ? presence[peer.uid].nick : peer.uid;
        sysLine('[P2P] ' + nick + ' 님과 직접 연결되었습니다.');
    };
    peer.dc.onclose = function(){
        peer.connected = false;
        updateConnLabel();
    };
    peer.dc.onmessage = function(e){
        var handled = ftHandleDcMessage(peer.uid, e);
        if(handled) return;
        try {
            var m = JSON.parse(e.data);
            renderChatMessage(m);
        } catch(err){ console.warn('dc parse error', err); }
    };
}

function handleSignal(m){
    var fromUid = m.uid;
    if(fromUid === me.id) return;
    var sig;
    try { sig = JSON.parse(m.text); } catch(e){ return; }

    if(sig.type === 'offer'){
        var peer = createPeer(fromUid, false);
        peer.pc.setRemoteDescription(new RTCSessionDescription(sig.sdp)).then(function(){
            return peer.pc.createAnswer();
        }).then(function(answer){
            return peer.pc.setLocalDescription(answer);
        }).then(function(){
            sendToServer('signal', JSON.stringify({ type:'answer', sdp: peer.pc.localDescription }), fromUid);
        }).catch(function(err){ console.warn('answer failed', err); });
    } else if(sig.type === 'answer'){
        var peer2 = peers[fromUid];
        if(peer2) peer2.pc.setRemoteDescription(new RTCSessionDescription(sig.sdp)).catch(function(e){ console.warn(e); });
    } else if(sig.type === 'candidate'){
        var peer3 = peers[fromUid];
        if(peer3) peer3.pc.addIceCandidate(new RTCIceCandidate(sig.candidate)).catch(function(e){ console.warn(e); });
    }
}

function connectToPeer(uid){
    if(uid === me.id) return;
    if(peers[uid])    return;
    createPeer(uid, true);
}

function broadcastP2P(payload){
    var sent = 0;
    for(var uid in peers){
        var p = peers[uid];
        if(p.connected && p.dc && p.dc.readyState === 'open'){
            try { p.dc.send(JSON.stringify(payload)); sent++; } catch(e){}
        }
    }
    return sent;
}

/* ===== 7) Presence 및 폴링 ===== */
function touchPresence(uid, nick){
    if(!uid || uid===me.id) return;
    presence[uid] = { nick: nick, last: Date.now() };
}
function dropPresence(uid){
    delete presence[uid];
    if(peers[uid]){
        try{ peers[uid].pc.close(); }catch(e){}
        delete peers[uid];
    }
    updateConnLabel();
}
function renderUsers(){
    var rows = [];
    if(me.nick) rows.push({ nick: me.nick+' (나)', tag:'ME' });
    var cutoff = Date.now() - PRESENCE_MS;
    for(var uid in presence){
        if(presence[uid].last < cutoff){ delete presence[uid]; continue; }
        rows.push({ nick: presence[uid].nick, tag:'' });
    }
    document.getElementById('userCount').textContent = rows.length;
}

function renderChatMessage(m){
    var key = (m.uid||'')+'|'+(m.ts||m._id||'')+'|'+(m.type||'')+'|'+(m.text||'').slice(0,40);
    if(seen[key]) return;
    seen[key] = true;
    var keys = Object.keys(seen);
    if(keys.length > 800){ for(var i=0;i<200;i++) delete seen[keys[i]]; }

    if(m.uid === me.id) return;
    if(m.type === 'msg')     chatLine(m.nick, m.text, false);
    else if(m.type === 'whisper' && m.target === me.nick) chatLine(m.nick, m.text, false, true);
}

function applyMessage(m){
    touchPresence(m.uid, m.nick);
    if(m.type === 'signal'){ handleSignal(m); return; }
    if(m.type === 'join'){
        sysLine("'"+m.nick+"' 님이 입장하셨습니다.");
        connectToPeer(m.uid);
        return;
    }
    if(m.type === 'beat'){ connectToPeer(m.uid); return; }
    if(m.type === 'leave'){
        dropPresence(m.uid);
        sysLine("'"+m.nick+"' 님이 나가셨습니다.");
        return;
    }
    renderChatMessage(m);
}

function poll(){
    if(polling) return;
    polling = true;
    gasJsonp({ action:'poll', room:ROOM, uid:me.id, since:sinceTs }, 'pcb').then(function(res){
        if(res && res.status==='OK'){
            setConn('on');
            if(res.messages && res.messages.length){
                res.messages.forEach(function(m){
                    if(m.ts > sinceTs) sinceTs = m.ts;
                    applyMessage(m);
                });
            }
            for(var uid in presence){ connectToPeer(uid); }
            renderUsers();
        } else { setConn('err'); }
    }).catch(function(){ setConn('err'); }).then(function(){ polling = false; });
}

/* ===== 8) 메시지 전송 ===== */
function sendMsg(){
    if(!me.nick) return;
    var raw = msgEl.value.trim(); if(!raw) return;
    msgEl.value = '';
    if(raw[0] === '/'){ handleCmd(raw); return; }

    chatLine(me.nick, raw, true);
    var msgId = me.id+'|'+Date.now();
    var payload = { uid:me.id, nick:me.nick, type:'msg', text:raw, _id:msgId };
    var p2pSent = broadcastP2P(payload);
    var totalPeers = Object.keys(presence).length;
    if(p2pSent < totalPeers || totalPeers === 0){
        sendToServer('msg', raw, '');
    }
}

function handleCmd(raw){
    var parts = raw.trim().slice(1).trim().split(/\s+/);
    var c     = parts.shift().toLowerCase().trim();
    if(c==='quit'||c==='exit'||c==='나가기'){ leaveRoom(); return; }
    if(c==='명단'||c==='who'||c==='누구'){
        var names = [me.nick+' (나)'];
        for(var uid in presence) names.push(presence[uid].nick+(peers[uid]&&peers[uid].connected?' [P2P]':''));
        sysLine('현재 접속자 ('+names.length+'명): '+names.join(', ')); return;
    }
    if(c==='귓'||c==='w'||c==='귓속말'){
        var target=parts.shift(); var text=parts.join(' ');
        if(!target||!text){ sysLine('사용법: /귓 닉네임 내용'); return; }
        addLine(
            '<span class="ts">['+now()+']</span>'+
            '<span class="nick" style="color:var(--term-cyan)">'+esc(me.nick)+'</span>'+
            '<span class="arrow">→</span><span class="nick">'+esc(target)+'</span>'+
            '<span class="body whisper">'+esc(text)+'</span>');
        sendToServer('whisper', text, target);
        return;
    }
    if(c==='p2p'||c==='연결'){
        var n = p2pCount();
        sysLine('P2P 직접 연결: '+n+'명 / 전체 접속자: '+(Object.keys(presence).length+1)+'명');
        return;
    }
    if(c==='파일'||c==='file'||c==='f'){
        openFtSend();
        return;
    }
    sysLine('알 수 없는 명령: /'+esc(c)+'  (가능: /귓 /누구 /p2p /파일 /나가기)');
}

/* ===== 9) 입장 / 퇴장 ===== */
function enterRoom(){
    var v   = document.getElementById('nick').value.trim();
    var err = document.getElementById('gateErr');
    if(CHAT_URL.indexOf('PASTE_YOUR')===0){ err.textContent='관리자: CHAT_URL을 먼저 설정하세요.'; return; }
    if(v.length<2){ err.textContent='대화명은 2자 이상 입력하십시오.'; return; }
    if(/[<>&]/.test(v)){ err.textContent='사용할 수 없는 문자가 포함되어 있습니다.'; return; }

    var btn = document.getElementById('enterBtn'); btn.disabled=true; btn.textContent='접속중…';
    me.nick = v;

    gasJsonp({ action:'ping' }, 'gcb').then(function(res){
        sinceTs = (res && res.now) ? res.now : Date.now();
    }).catch(function(){ sinceTs = Date.now(); }).then(function(){
        document.getElementById('gate').style.display = 'none';
        document.getElementById('ps1').textContent    = v+'>';
        msgEl.disabled = false; msgEl.focus();

        addLine('<span class="sys">─────────────────────────</span>');
        sysLine("'"+v+"' 님이 대화방에 입장하셨습니다.");
        sysLine('WebRTC P2P 메쉬 활성화');

        sendToServer('join','','');
        poll();
        pollTimer    = setInterval(poll, POLL_MS);
        presenceBeat = setInterval(function(){ sendToServer('beat','',''); }, PRESENCE_MS/2);
        setConn('on');
    });
}

function leaveRoom(){
    if(!me.nick) return;
    var modal = document.getElementById('leave-modal');
    modal.style.display = 'flex';
    document.getElementById('leave-confirm-btn').focus();
}
function closeLeaveModal(){
    document.getElementById('leave-modal').style.display = 'none';
    msgEl.focus();
}
function doLeave(){
    document.getElementById('leave-modal').style.display = 'none';
    sysLine("'"+me.nick+"' 님이 대화방을 나가셨습니다.");
    msgEl.disabled = true; msgEl.value = '';
    if(pollTimer)    clearInterval(pollTimer);
    if(presenceBeat) clearInterval(presenceBeat);
    for(var uid in peers){ try{ peers[uid].pc.close(); }catch(e){} }
    peers = {};
    sendToServer('leave','','').then(closeTab).catch(closeTab);
    setTimeout(closeTab, 600);
}
function closeTab(){
    window.open('','_self'); window.close();
    setTimeout(function(){
        document.body.innerHTML =
            '<div style="height:100dvh;display:flex;align-items:center;justify-content:center;'+
            'font-family:DM Mono,monospace;color:#7fb069;background:#101418;letter-spacing:.05em;text-align:center;padding:1rem;">'+
            '접속이 종료되었습니다.<br>이 탭을 닫아 주세요.</div>';
    }, 300);
}

function enableEdit(){
    var nickEl = document.getElementById('nick');
    nickEl.readOnly = false; nickEl.style.opacity='1'; nickEl.style.borderBottomColor='';
    nickEl.focus(); nickEl.select();
    document.getElementById('editBtn').style.display = 'none';
    document.getElementById('enterBtn').textContent  = '접속';
    document.getElementById('gate-hint').innerHTML   = '대화명을 입력하십시오.<span class="cursor">_</span>';
}

/* ===== 10) 이벤트 ===== */
msgEl.addEventListener('keyup', function(e){ if(e.key==='Enter'&&!e.isComposing) sendMsg(); });
document.addEventListener('keydown', function(e){
    if(e.key==='Escape'){ closeLeaveModal(); }
});
document.getElementById('leave-modal').addEventListener('click', function(e){
    if(e.target===this) closeLeaveModal();
});
window.addEventListener('beforeunload', function(){
    if(me.nick){ try{ sendToServer('leave','',''); }catch(e){} }
});

/* ===== 12) 파일 전송 엔진 ===== */
var CHUNK_SIZE = 64 * 1024;

var ftSend = {
    file: null, targets: {}, transferId: null,
    pendingAccept: 0, sentChunks: 0, totalChunks: 0
};
var ftRecv = {
    transferId: null, fromUid: null, fromNick: null,
    meta: null, chunks: [], received: 0
};

function openFtSend(){
    if(!me.nick){ sysLine('대화방 입장 후 이용 가능합니다.'); return; }
    var connectedUids = Object.keys(peers).filter(function(u){ return peers[u].connected; });
    if(connectedUids.length === 0){
        sysLine('P2P로 연결된 상대가 없습니다.'); return;
    }
    ftSend.file = null; ftSend.targets = {}; ftSend.transferId = null;
    document.getElementById('ft-selected').classList.remove('show');
    document.getElementById('ft-target-wrap').style.display = 'none';
    document.getElementById('fts-prog-wrap').classList.remove('show');
    document.getElementById('fts-send-btn').disabled = true;
    document.getElementById('fts-send-btn').textContent = '전송';
    document.getElementById('fts-send-btn').onclick = ftStartSend;
    document.getElementById('fts-resend-btn').style.display = 'none';
    document.getElementById('fts-status').textContent = '파일 선택 후 대상을 지정하세요';
    document.getElementById('ft-drop').style.display = '';
    document.getElementById('ft-file-input').value = '';
    document.getElementById('fts-prog-fill').className = 'ft-prog-fill';
    buildTargetList(connectedUids);
    document.getElementById('ft-send-modal').classList.add('open');
}
function closeFtSend(){
    document.getElementById('ft-send-modal').classList.remove('open');
    msgEl.focus();
}

function buildTargetList(uids){
    var list = document.getElementById('ft-target-list');
    list.innerHTML = '';
    if(uids.length > 1){
        var allBtn = document.createElement('button');
        allBtn.className = 'ft-target-btn all';
        allBtn.textContent = '전체 ('+uids.length+'명)';
        allBtn.dataset.uid = '__all__';
        allBtn.onclick = function(){ ftToggleTarget('__all__', uids, this); };
        list.appendChild(allBtn);
    }
    uids.forEach(function(uid){
        var nick = (peers[uid] && presence[uid]) ? presence[uid].nick : uid;
        var btn = document.createElement('button');
        btn.className = 'ft-target-btn';
        btn.textContent = nick;
        btn.dataset.uid = uid;
        btn.onclick = function(){ ftToggleTarget(uid, uids, this); };
        list.appendChild(btn);
    });
}
function ftToggleTarget(uid, allUids, btn){
    if(uid === '__all__'){
        var allSelected = allUids.every(function(u){ return ftSend.targets[u]; });
        if(allSelected){
            ftSend.targets = {};
            document.querySelectorAll('.ft-target-btn').forEach(function(b){ b.classList.remove('sel'); });
        } else {
            ftSend.targets = {};
            allUids.forEach(function(u){ ftSend.targets[u] = true; });
            document.querySelectorAll('.ft-target-btn').forEach(function(b){ b.classList.add('sel'); });
        }
    } else {
        if(ftSend.targets[uid]){ delete ftSend.targets[uid]; btn.classList.remove('sel'); }
        else { ftSend.targets[uid] = true; btn.classList.add('sel'); }
        var allBtn2 = document.querySelector('.ft-target-btn.all');
        if(allBtn2){
            var allSelected2 = allUids.every(function(u){ return ftSend.targets[u]; });
            if(allSelected2) allBtn2.classList.add('sel'); else allBtn2.classList.remove('sel');
        }
    }
    ftCheckSendReady();
}
function ftCheckSendReady(){
    var hasFile   = !!ftSend.file;
    var hasTarget = Object.keys(ftSend.targets).length > 0;
    document.getElementById('fts-send-btn').disabled = !(hasFile && hasTarget);
}

function ftFileSelected(file){
    if(!file) return;
    ftSend.file = file;
    document.getElementById('ft-fname').textContent = file.name;
    document.getElementById('ft-fsize').textContent = ftFmtSize(file.size);
    document.getElementById('ft-selected').classList.add('show');
    document.getElementById('ft-target-wrap').style.display = '';
    ftCheckSendReady();
}
function ftFmtSize(b){
    if(b < 1024) return b+' B';
    if(b < 1048576) return (b/1024).toFixed(1)+' KB';
    if(b < 1073741824) return (b/1048576).toFixed(1)+' MB';
    return (b/1073741824).toFixed(2)+' GB';
}

function ftStartSend(){
    var targets = Object.keys(ftSend.targets);
    if(!ftSend.file || targets.length === 0) return;
    ftSend.transferId  = 'ft'+Date.now().toString(36)+Math.random().toString(36).slice(2,6);
    ftSend.totalChunks = Math.ceil(ftSend.file.size / CHUNK_SIZE);
    ftSend.pendingAccept = targets.length;
    ftSend.sentChunks    = 0;
    var offerMsg = JSON.stringify({
        _ft: true, cmd: 'offer',
        transferId: ftSend.transferId,
        name: ftSend.file.name,
        size: ftSend.file.size,
        totalChunks: ftSend.totalChunks,
        fromNick: me.nick
    });
    targets.forEach(function(uid){
        var p = peers[uid];
        if(p && p.dc && p.dc.readyState === 'open') p.dc.send(offerMsg);
    });
    document.getElementById('ft-drop').style.display = 'none';
    document.getElementById('fts-send-btn').disabled = true;
    document.getElementById('fts-status').textContent = '수락 대기 중…';
    document.getElementById('fts-prog-wrap').classList.add('show');
    document.getElementById('fts-prog-txt').textContent = '수락 대기 중…';
    document.getElementById('fts-prog-pct').textContent = '';
    sysLine('[파일] "'+ftSend.file.name+'" 전송 요청을 보냈습니다. ('+targets.length+'명)');
}

function ftOnAccept(uid){
    ftSend.pendingAccept = Math.max(0, ftSend.pendingAccept - 1);
    document.getElementById('fts-status').textContent = '전송 중…';
    ftSendChunksTo(uid, 0);
}

function ftSendChunksTo(uid, chunkIdx){
    var p = peers[uid];
    if(!p || !p.dc || p.dc.readyState !== 'open') return;
    var file  = ftSend.file;
    var total = ftSend.totalChunks;
    function sendNext(idx){
        if(idx >= total){
            p.dc.send(JSON.stringify({ _ft:true, cmd:'done', transferId:ftSend.transferId }));
            ftSend.sentChunks++;
            ftUpdateSendProgress();
            return;
        }
        var start  = idx * CHUNK_SIZE;
        var end    = Math.min(start + CHUNK_SIZE, file.size);
        var slice  = file.slice(start, end);
        var reader = new FileReader();
        reader.onload = function(e){
            try{
                if(p.dc.bufferedAmount > 4 * 1024 * 1024){
                    setTimeout(function(){ sendNext(idx); }, 50);
                    return;
                }
                p.dc.send(e.target.result);
                ftSend.sentChunks++;
                ftUpdateSendProgress();
                sendNext(idx + 1);
            } catch(err){ console.warn('ft send err', err); }
        };
        reader.readAsArrayBuffer(slice);
    }
    sendNext(chunkIdx);
}

function ftUpdateSendProgress(){
    var pct = ftSend.totalChunks > 0
        ? Math.min(100, Math.round(ftSend.sentChunks / ftSend.totalChunks * 100))
        : 0;
    document.getElementById('fts-prog-fill').style.width = pct+'%';
    document.getElementById('fts-prog-pct').textContent  = pct+'%';
    if(pct >= 100){
        document.getElementById('fts-prog-fill').classList.add('done');
        document.getElementById('fts-prog-txt').textContent  = '전송 완료!';
        document.getElementById('fts-status').textContent    = '전송 완료';
        document.getElementById('fts-send-btn').disabled     = false;
        document.getElementById('fts-send-btn').textContent  = '닫기';
        document.getElementById('fts-send-btn').onclick      = closeFtSend;
    }
}

function ftOnOffer(fromUid, msg){
    if(document.getElementById('ft-recv-modal').classList.contains('open')) return;
    ftRecv.transferId = msg.transferId;
    ftRecv.fromUid    = fromUid;
    ftRecv.fromNick   = msg.fromNick || presence[fromUid]&&presence[fromUid].nick || fromUid;
    ftRecv.meta       = { name: msg.name, size: msg.size, totalChunks: msg.totalChunks };
    ftRecv.chunks     = [];
    ftRecv.received   = 0;
    document.getElementById('ftr-from').textContent     = ftRecv.fromNick + ' 님이 파일을 전송합니다.';
    document.getElementById('ftr-fname').textContent    = msg.name;
    document.getElementById('ftr-fmeta').textContent    = ftFmtSize(msg.size) + ' · ' + msg.totalChunks + ' 청크';
    document.getElementById('ftr-status').textContent   = '수신 대기';
    document.getElementById('ftr-prog-wrap').classList.remove('show');
    document.getElementById('ftr-btns').style.display   = 'flex';
    document.getElementById('ftr-prog-fill').className  = 'ft-prog-fill';
    document.getElementById('ft-recv-modal').classList.add('open');
}

function ftAccept(){
    document.getElementById('ftr-btns').style.display = 'none';
    document.getElementById('ftr-prog-wrap').classList.add('show');
    document.getElementById('ftr-status').textContent = '수신 중…';
    var p = peers[ftRecv.fromUid];
    if(p && p.dc && p.dc.readyState === 'open'){
        p.dc.send(JSON.stringify({ _ft:true, cmd:'accept', transferId:ftRecv.transferId }));
    }
}

function ftReject(){
    var p = peers[ftRecv.fromUid];
    if(p && p.dc && p.dc.readyState === 'open'){
        p.dc.send(JSON.stringify({ _ft:true, cmd:'reject', transferId:ftRecv.transferId }));
    }
    sysLine('[파일] "'+ftRecv.meta.name+'" 수신을 거절했습니다.');
    document.getElementById('ft-recv-modal').classList.remove('open');
    ftRecv = { transferId:null, fromUid:null, fromNick:null, meta:null, chunks:[], received:0 };
    msgEl.focus();
}

function ftOnChunk(fromUid, buffer){
    if(fromUid !== ftRecv.fromUid) return;
    ftRecv.chunks.push(buffer);
    ftRecv.received++;
    var total = ftRecv.meta ? ftRecv.meta.totalChunks : 1;
    var pct   = Math.min(100, Math.round(ftRecv.received / total * 100));
    document.getElementById('ftr-prog-fill').style.width = pct+'%';
    document.getElementById('ftr-prog-pct').textContent  = pct+'%';
    document.getElementById('ftr-prog-txt').textContent  = ftRecv.received+'/'+total+' 청크';
}

function ftOnDone(fromUid, transferId){
    if(fromUid !== ftRecv.fromUid || transferId !== ftRecv.transferId) return;
    var blob = new Blob(ftRecv.chunks);
    var url  = URL.createObjectURL(blob);
    var a    = document.createElement('a');
    a.href     = url;
    a.download = ftRecv.meta.name;
    document.body.appendChild(a);
    a.click();
    setTimeout(function(){ URL.revokeObjectURL(url); document.body.removeChild(a); }, 2000);
    document.getElementById('ftr-prog-fill').classList.add('done');
    document.getElementById('ftr-prog-txt').textContent  = '수신 완료! 다운로드 시작됨';
    document.getElementById('ftr-status').textContent    = '완료';
    document.getElementById('ftr-prog-pct').textContent  = '100%';
    document.getElementById('ftr-prog-fill').style.width = '100%';
    sysLine('[파일] "'+ftRecv.meta.name+'" 수신 완료. 다운로드가 시작됩니다.');
    setTimeout(function(){
        document.getElementById('ft-recv-modal').classList.remove('open');
        ftRecv = { transferId:null, fromUid:null, fromNick:null, meta:null, chunks:[], received:0 };
        msgEl.focus();
    }, 2000);
}

function ftResend(){
    var resendBtn = document.getElementById('fts-resend-btn');
    var targetUid = resendBtn.dataset.targetUid;
    if(!ftSend.file || !targetUid) return;
    ftSend.targets = {};
    ftSend.targets[targetUid] = true;
    var fill = document.getElementById('fts-prog-fill');
    fill.className  = 'ft-prog-fill';
    fill.style.width = '0%';
    document.getElementById('fts-prog-pct').textContent = '';
    document.getElementById('fts-prog-txt').textContent = '수락 대기 중…';
    resendBtn.style.display = 'none';
    ftStartSend();
}

function ftHandleDcMessage(fromUid, event){
    var data = event.data;
    if(data instanceof ArrayBuffer){ ftOnChunk(fromUid, data); return true; }
    var msg;
    try { msg = JSON.parse(data); } catch(e){ return null; }
    if(!msg._ft) return null;
    if(msg.cmd === 'offer')  { ftOnOffer(fromUid, msg); }
    else if(msg.cmd === 'accept') { ftOnAccept(fromUid); }
    else if(msg.cmd === 'reject') {
        var rejNick = presence[fromUid]&&presence[fromUid].nick||fromUid;
        sysLine('[파일] '+esc(rejNick)+' 님이 파일 수신을 거절했습니다.');
        document.getElementById('fts-prog-txt').textContent = esc(rejNick)+' 님이 거절했습니다.';
        document.getElementById('fts-prog-pct').textContent = '';
        document.getElementById('fts-prog-fill').classList.add('err');
        document.getElementById('fts-status').textContent   = '거절됨';
        var resendBtn2 = document.getElementById('fts-resend-btn');
        resendBtn2.style.display = '';
        resendBtn2.dataset.targetUid = fromUid;
    }
    else if(msg.cmd === 'done')  { ftOnDone(fromUid, msg.transferId); }
    return true;
}

/* ===== visualViewport: 키보드가 올라오면 composer를 그 위로 올림 ===== */
(function(){
    var composer = document.querySelector('.composer');
    var shell    = document.querySelector('.shell');
    var COMPOSER_H = 56; // composer 높이(px)

    function onViewportChange(){
        var vv = window.visualViewport;
        if(!vv || !composer) return;

        // 키보드가 차지하는 높이 = 전체 창 높이 - 가시 뷰포트 하단
        var kbHeight = window.innerHeight - (vv.offsetTop + vv.height);
        var bottom   = Math.max(0, kbHeight);

        // 1) composer를 키보드 바로 위로
        composer.style.bottom = bottom + 'px';

        // 2) shell의 하단 패딩 = composer 높이 + 키보드 높이
        //    → log 영역이 composer 뒤에 숨지 않도록
        if(shell) shell.style.paddingBottom = (COMPOSER_H + bottom) + 'px';

        // 3) 최신 메시지가 보이도록 로그 스크롤
        var log = document.getElementById('log');
        if(log) {
            // requestAnimationFrame으로 레이아웃 재계산 후 스크롤
            requestAnimationFrame(function(){
                log.scrollTop = log.scrollHeight;
            });
        }
    }

    if(window.visualViewport){
        window.visualViewport.addEventListener('resize',  onViewportChange);
        window.visualViewport.addEventListener('scroll',  onViewportChange);
    }
})();
</script>
