<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IMTI - 운영진 보드</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&family=Noto+Sans+KR:wght@400;500;700;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../ad_common.css">
<style>
:root {
  --y-bg:#FFF9C4;--y-bd:#E8D848;--y-tx:#4A3800;
  --b-bg:#DBEAFE;--b-bd:#93C5FD;--b-tx:#1E3A5F;
  --g-bg:#DCFCE7;--g-bd:#86EFAC;--g-tx:#14532D;
  --p-bg:#F3E8FF;--p-bd:#C084FC;--p-tx:#4A1D96;
  --accent:#3B5BDB;--accent-bg:#EEF2FF;
  --fn:'Noto Sans KR',sans-serif;
}
.main *{box-sizing:border-box}

/* ── Mobile layout reset ── */
html, body { height: auto; min-height: 100%; overflow-x: hidden; }
body { overflow-y: auto; -webkit-text-size-adjust: 100%; }
.page-body {
    height: auto !important; max-height: none !important;
    overflow: visible !important; display: block !important;
}
.main {
    display: block;
    margin: 12px !important;
    padding: 16px 12px 80px !important;
    border: none !important;
    min-height: calc(100vh - 80px);
}

/* 로딩 */
.auth-loading{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;padding:3rem 1rem}
.auth-loading .sp2{width:22px;height:22px;border:2px solid #e9ecef;border-top-color:#adb5bd;border-radius:50%;animation:spin .8s linear infinite}
.auth-loading p{font-family:var(--fn);font-size:13px;color:#adb5bd;text-align:center}
@keyframes spin{to{transform:rotate(360deg)}}

/* 보드 */
#board-wrap{display:flex;flex-direction:column;padding:0;font-family:var(--fn)}
.user-banner{display:none}

/* 툴바 */
.board-toolbar{display:flex;align-items:center;gap:6px;margin-bottom:16px;flex-wrap:wrap}
.filter-chips{display:flex;gap:5px;flex:1;flex-wrap:wrap}
.chip{padding:6px 12px;border-radius:99px;font-size:12px;font-weight:600;border:1.5px solid #adb5bd;background:#fff;color:#495057;cursor:pointer;font-family:var(--fn);transition:all .12s}
.chip:hover{border-color:#495057;color:#212529;background:#f8f9fa}
.chip.active{background:#212529;border-color:#212529;color:#fff}
.btn-refresh,.btn-archive,.btn-conf,.btn-notify,.btn-add{
    padding:7px 12px;border-radius:99px;font-size:12px;font-weight:600;
    border:1.5px solid #adb5bd;background:#fff;color:#495057;
    cursor:pointer;font-family:var(--fn);transition:all .12s;white-space:nowrap
}
.btn-refresh:hover,.btn-archive:hover{border-color:#495057;color:#212529;background:#f8f9fa}
.btn-conf{background:#e9ecef;color:#212529;border-color:#ced4da;font-weight:700}
.btn-conf:hover{background:#dee2e6}
.btn-notify{background:#fff7ed;color:#c2410c;border-color:#fed7aa;font-weight:700}
.btn-notify:hover{background:#ffedd5;border-color:#fb923c}
.btn-add{background:#212529;color:#fff;border:none;font-size:13px;font-weight:700;transition:opacity .15s}
.btn-add:hover{opacity:.82}

/* 툴바 두 줄 레이아웃 */
.toolbar-row1{display:flex;align-items:center;gap:6px;flex-wrap:wrap;width:100%;margin-bottom:8px}
.toolbar-row2{display:flex;align-items:center;gap:6px;flex-wrap:wrap;width:100%}

/* 카드 그리드: 세로 1열, 가로 2열 이상 */
.cards-grid{display:grid;grid-template-columns:1fr;gap:10px;align-items:start}
@media(orientation:landscape){
  .cards-grid{grid-template-columns:repeat(2,1fr)}
}
@media(orientation:landscape)and(min-width:900px){
  .cards-grid{grid-template-columns:repeat(3,1fr)}
}
.card{border-radius:10px;padding:14px;border:1px solid;display:flex;flex-direction:column;gap:10px;cursor:pointer;transition:transform .12s,box-shadow .12s;height:auto}
.card:hover{transform:translateY(-2px);box-shadow:0 6px 16px rgba(0,0,0,.18)}
.card.y{background:var(--y-bg);border-color:var(--y-bd)}
.card.b{background:var(--b-bg);border-color:var(--b-bd)}
.card.g{background:var(--g-bg);border-color:var(--g-bd)}
.card.p{background:var(--p-bg);border-color:var(--p-bd)}
.card-top{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.cav{width:26px;height:26px;border-radius:50%;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.cname{font-size:12px;font-weight:700;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.card.y .cname{color:var(--y-tx)}.card.b .cname{color:var(--b-tx)}.card.g .cname{color:var(--g-tx)}.card.p .cname{color:var(--p-tx)}
.type-badge{font-size:10px;padding:2px 7px;border-radius:99px;font-weight:700;flex-shrink:0}
.badge-공지{background:rgba(255,200,0,.25);color:#7A5000}
.badge-아이디어{background:rgba(59,91,219,.12);color:#2040AA}
.badge-할일{background:rgba(20,83,45,.12);color:#14532D}
.card-body{font-size:12px;line-height:1.6;word-break:break-word;overflow-wrap:break-word;white-space:pre-wrap}
.card.y .card-body{color:var(--y-tx)}.card.b .card-body{color:var(--b-tx)}.card.g .card-body{color:var(--g-tx)}.card.p .card-body{color:var(--p-tx)}
.tagged{display:flex;flex-wrap:wrap;gap:3px}
.tag-pill{font-size:10px;padding:1px 6px;border-radius:99px;background:rgba(0,0,0,.08);font-weight:700}
.card.y .tag-pill{color:var(--y-tx)}.card.b .tag-pill{color:var(--b-tx)}.card.g .tag-pill{color:var(--g-tx)}.card.p .tag-pill{color:var(--p-tx)}
.deadline-row{display:flex;align-items:center;gap:4px;font-size:11px;opacity:.7}
.card.y .deadline-row{color:var(--y-tx)}.card.b .deadline-row{color:var(--b-tx)}.card.g .deadline-row{color:var(--g-tx)}.card.p .deadline-row{color:var(--p-tx)}
.deadline-urgent{color:#b91c1c!important;opacity:1!important;font-weight:700}
.card-footer{display:flex;align-items:center;justify-content:space-between}
.card-date{font-size:10px;opacity:.55}
.card.y .card-date{color:var(--y-tx)}.card.b .card-date{color:var(--b-tx)}.card.g .card-date{color:var(--g-tx)}.card.p .card-date{color:var(--p-tx)}
.card-actions{display:flex;align-items:center;gap:4px}
.action-btn{background:none;border:none;cursor:pointer;font-size:13px;display:flex;align-items:center;gap:2px;padding:2px 4px;border-radius:5px;font-family:var(--fn)}
.action-btn:hover{background:rgba(0,0,0,.07)}
.action-count{font-size:11px;font-weight:500;opacity:.75}
.card.y .action-count{color:var(--y-tx)}.card.b .action-count{color:var(--b-tx)}.card.g .action-count{color:var(--g-tx)}.card.p .action-count{color:var(--p-tx)}

/* 빈 상태 */
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;color:#adb5bd;font-family:var(--fn);font-size:14px;padding:3rem 1rem;text-align:center}

/* 모달 공통 */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);display:none;align-items:flex-end;justify-content:center;z-index:300;padding:0}
.overlay.open{display:flex}
.modal{
    background:#fff;border-radius:16px 16px 0 0;border:.5px solid #e5e7eb;
    padding:1.5rem 1.25rem 2rem;width:100%;max-width:100%;
    max-height:88vh;overflow-y:auto;overflow-x:hidden;
    box-shadow:0 -6px 30px rgba(0,0,0,.18);font-family:var(--fn);
    box-sizing:border-box
}
.modal *{box-sizing:border-box}
.modal h2{font-size:16px;font-weight:700;margin-bottom:1rem;color:#1a1a1a}
.form-group{margin-bottom:1rem}
.form-label{font-size:12px;font-weight:700;color:#6b7280;margin-bottom:6px;display:block;letter-spacing:.03em}
.form-input,.form-textarea{width:100%;max-width:100%;padding:10px 12px;border:.5px solid #d1d5db;border-radius:10px;font-size:14px;font-family:var(--fn);color:#1a1a1a;background:#f9fafb;box-sizing:border-box}
.form-input:focus,.form-textarea:focus{outline:none;border-color:var(--accent);background:#fff}
.form-textarea{resize:vertical;min-height:140px}
.type-row{display:flex;gap:6px}
.type-btn{flex:1;padding:9px 4px;border-radius:10px;border:.5px solid #e5e7eb;background:#f9fafb;font-size:12px;font-weight:700;cursor:pointer;font-family:var(--fn);color:#9ca3af;transition:all .12s}
.type-btn.sel{background:var(--accent-bg);border-color:var(--accent);color:var(--accent)}
.color-row{display:flex;gap:8px}
.color-dot{width:26px;height:26px;border-radius:50%;cursor:pointer;border:2.5px solid transparent;transition:all .12s}
.color-dot:hover{transform:scale(1.12)}
.color-dot.sel{border-color:#1a1a1a}
.member-checks{display:flex;flex-wrap:wrap;gap:5px}
.member-check{display:flex;align-items:center;gap:4px;padding:5px 10px;border-radius:99px;border:.5px solid #e5e7eb;cursor:pointer;font-size:12px;font-weight:500;color:#6b7280;background:#f9fafb;transition:all .12s;user-select:none}
.member-check.sel{background:var(--accent-bg);border-color:var(--accent);color:var(--accent)}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:1.25rem;flex-wrap:wrap}
.btn-cancel{padding:10px 18px;border-radius:10px;border:.5px solid #e5e7eb;background:#f9fafb;color:#6b7280;font-size:14px;cursor:pointer;font-family:var(--fn)}
.btn-cancel:hover{border-color:#d1d5db}
.btn-primary{padding:10px 20px;border-radius:10px;background:var(--accent);color:#fff;border:none;font-size:14px;font-weight:700;cursor:pointer;font-family:var(--fn)}
.btn-primary:hover{opacity:.88}
.btn-primary:disabled{opacity:.45;cursor:not-allowed}
.btn-danger{padding:10px 20px;border-radius:10px;background:#dc2626;color:#fff;border:none;font-size:14px;font-weight:700;cursor:pointer;font-family:var(--fn)}
.btn-danger:hover{opacity:.88}
.btn-success{padding:10px 20px;border-radius:10px;background:#16a34a;color:#fff;border:none;font-size:14px;font-weight:700;cursor:pointer;font-family:var(--fn)}
.btn-success:hover{opacity:.88}

/* 상세 모달 */
.detail-card-preview{border-radius:10px;padding:14px;border:1px solid;margin-bottom:1rem}
.detail-card-preview.y{background:var(--y-bg);border-color:var(--y-bd)}.detail-card-preview.b{background:var(--b-bg);border-color:var(--b-bd)}
.detail-card-preview.g{background:var(--g-bg);border-color:var(--g-bd)}.detail-card-preview.p{background:var(--p-bg);border-color:var(--p-bd)}
.detail-card-text{font-size:14px;line-height:1.7;word-break:break-word;overflow-wrap:break-word;white-space:pre-wrap}
.detail-card-preview.y .detail-card-text{color:var(--y-tx)}.detail-card-preview.b .detail-card-text{color:var(--b-tx)}
.detail-card-preview.g .detail-card-text{color:var(--g-tx)}.detail-card-preview.p .detail-card-text{color:var(--p-tx)}
.comments-list{display:flex;flex-direction:column;gap:10px;margin-bottom:.75rem;max-height:200px;overflow-y:auto}
.comment-item{display:flex;gap:8px}
.comment-av{width:26px;height:26px;border-radius:50%;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.comment-bubble{flex:1}
.comment-meta{font-size:11px;color:#9ca3af;margin-bottom:3px}
.comment-meta strong{color:#6b7280}
.comment-text{font-size:13px;line-height:1.6;color:#1a1a1a;background:#f3f4f6;border-radius:0 8px 8px 8px;padding:8px 10px}
.comment-input-row{display:flex;gap:6px;align-items:flex-end}
.comment-input{flex:1;min-width:0;padding:9px 12px;border:.5px solid #d1d5db;border-radius:10px;font-size:14px;font-family:var(--fn);resize:none;min-height:40px;max-height:100px;background:#f9fafb;box-sizing:border-box}
.btn-comment{padding:9px 14px;border-radius:10px;background:var(--accent);color:#fff;border:none;font-size:13px;font-weight:700;cursor:pointer;font-family:var(--fn);flex-shrink:0}
.comment-input:focus{outline:none;border-color:var(--accent);background:#fff}
.btn-comment:hover{opacity:.88}

/* 보관함 */
.archive-cards{display:flex;flex-direction:column;gap:8px;max-height:50vh;overflow-y:auto}
.archive-item{border-radius:10px;padding:12px 14px;border:1px solid;display:flex;flex-direction:column;gap:6px}
.archive-item.y{background:var(--y-bg);border-color:var(--y-bd)}.archive-item.b{background:var(--b-bg);border-color:var(--b-bd)}
.archive-item.g{background:var(--g-bg);border-color:var(--g-bd)}.archive-item.p{background:var(--p-bg);border-color:var(--p-bd)}
.archive-item-text{font-size:13px;line-height:1.6}
.archive-item.y .archive-item-text{color:var(--y-tx)}.archive-item.b .archive-item-text{color:var(--b-tx)}
.archive-item.g .archive-item-text{color:var(--g-tx)}.archive-item.p .archive-item-text{color:var(--p-tx)}
.archive-item-meta{font-size:11px;opacity:.6}
.archive-item.y .archive-item-meta{color:var(--y-tx)}.archive-item.b .archive-item-meta{color:var(--b-tx)}
.archive-item.g .archive-item-meta{color:var(--g-tx)}.archive-item.p .archive-item-meta{color:var(--p-tx)}
.archive-item-actions{display:flex;gap:6px;margin-top:2px;flex-wrap:wrap}
.btn-repost{padding:6px 12px;border-radius:99px;background:#fff;border:1px solid #adb5bd;font-size:12px;font-weight:700;cursor:pointer;font-family:var(--fn);color:#495057;transition:all .12s}
.btn-repost:hover{background:#f8f9fa;border-color:#495057}
.btn-archive-del{padding:6px 12px;border-radius:99px;background:#fff;border:1px solid #fca5a5;font-size:12px;font-weight:700;cursor:pointer;font-family:var(--fn);color:#dc2626;transition:all .12s}
.btn-archive-del:hover{background:#fef2f2;border-color:#dc2626}

/* 알림 모달 */
.alert-modal{background:#fff;border-radius:16px 16px 0 0;padding:1.5rem 1.25rem 2rem;width:100%;max-width:100%;overflow-x:hidden;box-sizing:border-box;box-shadow:0 -6px 30px rgba(0,0,0,.3);font-family:var(--fn)}
.alert-modal .alert-icon{font-size:32px;text-align:center;margin-bottom:12px}
.alert-modal .alert-title{font-size:16px;font-weight:700;color:#1a1a1a;text-align:center;margin-bottom:8px}
.alert-modal .alert-msg{font-size:13px;color:#6b7280;text-align:center;line-height:1.7;margin-bottom:1.25rem;white-space:pre-line}
.alert-modal .alert-actions{display:flex;gap:8px;justify-content:center;flex-wrap:wrap}

/* 진행 모달 */
.progress-modal{background:#fff;border-radius:16px 16px 0 0;padding:1.5rem 1.5rem 2rem;width:100%;max-width:100%;overflow-x:hidden;box-sizing:border-box;box-shadow:0 -6px 30px rgba(0,0,0,.3);font-family:var(--fn);text-align:center}
.progress-modal .pm-icon{font-size:28px;margin-bottom:10px}
.progress-modal .pm-msg{font-size:15px;font-weight:600;color:#1a1a1a;margin-bottom:6px}
.progress-modal .pm-sub{font-size:13px;color:#9ca3af}
.pm-spinner{display:inline-block;width:22px;height:22px;border:3px solid #e5e7eb;border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;margin-bottom:10px}

/* 스피너 */
.loading{text-align:center;padding:2rem;color:#9ca3af;font-size:13px}
.loading .sp{display:inline-block;width:16px;height:16px;border:2px solid #e5e7eb;border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;margin-right:6px;vertical-align:middle}

/* 알림 발송 모달 */
.overlay.bottom-sheet{align-items:flex-end}
</style>
</head>
<body>

<!-- Mobile navbar injected here -->
<div id="m-navbar-mount"></div>
<div class="page-body">
<div class="main" id="main-wrap">
  <div class="auth-loading" id="auth-loading">
    <div class="sp2"></div>
    <p>로그인 정보를 확인하는 중...</p>
  </div>
  <div id="board-wrap" style="display:none">
    <div class="board-toolbar">
      <!-- 첫 번째 줄: 기능 버튼 -->
      <div class="toolbar-row1">
        <button class="btn-archive" onclick="openArchive()">📦 보관함</button>
        <button class="btn-conf" onclick="window.open('m_ad_chat.html?uid='+encodeURIComponent(currentUser?currentUser.email:''),'_blank')">🚪 대화방</button>
        <button class="btn-notify" onclick="openNotifyModal()">📣 알리기</button>
        <button class="btn-add" onclick="openAddModal()">＋ Post-It</button>
      </div>
      <!-- 두 번째 줄: 필터 칩 + 새로고침 -->
      <div class="toolbar-row2">
        <div class="filter-chips">
          <button class="chip active" onclick="setFilter(this,'all')">전체</button>
          <button class="chip" style="background:#F3E8FF;border-color:#C084FC;color:#4A1D96" onclick="setFilter(this,'공지')">📢 공지</button>
          <button class="chip" style="background:#DCFCE7;border-color:#86EFAC;color:#14532D" onclick="setFilter(this,'아이디어')">💡 아이디어</button>
          <button class="chip" style="background:#DBEAFE;border-color:#93C5FD;color:#1E3A5F" onclick="setFilter(this,'할일')">✅ 할일</button>
        </div>
        <button class="btn-refresh" onclick="location.reload(true)" title="강제 새로고침">🔄</button>
      </div>
    </div>
    <div id="cards-container"></div>
  </div>
</div>
</div>

<!-- ── 카드 추가 모달 ── -->
<div class="overlay" id="add-overlay">
  <div class="modal">
    <h2>새 Post-It 작성</h2>
    <div class="form-group">
      <label class="form-label">유형</label>
      <div class="type-row">
        <button class="type-btn sel" onclick="selType(this,'공지')">📢 공지</button>
        <button class="type-btn" onclick="selType(this,'아이디어')">💡 아이디어</button>
        <button class="type-btn" onclick="selType(this,'할일')">✅ 할일</button>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">내용</label>
      <textarea class="form-textarea" id="card-text" placeholder="내용을 입력하세요..."></textarea>
    </div>
    <div class="form-group">
      <label class="form-label">마감일 (선택)</label>
      <input type="date" class="form-input" id="card-deadline">
    </div>
    <div class="form-group">
      <label class="form-label">멤버 태그 (선택)</label>
      <div class="member-checks" id="tag-checks"></div>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeAdd()">취소</button>
      <button class="btn-primary" id="post-btn" onclick="submitCard()">올리기</button>
    </div>
  </div>
</div>

<!-- ── 카드 수정 모달 ── -->
<div class="overlay" id="edit-overlay">
  <div class="modal">
    <h2>카드 수정</h2>
    <div class="form-group">
      <label class="form-label">유형</label>
      <div class="type-row">
        <button class="type-btn" id="edit-type-공지" onclick="selEditType(this,'공지')">📢 공지</button>
        <button class="type-btn" id="edit-type-아이디어" onclick="selEditType(this,'아이디어')">💡 아이디어</button>
        <button class="type-btn" id="edit-type-할일" onclick="selEditType(this,'할일')">✅ 할일</button>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">내용</label>
      <textarea class="form-textarea" id="edit-text" placeholder="내용을 입력하세요..."></textarea>
    </div>
    <div class="form-group">
      <label class="form-label">마감일 (선택)</label>
      <input type="date" class="form-input" id="edit-deadline">
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeEdit()">취소</button>
      <button class="btn-primary" id="edit-btn" onclick="submitEdit()">저장</button>
    </div>
  </div>
</div>

<!-- ── 카드 상세 모달 ── -->
<div class="overlay" id="detail-overlay">
  <div class="modal">
    <h2 id="detail-title">카드 상세</h2>
    <div id="detail-card-preview"></div>
    <div style="font-size:11px;font-weight:700;color:#6b7280;margin-bottom:6px">
      💬 댓글 <span id="comment-count" style="font-weight:400;color:#9ca3af"></span>
    </div>
    <div class="comments-list" id="comments-list">
      <div class="loading"><span class="sp"></span>불러오는 중...</div>
    </div>
    <div class="comment-input-row">
      <textarea class="comment-input" id="comment-input" placeholder="댓글 입력..." rows="1"

<script src="m_ad_common.js"></script>
<script>
window.__pageInit = function() {
  const email = sessionStorage.getItem('admin_email');
  initWithEmail(email);

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
const POSTIT_GAS_URL = "https://script.google.com/macros/s/AKfycbx7tfEvBODndMZxrS63Fa3ONSlHYuXHiWXbpQN5rmv7P6yQGaiTknrnwPdGzCSRF6eGHA/exec";
const CSV_CARDS    = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRlaICJucqoPp-IUQzEU5Z0xKfY8CYLym7dVYlMSSndi3kUD2sBczVi84zE0dglr9TOJEyYnEuJ-SL5/pub?gid=0&single=true&output=csv";
const CSV_COMMENTS = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRlaICJucqoPp-IUQzEU5Z0xKfY8CYLym7dVYlMSSndi3kUD2sBczVi84zE0dglr9TOJEyYnEuJ-SL5/pub?gid=1628714566&single=true&output=csv";
const CSV_MEMBERS  = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTl_lyF4ykH7Kbs_Y8wOUPNeru3HSReqZUwzBNLAGHJDoXA3g8TuQsa-efBkwtBiXudxTknoz4CX1NE/pub?gid=0&single=true&output=csv";
const AV_COLORS = [
  {bg:"#FFD6A5",tx:"#7A4000"},{bg:"#C8F5C8",tx:"#1A5A1A"},
  {bg:"#BBE4FF",tx:"#0A3F6E"},{bg:"#EDD9FF",tx:"#4A1A7A"},
  {bg:"#FFD6D6",tx:"#7A1A1A"},{bg:"#D6D6FF",tx:"#1A1A7A"},
  {bg:"#D6FFEE",tx:"#1A6A40"},
];

let currentUser = null;
let allCards = [], allEmails = [];
let currentFilter = 'all', currentCardId = null;
let selCardColor = 'y', selCardType = '공지', taggedEmails = [];
let editCardId = null, editCardColor = 'y', editCardType = '공지';
let _archiveCache = [];

function typeToColor(type){ return type==='공지'?'p':type==='아이디어'?'g':'b'; }

function dateToSort(d){
  if(!d) return Infinity;
  const m=d.match(/(\d{4})[.\s]+(\d{1,2})[.\s]+(\d{1,2})/);
  if(m) return parseInt(m[1])*10000+parseInt(m[2])*100+parseInt(m[3]);
  return Infinity;
}

function sortCards(cards){
  const typeOrder={'공지':0,'아이디어':1,'할일':2};
  return [...cards].sort((a,b)=>{
    const ta=typeOrder[a.type]??9, tb=typeOrder[b.type]??9;
    if(ta!==tb) return ta-tb;
    const hasDlA=!!a.deadline, hasDlB=!!b.deadline;
    if(hasDlA&&hasDlB) return a.deadline<b.deadline?-1:a.deadline>b.deadline?1:0;
    if(hasDlA) return -1;
    if(hasDlB) return 1;
    return dateToSort(a.date)-dateToSort(b.date);
  });
}
function emailLocal(e){ return (e||'').split('@')[0]; }
function emailToColor(e){ if(!e) return {bg:'#E9ECEF',tx:'#495057'}; let h=0; for(let i=0;i<e.length;i++) h=(h*31+e.charCodeAt(i))>>>0; return AV_COLORS[h%AV_COLORS.length]; }
function emailToInitials(e){ return emailLocal(e).slice(0,1).toUpperCase(); }
function emailToName(e){ const l=emailLocal(e); return l.charAt(0).toUpperCase()+l.slice(1); }
function escHtml(s){ return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// 모달 유틸
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function closeOverlay(id){ document.getElementById(id).classList.remove('open'); }

function showAlert(icon, title, msg, onOk){
  document.getElementById('alert-icon').textContent = icon;
  document.getElementById('alert-title').textContent = title;
  document.getElementById('alert-msg').textContent = msg;
  document.getElementById('alert-actions').innerHTML = `<button class="btn-primary" id="alert-ok-btn">확인</button>`;
  document.getElementById('alert-ok-btn').onclick = () => { closeOverlay('alert-overlay'); if(onOk) onOk(); };
  document.getElementById('alert-overlay').classList.add('open');
}

function showConfirm(icon, title, msg, confirmLabel, confirmClass, onConfirm){
  document.getElementById('alert-icon').textContent = icon;
  document.getElementById('alert-title').textContent = title;
  document.getElementById('alert-msg').textContent = msg;
  document.getElementById('alert-actions').innerHTML =
    `<button class="btn-cancel" id="alert-cancel-btn">취소</button>
     <button class="${confirmClass}" id="alert-confirm-btn">${confirmLabel}</button>`;
  document.getElementById('alert-cancel-btn').onclick = () => closeOverlay('alert-overlay');
  document.getElementById('alert-confirm-btn').onclick = () => { closeOverlay('alert-overlay'); onConfirm(); };
  document.getElementById('alert-overlay').classList.add('open');
}

let _progressTimer = null;
function showProgress(msg, sec){
  document.getElementById('pm-msg').textContent = msg;
  document.getElementById('pm-sub').textContent = sec ? `약 ${sec}초 후 화면이 갱신됩니다` : '';
  document.getElementById('progress-overlay').classList.add('open');
  if(sec){
    let c = sec;
    _progressTimer = setInterval(()=>{
      c--;
      document.getElementById('pm-sub').textContent = c > 0 ? `약 ${c}초 후 화면이 갱신됩니다` : '화면을 갱신하는 중...';
      if(c<=0) clearInterval(_progressTimer);
    },1000);
  }
}
function hideProgress(){ clearInterval(_progressTimer); closeOverlay('progress-overlay'); }

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// 초기화
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function initWithEmail(email){
  if(!email){
    document.getElementById('auth-loading').innerHTML =
      '<p style="font-family:var(--fn);font-size:13px;color:#ef4444">세션 정보가 없어요.<br>로그인 페이지로 이동해주세요.</p>';
    return;
  }
  const col = emailToColor(email);
  currentUser = { email, name:emailToName(email), initials:emailToInitials(email), bg:col.bg, tx:col.tx };
  document.getElementById('auth-loading').style.display='none';
  const bw = document.getElementById('board-wrap');
  bw.style.display='flex'; bw.style.flexDirection='column';
  loadMembersAndCards();
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// CSV 파서
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function parseCSV(text){
  const rows=[]; let cur='', inQ=false, cells=[];
  for(let i=0;i<text.length;i++){
    const ch=text[i], next=text[i+1];
    if(ch==='"'){
      if(inQ&&next==='"'){cur+='"';i++;}
      else inQ=!inQ;
    } else if(ch===','&&!inQ){
      cells.push(cur); cur='';
    } else if((ch==='\n'||ch==='\r')&&!inQ){
      if(ch==='\r'&&next==='\n') i++;
      cells.push(cur); rows.push(cells); cells=[]; cur='';
    } else {
      cur+=ch;
    }
  }
  cells.push(cur); if(cells.some(c=>c!=='')) rows.push(cells);
  return rows;
}

function rowsToCards(rows){
  const cards=[];
  for(let i=1;i<rows.length;i++){
    const r=rows[i]; if(!r[0]) continue;
    const hiddenBy=r[8]?r[8].split(',').filter(Boolean):[];
    if(hiddenBy.includes(currentUser.email)) continue;
    cards.push({id:r[0],text:r[1],type:r[2],color:r[3],author:r[4],date:r[5],
      likes:parseInt(r[6])||0,
      likedBy:r[7]?r[7].split(',').filter(Boolean):[],
      hiddenBy,deadline:r[9]||'',
      taggedMembers:r[10]?r[10].split(',').filter(Boolean):[],
    });
  }
  return cards.reverse();
}

function rowsToComments(rows, cardId){
  const comments=[];
  for(let i=1;i<rows.length;i++){
    const r=rows[i]; if(!r[0]||r[1]!==cardId) continue;
    comments.push({id:r[0],cardId:r[1],author:r[2],text:r[3],date:r[4]});
  }
  return comments;
}

function gas(params){
  const qs=new URLSearchParams({...params,author:currentUser.email}).toString();
  return fetch(`${POSTIT_GAS_URL}?${qs}`).then(r=>r.json());
}

function loadMembersAndCards(){
  allCards=[];
  document.getElementById('cards-container').innerHTML='<div class="loading"><span class="sp"></span>불러오는 중...</div>';
  const noCache={cache:'no-store',headers:{'Cache-Control':'no-cache, no-store, must-revalidate','Pragma':'no-cache'}};
  Promise.all([
    fetch(CSV_MEMBERS+'&t='+Date.now(), noCache).then(r=>r.text()).catch(()=>''),
    fetch(CSV_CARDS+'&t='+Date.now(), noCache).then(r=>r.text()).catch(e=>{console.error('[CSV_CARDS]',e);throw e;}),
  ]).then(([mText, cText])=>{
    if(mText){
      const rows=parseCSV(mText);
      const emails=new Set();
      for(let i=1;i<rows.length;i++){if(rows[i][1]) emails.add(rows[i][1].trim());}
      allEmails=Array.from(emails).filter(e=>e!==currentUser.email);
    }
    buildTagChecks();
    const rows=parseCSV(cText);
    allCards=rowsToCards(rows);
    renderCards();
  }).catch(e=>{
    console.error('[loadMembersAndCards]',e);
    document.getElementById('cards-container').innerHTML=
      '<div class="empty"><p>⚠️ 데이터를 불러올 수 없어요.</p></div>';
  });
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// 카드 렌더링
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function setFilter(btn,type){
  currentFilter=type;
  document.querySelectorAll('.chip').forEach(c=>c.classList.remove('active'));
  btn.classList.add('active'); renderCards();
}

function renderCards(){
  let filtered=currentFilter==='all'?allCards:allCards.filter(c=>c.type===currentFilter);
  filtered=sortCards(filtered.map(c=>({...c,color:typeToColor(c.type)})));
  const container=document.getElementById('cards-container');
  if(!filtered.length){
    container.innerHTML='<div class="empty"><p>아직 카드가 없어요 ✨<br>첫 번째 카드를 올려보세요!</p></div>';
    return;
  }
  container.innerHTML=`<div class="cards-grid">${filtered.map(cardHTML).join('')}</div>`;
}

function cardHTML(c){
  const col=emailToColor(c.author);
  const ini=emailToInitials(c.author);
  const nm=emailToName(c.author);
  const isMe=c.author===currentUser.email;
  const liked=c.likedBy&&c.likedBy.includes(currentUser.email);
  const today=new Date(); today.setHours(0,0,0,0);
  let dlHTML='';
  if(c.deadline){
    const dl=new Date(c.deadline);
    const diff=Math.ceil((dl-today)/86400000);
    const urgent=diff<=2;
    const lbl=diff<0?`D+${Math.abs(diff)}`:diff===0?'D-day':`D-${diff}`;
    dlHTML=`<div class="deadline-row${urgent?' deadline-urgent':''}">📅 ${c.deadline} <strong>${lbl}</strong></div>`;
  }
  const tagsHTML=(c.taggedMembers&&c.taggedMembers.length)
    ?`<div class="tagged">${c.taggedMembers.map(e=>`<span class="tag-pill">@${emailToName(e)}</span>`).join('')}</div>`:'';
  const myBtns=isMe
    ?`<button class="action-btn" style="font-size:12px;opacity:.5" onclick="event.stopPropagation();openEdit('${c.id}')" title="수정">✏️</button>
      <button class="action-btn" style="font-size:12px;opacity:.5;color:#dc2626" onclick="event.stopPropagation();confirmHide('${c.id}')" title="숨기기">🗑</button>`
    :'';
  return `<div class="card ${c.color}" onclick="openDetail('${c.id}')">
    <div class="card-top">
      <div class="cav" style="background:${col.bg};color:${col.tx}">${ini}</div>
      <span class="cname">${nm}</span>
      <span class="type-badge badge-${c.type}">${c.type==='공지'?'📢':c.type==='아이디어'?'💡':'✅'} ${c.type}</span>
    </div>
    <div class="card-body">${escHtml(c.text)}</div>
    ${tagsHTML}${dlHTML}
    <div class="card-footer">
      <span class="card-date">${c.date}</span>
      <div class="card-actions">
        <button class="action-btn" onclick="event.stopPropagation();likeCard('${c.id}')">${liked?'❤️':'🤍'}<span class="action-count">${c.likes||0}</span></button>
        <button class="action-btn" onclick="event.stopPropagation();openDetail('${c.id}')">💬</button>
        ${myBtns}
      </div>
    </div>
  </div>`;
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// 태그 체크박스
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function buildTagChecks(){
  const wrap=document.getElementById('tag-checks');
  if(!allEmails.length){wrap.innerHTML='<span style="font-size:11px;color:#9ca3af">운영진 없음</span>';return;}
  wrap.innerHTML=allEmails.map(email=>{
    const col=emailToColor(email);
    return `<label class="member-check" onclick="toggleTag(this,'${email}')">
      <div style="width:12px;height:12px;border-radius:50%;background:${col.bg};color:${col.tx};font-size:6px;font-weight:700;display:flex;align-items:center;justify-content:center;">${emailToInitials(email)}</div>
      @${emailToName(email)}</label>`;
  }).join('');
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// 카드 추가
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function openAddModal(){
  selCardType='공지'; taggedEmails=[];
  document.getElementById('card-text').value='';
  document.getElementById('card-deadline').value='';
  document.querySelectorAll('.type-btn').forEach(b=>b.classList.remove('sel'));
  document.querySelector('.type-btn').classList.add('sel');
  document.querySelectorAll('#tag-checks .member-check').forEach(m=>m.classList.remove('sel'));
  const btn=document.getElementById('post-btn'); btn.disabled=false; btn.textContent='올리기';
  document.getElementById('add-overlay').classList.add('open');
}
function closeAdd(){ closeOverlay('add-overlay'); }
function selType(btn,type){ selCardType=type; document.querySelectorAll('.type-btn').forEach(b=>b.classList.remove('sel')); btn.classList.add('sel'); }
function selColor(dot,c){ selCardColor=c; document.querySelectorAll('.color-dot').forEach(d=>d.classList.remove('sel')); dot.classList.add('sel'); }
function toggleTag(label,email){ label.classList.toggle('sel'); if(taggedEmails.includes(email)) taggedEmails=taggedEmails.filter(e=>e!==email); else taggedEmails.push(email); }

function submitCard(){
  const text=document.getElementById('card-text').value.trim();
  if(!text){showAlert('⚠️','내용 없음','카드 내용을 입력해주세요.');return;}
  const btn=document.getElementById('post-btn');
  btn.disabled=true; btn.textContent='저장 중...';
  const deadline=document.getElementById('card-deadline').value;
  const tagged=[...taggedEmails];
  const color=typeToColor(selCardType);
  const type=selCardType;
  gas({action:'addCard',text,type,color,deadline,taggedMembers:tagged.join(',')})
  .then(()=>{
    closeAdd();
    btn.disabled=false; btn.textContent='올리기';
    reloadAfterAction('카드를 올렸어요 ✨');
  })
  .catch(()=>{
    btn.disabled=false; btn.textContent='올리기';
    showAlert('❌','오류','저장 중 오류가 발생했어요. 다시 시도해주세요.');
  });
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// 카드 수정
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function openEdit(id){
  const c=allCards.find(x=>x.id===id); if(!c) return;
  editCardId=id; editCardType=c.type;
  document.getElementById('edit-text').value=c.text;
  document.getElementById('edit-deadline').value=c.deadline||'';
  document.querySelectorAll('[id^="edit-type-"]').forEach(b=>b.classList.remove('sel'));
  const tb=document.getElementById('edit-type-'+c.type); if(tb) tb.classList.add('sel');
  const btn=document.getElementById('edit-btn'); btn.disabled=false; btn.textContent='저장';
  document.getElementById('edit-overlay').classList.add('open');
}
function closeEdit(){ closeOverlay('edit-overlay'); }
function selEditType(btn,type){ editCardType=type; document.querySelectorAll('[id^="edit-type-"]').forEach(b=>b.classList.remove('sel')); btn.classList.add('sel'); }

function submitEdit(){
  const text=document.getElementById('edit-text').value.trim();
  if(!text){showAlert('⚠️','내용 없음','카드 내용을 입력해주세요.');return;}
  const btn=document.getElementById('edit-btn');
  btn.disabled=true; btn.textContent='저장 중...';
  const deadline=document.getElementById('edit-deadline').value;
  const id=editCardId;
  const type=editCardType;
  const color=typeToColor(editCardType);
  gas({action:'updateCard',id,text,type,color,deadline})
  .then(()=>{
    closeEdit();
    btn.disabled=false; btn.textContent='저장';
    reloadAfterAction('카드를 수정했어요 ✏️');
  })
  .catch(()=>{
    btn.disabled=false; btn.textContent='저장';
    showAlert('❌','오류','수정 중 오류가 발생했어요. 다시 시도해주세요.');
  });
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// 카드 상세 / 댓글
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function openDetail(id){
  currentCardId=id;
  const c=allCards.find(x=>x.id===id); if(!c) return;
  document.getElementById('detail-title').textContent='카드 상세';
  const col=emailToColor(c.author);
  const preview=document.getElementById('detail-card-preview');
  let dlRow='';
  if(c.deadline){
    const today=new Date(); today.setHours(0,0,0,0);
    const dl=new Date(c.deadline);
    const diff=Math.ceil((dl-today)/86400000);
    const urgent=diff<=2;
    const lbl=diff<0?`D+${Math.abs(diff)}`:diff===0?'D-day':`D-${diff}`;
    dlRow=`<div style="margin-top:6px;font-size:11px;${urgent?'color:#b91c1c;font-weight:700':'opacity:.6;color:inherit'}">📅 ${c.deadline} ${lbl}</div>`;
  }
  preview.className=`detail-card-preview ${c.color}`;
  preview.innerHTML=`
    <div style="display:flex;align-items:center;gap:6px;margin-bottom:8px">
      <div style="width:22px;height:22px;border-radius:50%;background:${col.bg};color:${col.tx};font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center;">${emailToInitials(c.author)}</div>
      <span style="font-size:12px;font-weight:700">${emailToName(c.author)}</span>
      <span class="type-badge badge-${c.type}" style="font-size:10px">${c.type}</span>
    </div>
    <div class="detail-card-text">${escHtml(c.text)}</div>
    ${dlRow}`;

  document.getElementById('comments-list').innerHTML='<div class="loading"><span class="sp"></span>불러오는 중...</div>';
  document.getElementById('comment-count').textContent='';
  document.getElementById('comment-input').value='';
  document.getElementById('comment-submit-btn').disabled=false;
  document.getElementById('comment-submit-btn').textContent='등록';
  document.getElementById('detail-overlay').classList.add('open');
  loadComments(id);
}

function closeDetail(){ closeOverlay('detail-overlay'); currentCardId=null; }

function loadComments(cardId){
  const noCache={cache:'no-store'};
  fetch(CSV_COMMENTS+'&t='+Date.now(), noCache).then(r=>r.text()).then(text=>{
    const rows=parseCSV(text);
    const comments=rowsToComments(rows, cardId);
    renderComments(comments);
  }).catch(()=>{
    document.getElementById('comments-list').innerHTML='<p style="font-size:12px;color:#9ca3af;text-align:center">댓글을 불러오지 못했어요.</p>';
  });
}

function renderComments(comments){
  const list=document.getElementById('comments-list');
  document.getElementById('comment-count').textContent=`(${comments.length})`;
  if(!comments.length){
    list.innerHTML='<p style="font-size:12px;color:#9ca3af;text-align:center">첫 댓글을 남겨보세요!</p>';
    return;
  }
  list.innerHTML=comments.map(cm=>{
    const col=emailToColor(cm.author);
    return `<div class="comment-item">
      <div class="comment-av" style="background:${col.bg};color:${col.tx}">${emailToInitials(cm.author)}</div>
      <div class="comment-bubble">
        <div class="comment-meta"><strong>${emailToName(cm.author)}</strong> ${cm.date||''}</div>
        <div class="comment-text">${escHtml(cm.text)}</div>
      </div>
    </div>`;
  }).join('');
  list.scrollTop=list.scrollHeight;
}

function submitComment(){
  const input=document.getElementById('comment-input');
  const text=input.value.trim(); if(!text) return;
  if(!currentCardId) return;
  const btn=document.getElementById('comment-submit-btn');
  btn.disabled=true; btn.textContent='...';
  gas({action:'addComment',cardId:currentCardId,text})
  .then(()=>{
    input.value=''; input.style.height='auto';
    btn.disabled=false; btn.textContent='등록';
    loadComments(currentCardId);
  })
  .catch(()=>{
    btn.disabled=false; btn.textContent='등록';
    showAlert('❌','오류','댓글 등록 중 오류가 발생했어요.');
  });
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// 좋아요
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function likeCard(id){
  const c=allCards.find(x=>x.id===id); if(!c) return;
  const liked=c.likedBy&&c.likedBy.includes(currentUser.email);
  gas({action: liked ? 'unlikeCard' : 'likeCard', id})
  .then(()=>{ reloadAfterAction(); })
  .catch(()=>{ showAlert('❌','오류','잠시 후 다시 시도해주세요.'); });
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// 숨기기 (보관)
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function confirmHide(id){
  showConfirm('🗑','카드 숨기기','이 카드를 보관함으로 이동할까요?<br>(시트에서 삭제되지 않습니다)','숨기기','btn-danger',()=>hideCard(id));
}
function hideCard(id){
  gas({action:'hideCard',id})
  .then(()=>{ reloadAfterAction('카드를 보관함으로 이동했어요.'); })
  .catch(()=>{ showAlert('❌','오류','숨기기 중 오류가 발생했어요.'); });
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// 보관함
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function openArchive(){
  document.getElementById('archive-list').innerHTML='<div class="loading"><span class="sp"></span>불러오는 중...</div>';
  document.getElementById('archive-overlay').classList.add('open');
  const noCache={cache:'no-store'};
  fetch(CSV_CARDS+'&t='+Date.now(), noCache).then(r=>r.text()).then(text=>{
    const rows=parseCSV(text);
    const cards=[];
    for(let i=1;i<rows.length;i++){
      const r=rows[i]; if(!r[0]) continue;
      const hiddenBy=r[8]?r[8].split(',').filter(Boolean):[];
      if(!hiddenBy.includes(currentUser.email)) continue;
      if(r[4]!==currentUser.email) continue;
      cards.push({id:r[0],text:r[1],type:r[2],color:r[3],author:r[4],date:r[5]});
    }
    _archiveCache=[...cards];
    renderArchive(cards);
  }).catch(()=>{
    document.getElementById('archive-list').innerHTML='<p style="font-size:12px;color:#9ca3af;text-align:center">불러오기 실패</p>';
  });
}

function renderArchive(cards){
  const list=document.getElementById('archive-list');
  if(!cards.length){ list.innerHTML='<p style="font-size:12px;color:#9ca3af;text-align:center">보관된 카드가 없어요.</p>'; return; }
  list.innerHTML=cards.map(c=>{
    const col=typeToColor(c.type);
    return `<div class="archive-item ${col}">
      <div class="archive-item-text">${escHtml(c.text)}</div>
      <div class="archive-item-meta">${c.date}</div>
      <div class="archive-item-actions">
        <button class="btn-repost" onclick="repostCard('${c.id}')">재게시</button>
        <button class="btn-archive-del" onclick="deleteArchivedCard('${c.id}')">삭제</button>
      </div>
    </div>`;
  }).join('');
}

function repostCard(id){
  gas({action:'repostCard',id})
  .then(()=>{
    _archiveCache=_archiveCache.filter(c=>c.id!==id);
    renderArchive(_archiveCache);
    reloadAfterAction('카드를 다시 게시했어요 ✨', 5);
  })
  .catch(()=>{ showAlert('❌','오류','재게시 중 오류가 발생했어요.'); });
}

function deleteArchivedCard(id){
  showConfirm('🗑','카드 삭제','이 카드를 완전히 삭제할까요?<br>되돌릴 수 없습니다.','삭제','btn-danger',()=>{
    gas({action:'deleteCard',id})
    .then(()=>{
      _archiveCache=_archiveCache.filter(c=>c.id!==id);
      renderArchive(_archiveCache);
      showToast('카드를 삭제했어요.');
    })
    .catch(()=>{ showAlert('❌','오류','삭제 중 오류가 발생했어요.'); });
  });
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// 액션 후 리로드
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function reloadAfterAction(toastMsg, waitSec=4){
  allCards=[];
  document.getElementById('cards-container').innerHTML='';
  showProgress('시트에 반영 중...', waitSec);
  setTimeout(()=>{
    hideProgress();
    loadMembersAndCards();
    showToast(toastMsg);
  }, waitSec*1000);
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// 토스트
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function showToast(msg){
  if(!msg) return;
  let t=document.getElementById('toast');
  if(!t){ t=document.createElement('div'); t.id='toast';
    t.style.cssText='position:fixed;bottom:5rem;left:50%;transform:translateX(-50%);background:#1a1a1a;color:#fff;padding:9px 20px;border-radius:99px;font-size:12px;font-weight:500;font-family:var(--fn);z-index:999;opacity:0;transition:opacity .2s;pointer-events:none;white-space:nowrap';
    document.body.appendChild(t);
  }
  t.textContent=msg; t.style.opacity='1';
  setTimeout(()=>{ t.style.opacity='0'; },2200);
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// Post 알리기
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
const CSV_MAILTO  = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRlaICJucqoPp-IUQzEU5Z0xKfY8CYLym7dVYlMSSndi3kUD2sBczVi84zE0dglr9TOJEyYnEuJ-SL5/pub?gid=1557750800&single=true&output=csv";
const CSV_RECIPIENTS = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTl_lyF4ykH7Kbs_Y8wOUPNeru3HSReqZUwzBNLAGHJDoXA3g8TuQsa-efBkwtBiXudxTknoz4CX1NE/pub?gid=0&single=true&output=csv";
const DEFAULT_NOTIFY_MSG = 'IMTI에 새로운 Post-it이 게시되었습니다. IMTI 운영자 모드로 접속하여 게시된 Post-it을 확인해 주세요.';

function openNotifyModal(){
  const list     = document.getElementById('notify-email-list');
  const textarea = document.getElementById('notify-msg');
  list.innerHTML = '<span style="font-size:12px;color:#9ca3af">목록 불러오는 중...</span>';
  textarea.value = DEFAULT_NOTIFY_MSG;
  document.getElementById('notify-overlay').classList.add('open');

  const t = '&t=' + Date.now();
  Promise.all([
    fetch(CSV_RECIPIENTS + t, {cache:'no-store'}).then(r => r.text()),
    fetch(CSV_MAILTO     + t, {cache:'no-store'}).then(r => r.text())
  ]).then(([recipientText, mailtoText]) => {
    const recipientRows = parseCSV(recipientText);
    const emails = [];
    for(let i = 1; i < recipientRows.length; i++){
      const b = (recipientRows[i][1] || '').trim();
      if(b && b !== currentUser.email) emails.push(b);
    }
    const mailtoRows = parseCSV(mailtoText);
    const sheetMsg = mailtoRows[1] && (mailtoRows[1][2] || '').trim();
    if(sheetMsg) textarea.value = sheetMsg;

    if(!emails.length){
      list.innerHTML = '<span style="font-size:12px;color:#9ca3af">수신자 이메일을 찾을 수 없어요.</span>';
      return;
    }
    list.innerHTML = emails.map(e => `
      <label class="member-check sel notify-chip" data-email="${escHtml(e)}" style="cursor:pointer">
        <input type="checkbox" checked style="display:none" data-email="${escHtml(e)}">
        ${escHtml(e)}
      </label>`).join('');
    list.querySelectorAll('.notify-chip').forEach(chip => {
      chip.addEventListener('click', () => {
        const cb = chip.querySelector('input');
        cb.checked = !cb.checked;
        chip.classList.toggle('sel', cb.checked);
      });
    });
  }).catch(() => {
    list.innerHTML = '<span style="font-size:12px;color:#ef4444">불러오기 실패. 다시 시도해 주세요.</span>';
  });
}

function notifySelectAll(){
  document.querySelectorAll('#notify-email-list .notify-chip').forEach(chip => {
    chip.querySelector('input').checked = true;
    chip.classList.add('sel');
  });
}
function notifySelectNone(){
  document.querySelectorAll('#notify-email-list .notify-chip').forEach(chip => {
    chip.querySelector('input').checked = false;
    chip.classList.remove('sel');
  });
}

function sendNotify(){
  const chips = [...document.querySelectorAll('#notify-email-list .notify-chip.sel')];
  const selected = chips.map(chip => chip.dataset.email).filter(Boolean);
  if(!selected.length){ showAlert('⚠️','수신자 없음','수신할 운영진을 한 명 이상 선택해 주세요.'); return; }
  const msg = document.getElementById('notify-msg').value.trim();
  if(!msg){ showAlert('⚠️','내용 없음','발송할 메시지를 입력해 주세요.'); return; }

  const btn = document.getElementById('notify-send-btn');
  btn.disabled = true; btn.textContent = '발송 중…';

  gas({ action: 'sendNotify', to: selected.join(','), message: msg })
    .then(res => {
      btn.disabled = false; btn.textContent = '📨 발송';
      closeOverlay('notify-overlay');
      if(res.status === 'OK' || res.status === 'PARTIAL'){
        showToast(`알림 메일을 ${res.sent}명에게 발송했어요 📨`);
      } else {
        showAlert('❌','발송 실패', res.msg || res.error || '메일 발송 중 오류가 발생했어요.');
      }
    })
    .catch(() => {
      btn.disabled = false; btn.textContent = '📨 발송';
      showAlert('❌','오류','메일 발송 중 오류가 발생했어요. 잠시 후 다시 시도해 주세요.');
    });
}

// 오버레이 바깥 클릭 닫기
['add-overlay','detail-overlay','archive-overlay','edit-overlay','alert-overlay','notify-overlay'].forEach(id=>{
  document.getElementById(id).addEventListener('click',e=>{
    if(e.target.id===id) closeOverlay(id);
  });
});
</script>
