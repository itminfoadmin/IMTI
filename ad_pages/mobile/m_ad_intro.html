<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>IMTI - Admin Door</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&family=Noto+Sans+KR:wght@400;500;700;900&family=Gowun+Batang:wght@400;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../ad_common.css">
    <style>
        html, body {
            margin: 0; padding: 0;
            min-height: 100vh;
            background: #fff;
            -webkit-text-size-adjust: 100%;
        }
        body {
            display: flex; flex-direction: column;
            overflow-x: hidden;
        }

        /* Navbar placeholder injected here keeps its own sticky header */

        .main {
            flex: 1; display: flex; flex-direction: column;
            margin: 12px; border: 1px dashed #ced4da; border-radius: 4px;
            min-height: 0; position: relative;
            box-sizing: border-box;
        }

        /* ── Dashboard: responsive grid instead of single cramped row ── */
        .dashboard {
            flex: 1;
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 14px;
            padding: 22px 16px;
            align-content: start;
        }
        .stat-card {
            display: flex; flex-direction: column; align-items: center;
            justify-content: center; gap: 10px;
            min-width: 0;
            padding: 22px 10px;
            border: 1px solid #f1f3f5; border-radius: 6px;
            background: #fff;
        }
        .stat-number {
            font-family: 'Gowun Batang', serif;
            font-size: clamp(1.8rem, 11vw, 3.2rem); font-weight: 500; color: #343a40;
            line-height: 1; width: 100%; text-align: center;
            letter-spacing: -0.03em; white-space: nowrap; overflow: hidden;
        }
        .stat-label {
            font-family: 'Gowun Batang', serif;
            font-size: clamp(0.62rem, 3vw, 0.78rem); font-weight: 500; color: #6c757d;
            letter-spacing: 0.06em; text-align: center; white-space: normal;
            text-transform: uppercase; width: 100%; line-height: 1.3;
        }
        .stat-label::before { content: '> '; color: #adb5bd; }

        /* On very narrow screens (<360px) the labels can wrap; that's fine */

        .loading-wrap {
            flex: 1; display: flex; align-items: center; justify-content: center; gap: 10px;
            font-family: 'Gowun Batang', serif; font-size: 0.9rem; color: #adb5bd;
            padding: 60px 0;
        }
        .spinner {
            width: 20px; height: 20px; border: 2px solid #e9ecef; border-top-color: #adb5bd;
            border-radius: 50%; animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<!-- Mobile navbar injected here -->
<div id="m-navbar-mount"></div>

<div class="main" id="main-wrap">
    <div class="loading-wrap" id="loading-wrap">
        <div class="spinner"></div>
        <span>Loading...</span>
    </div>
    <div class="dashboard" id="dashboard" style="display:none;"></div>
</div>

<script src="m_ad_common.js"></script>
<script>
window.__pageInit = function() {
    const SHEET_ID = '2PACX-1vQRxi28M9azVIO7Nyp3wpr5PUuCUSDNXMwuIbPZ-KaZxuPUVVF15zFlfAao0QttcGN4BJJcZQLikqv_';
    const GID      = '557422957';
    const CSV_URL  = `https://docs.google.com/spreadsheets/d/e/${SHEET_ID}/pub?gid=${GID}&single=true&output=csv`;

    const DATA_ROW    = 2;
    const LABEL_ROW   = 4;
    const COL_INDEXES = [1, 3, 5, 7, 9, 11];

    function parseCSV(text) {
        return text.split('\n').map(row => {
            const cells = [];
            let cur = '', inQ = false;
            for (let i = 0; i < row.length; i++) {
                const ch = row[i];
                if (ch === '"') { inQ = !inQ; }
                else if (ch === ',' && !inQ) { cells.push(cur.trim()); cur = ''; }
                else { cur += ch; }
            }
            cells.push(cur.trim());
            return cells;
        });
    }

    function render(rows) {
        const dashboard = document.getElementById('dashboard');
        const loading   = document.getElementById('loading-wrap');
        dashboard.innerHTML = '';
        const dataRow  = rows[DATA_ROW]  || [];
        const labelRow = rows[LABEL_ROW] || [];
        COL_INDEXES.forEach(idx => {
            const num   = (dataRow[idx]  || '—').replace(/"/g, '').trim();
            const label = (labelRow[idx] || '').replace(/"/g, '').trim();
            const card = document.createElement('div');
            card.className = 'stat-card';
            card.innerHTML =
                '<div class="stat-number">' + num + '</div>' +
                '<div class="stat-label">'  + label + '</div>';
            dashboard.appendChild(card);
        });
        loading.style.display   = 'none';
        dashboard.style.display = 'grid';
        setTimeout(fitNumbers, 50);
    }

    fetch(CSV_URL)
        .then(r => { if (!r.ok) throw new Error('fetch failed'); return r.text(); })
        .then(text => render(parseCSV(text)))
        .catch(err => {
            console.error('[m_ad_intro] CSV fetch error:', err);
            document.getElementById('loading-wrap').innerHTML =
                '<span style="color:#e03131;">Failed to load data. Please refresh the page.</span>';
        });

    /* Auto-shrink oversized stat numbers to fit each card */
    function fitNumbers() {
        document.querySelectorAll('.stat-number').forEach(function(el) {
            el.style.fontSize = '';
            var size   = parseFloat(getComputedStyle(el).fontSize);
            var parent = el.parentElement;
            if (parent && parent.clientWidth > 0) {
                while (el.scrollWidth > parent.clientWidth && size > 14) {
                    size -= 2;
                    el.style.fontSize = size + 'px';
                }
            }
        });
    }
    window.addEventListener('resize', fitNumbers);
    window.addEventListener('orientationchange', function(){ setTimeout(fitNumbers, 200); });
};
</script>
</body>
</html>
