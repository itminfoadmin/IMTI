<!-- IMTI Admin — Mobile Navigation Bar -->
<style>
    /* ── Mobile Top Nav ── */
    #m-admin-topnav {
        display: flex; align-items: center; justify-content: space-between;
        height: 56px; padding: 0 14px;
        background: #fff; border-bottom: 1px solid #e9ecef;
        position: sticky; top: 0; z-index: 500;
    }
    #m-admin-topnav .m-topnav-logo-img {
        height: 34px; width: auto; display: block;
    }
    #m-admin-topnav .m-hamburger {
        width: 40px; height: 40px; display: flex; flex-direction: column;
        align-items: center; justify-content: center; gap: 5px;
        background: none; border: none; cursor: pointer; padding: 0;
    }
    #m-admin-topnav .m-hamburger span {
        display: block; width: 22px; height: 2px; background: #343a40;
        transition: transform 0.25s ease, opacity 0.25s ease;
    }
    #m-admin-topnav .m-hamburger.open span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
    #m-admin-topnav .m-hamburger.open span:nth-child(2) { opacity: 0; }
    #m-admin-topnav .m-hamburger.open span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }

    /* ── Slide-down Drawer ── */
    .m-nav-overlay {
        position: fixed; inset: 0; top: 56px;
        background: rgba(0,0,0,0.35);
        opacity: 0; visibility: hidden; transition: opacity 0.25s ease, visibility 0.25s ease;
        z-index: 400;
    }
    .m-nav-overlay.open { opacity: 1; visibility: visible; }

    .m-nav-drawer {
        position: fixed; top: 56px; left: 0; right: 0;
        background: #fff; border-bottom: 1px solid #e9ecef;
        max-height: calc(100vh - 56px); overflow-y: auto;
        transform: translateY(-110%); transition: transform 0.28s ease;
        z-index: 450;
        font-family: 'DM Mono', monospace;
    }
    .m-nav-drawer.open { transform: translateY(0); }

    .m-nav-item {
        display: flex; align-items: center; justify-content: space-between;
        width: 100%; box-sizing: border-box;
        padding: 16px 20px; background: none; border: none;
        border-bottom: 1px solid #f1f3f5;
        font-family: 'DM Mono', monospace; font-size: 0.82rem; letter-spacing: 0.04em;
        color: #343a40; text-align: left; cursor: pointer;
    }
    .m-nav-item:active { background: #f8f9fa; }
    .m-nav-item.current { font-weight: 700; color: #1c1c1c; }
    .m-nav-item.current::before { content: '› '; color: #adb5bd; margin-right: 4px; }

    /* Collapsible group */
    .m-nav-group > .m-nav-item .m-caret {
        font-size: 0.7rem; opacity: 0.5; transition: transform 0.2s ease;
    }
    .m-nav-group.open > .m-nav-item .m-caret { transform: rotate(180deg); }

    .m-nav-sub {
        max-height: 0; overflow: hidden; background: #f8f9fa;
        transition: max-height 0.28s ease;
    }
    .m-nav-group.open .m-nav-sub { max-height: 320px; }
    .m-nav-sub .m-nav-item {
        padding-left: 38px; font-size: 0.78rem; color: #495057;
        border-bottom: 1px solid #eceff1;
    }
    .m-nav-sub .m-nav-item:last-child { border-bottom: none; }
</style>

<nav id="m-admin-topnav">
    <div class="m-topnav-logo-area">
        <img src="../../img/logo-main_con.png" alt="IMTI" class="m-topnav-logo-img"
             onclick="location.href='m_ad_intro.html'">
    </div>
    <button class="m-hamburger" id="m-hamburger" onclick="mToggleNav()" aria-label="menu">
        <span></span><span></span><span></span>
    </button>
</nav>

<div class="m-nav-overlay" id="m-nav-overlay" onclick="mCloseNav()"></div>

<div class="m-nav-drawer" id="m-nav-drawer">
    <button class="m-nav-item" onclick="location.href='m_ad_intro.html'">DASH-BOARD</button>
    <button class="m-nav-item" onclick="location.href='m_ad_mti_article_mng.html'">ARTICLES_ANALYSIS</button>
    <button class="m-nav-item" onclick="location.href='m_ad_admin_postit.html'">POST-IT</button>

    <div class="m-nav-group" id="m-group-management">
        <button class="m-nav-item" onclick="mToggleGroup('m-group-management')">
            <span>MANAGEMENT</span><span class="m-caret">▾</span>
        </button>
        <div class="m-nav-sub">
            <button class="m-nav-item" onclick="location.href='m_ad_member_mng.html'">MEMBER MNG.</button>
            <button class="m-nav-item" onclick="location.href='m_ad_mti_mng.html'">MTI MNG.</button>
            <button class="m-nav-item" onclick="location.href='m_ad_mti_com_mng.html'">EXPCOMMENT MNG.</button>
            <button class="m-nav-item" onclick="location.href='m_ad_notice_mng.html'">NOTICE MNG.</button>
        </div>
    </div>

    <div class="m-nav-group" id="m-group-adminmng">
        <button class="m-nav-item" onclick="mToggleGroup('m-group-adminmng')">
            <span>ADMIN-MNG</span><span class="m-caret">▾</span>
        </button>
        <div class="m-nav-sub">
            <button class="m-nav-item" onclick="location.href='m_ad_pass_mng.html'">ADMIN_PW</button>
            <button class="m-nav-item" onclick="location.href='m_ad_add_ad.html'">ADMIN_ADD</button>
        </div>
    </div>

    <button class="m-nav-item" onclick="window.open('m_ad_music_video.html','_blank')">Music</button>
    <button class="m-nav-item" onclick="openLogoutPopup()">LOG-OUT</button>
</div>

<!-- Logout Popup -->
<div class="popup-overlay" id="logout-popup">
    <div class="popup-box">
        <p class="popup-message">Would you like to log out as an administrator?</p>
        <div class="popup-btn-row">
            <button class="popup-cancel-btn" onclick="closeLogoutPopup()">Cancel</button>
            <button class="popup-confirm-btn" id="logout-confirm-btn" onclick="handleAdminLogout()">Confirm</button>
        </div>
    </div>
</div>

<script>
    function mToggleNav() {
        const drawer  = document.getElementById('m-nav-drawer');
        const overlay = document.getElementById('m-nav-overlay');
        const burger  = document.getElementById('m-hamburger');
        const willOpen = !drawer.classList.contains('open');
        drawer.classList.toggle('open', willOpen);
        overlay.classList.toggle('open', willOpen);
        burger.classList.toggle('open', willOpen);
        document.body.style.overflow = willOpen ? 'hidden' : '';
    }
    function mCloseNav() {
        document.getElementById('m-nav-drawer').classList.remove('open');
        document.getElementById('m-nav-overlay').classList.remove('open');
        document.getElementById('m-hamburger').classList.remove('open');
        document.body.style.overflow = '';
    }
    function mToggleGroup(id) {
        const el = document.getElementById(id);
        const isOpen = el.classList.contains('open');
        document.querySelectorAll('.m-nav-group.open').forEach(g => g.classList.remove('open'));
        if (!isOpen) el.classList.add('open');
    }

    /* Highlight the current page + auto-expand its group */
    (function mMarkActive() {
        const cur = location.pathname.split('/').pop();
        document.querySelectorAll('#m-nav-drawer .m-nav-item[onclick]').forEach(btn => {
            const m = btn.getAttribute('onclick').match(/location\.href='([^']+)'/);
            if (m && m[1] === cur) {
                btn.classList.add('current');
                const grp = btn.closest('.m-nav-group');
                if (grp) grp.classList.add('open');
            }
        });
    })();
</script>
