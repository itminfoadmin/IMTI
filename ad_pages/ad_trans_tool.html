<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IMTI - Image Translator</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&family=Noto+Sans+KR:wght@400;500;700;900&family=Gowun+Batang:wght@400;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
    /* ad_common.css stubs — standalone fallback */
    .model-dot { display:inline-block; width:8px; height:8px; border-radius:50%; background:var(--gray-light); margin-right:6px; vertical-align:middle; }
    .model-dot.ready { background:var(--ok); }
    .model-dot.loading { background:var(--amber); }
    .model-dot.err { background:var(--err); }
    #modelStatus { font-family:'DM Mono',monospace; font-size:0.68rem; color:var(--gray); display:flex; align-items:center; }
</style>
<style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
        --ink: #343a40; --ink-soft: #495057; --gray: #6c757d; --gray-light: #adb5bd;
        --line: #e9ecef; --bg: #fff; --rose: #d47878; --amber: #d49860;
        --rose-soft: #faf0f0; --err: #e03131; --ok: #2f9e44;
    }
    html { font-size: 15px; }
    body {
        font-family: 'Noto Sans KR', sans-serif; background: var(--bg); color: var(--ink);
        height: 100vh; overflow: hidden; display: flex; flex-direction: column;
        -webkit-font-smoothing: antialiased; font-synthesis: none;
    }
    .wrap { flex: 1; min-height: 0; padding: 16px 5% 18px 5%; display: flex; flex-direction: column; gap: 12px; }

    /* ── Page Header ── */
    .page-header {
        display: flex; align-items: center;
        padding: 0 5%; height: 52px; min-height: 52px;
        border-bottom: 1px solid var(--line); flex-shrink: 0;
        background: var(--bg);
    }
    .page-title {
        font-family: 'DM Mono', monospace; font-size: 1.8rem; font-weight: 600;
        letter-spacing: 0.16em; text-transform: uppercase; color: var(--ink-soft);
    }
    .page-title span { color: var(--rose); }



    /* 3 columns: image | vertical progress | result */
    .cols { flex: 1; min-height: 0; display: grid; grid-template-columns: 1fr 26px 1fr; gap: 22px; }
    @media (max-width: 760px) { .cols { grid-template-columns: 1fr; } }
    .col { display: flex; flex-direction: column; min-height: 0; }
    .col-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; flex-shrink: 0; gap: 10px; height: 38px; min-height: 38px; }
    .col-label { font-family: 'DM Mono', monospace; font-size: 0.85rem; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: var(--ink-soft); flex-shrink: 0; }
    .col-label::before { content: '> '; color: var(--gray-light); }
    .status-msg { font-family: 'DM Mono', monospace; font-size: 0.66rem; letter-spacing: 0.04em; color: var(--amber); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex-shrink: 1; min-width: 0; }
    .status-msg.err { color: var(--err); }
    .status-msg.ok { color: var(--ok); }
    .head-spacer { flex: 1; min-width: 0; }
    .btns { display: flex; gap: 8px; flex-wrap: nowrap; flex-shrink: 0; }

    .btn { padding: 8px 13px; border: none; border-radius: 3px; background: var(--ink); color: #fff; font-family: 'DM Mono', monospace; font-size: 0.7rem; letter-spacing: 0.08em; text-transform: uppercase; cursor: pointer; transition: background 0.2s, transform 0.1s; white-space: nowrap; }
    .btn:hover:not(:disabled) { background: var(--rose); }
    .btn:active:not(:disabled) { transform: translateY(1px); }
    .btn:disabled { background: var(--line); color: var(--gray-light); cursor: not-allowed; }
    .btn.ghost { background: #868e96; }
    .btn.ghost:hover:not(:disabled) { background: var(--ink); }

    .img-area { flex: 1; min-height: 0; border: 1px dashed var(--gray-light); border-radius: 3px; display: flex; align-items: center; justify-content: center; overflow: hidden; background: #fcfcfd; padding: 35px 0; }
    .img-area img { height: 100%; width: 100%; object-fit: contain; }
    .img-area img.pannable { cursor: grab; }
    .img-area img.panning { cursor: grabbing; }
    .img-placeholder { text-align: center; padding: 30px; }
    .img-placeholder .ico { font-family: 'Playfair Display', serif; font-size: 2.4rem; color: var(--rose); margin-bottom: 12px; }
    .img-placeholder .main { font-size: 0.92rem; color: var(--ink-soft); font-weight: 500; }
    .img-placeholder .hint { font-family: 'DM Mono', monospace; font-size: 0.66rem; color: var(--gray-light); letter-spacing: 0.06em; margin-top: 8px; line-height: 1.7; }

    /* vertical progress between the two boxes; matches image box height */
    .vprog-col { display: flex; flex-direction: column; }
    .vprog-spacer { height: 38px; min-height: 38px; margin-bottom: 12px; flex-shrink: 0; } /* aligns with col-head height */
    .vprog { flex: 1; min-height: 0; display: flex; flex-direction: column; align-items: center; gap: 8px; }
    .vprog-track { flex: 1; width: 8px; background: var(--line); border-radius: 99px; overflow: hidden; position: relative; opacity: 0; transition: opacity 0.2s; }
    .vprog-track.show { opacity: 1; }
    .vprog-fill { position: absolute; bottom: 0; left: 0; width: 100%; height: 0%; background: var(--gray-light); border-radius: 99px; transition: height 0.3s ease; }
    .vprog-text { display: none; }

    .result-box { flex: 1; min-height: 0; border: 1px dashed var(--gray-light); border-radius: 3px; padding: 35px 120px; overflow-y: auto; scrollbar-width: thin; background: repeating-linear-gradient(0deg, transparent, transparent 27px, #f8f9fa 27px, #f8f9fa 28px); }
    .result-empty { height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px; text-align: center; }
    .result-empty .big { font-family: 'Playfair Display', serif; font-style: italic; font-size: 1.3rem; color: var(--gray-light); }
    .result-empty .sm { font-family: 'DM Mono', monospace; font-size: 0.68rem; letter-spacing: 0.08em; color: var(--gray-light); max-width: 320px; line-height: 1.8; }
    /* ── Screen Capture Overlay ── */
    #captureOverlay {
        display: none; position: fixed; inset: 0; z-index: 99999;
        cursor: crosshair;
    }
    #captureOverlay.active { display: block; }
    #captureCanvas {
        position: absolute; inset: 0; width: 100%; height: 100%;
    }
    #captureSelection {
        position: absolute; border: 2px solid var(--rose);
        box-shadow: 0 0 0 9999px rgba(0,0,0,0.45);
        pointer-events: none;
    }
    #captureHint {
        position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%);
        background: var(--ink); color: #fff;
        font-family: 'DM Mono', monospace; font-size: 0.72rem; letter-spacing: 0.08em;
        padding: 8px 18px; border-radius: 3px; pointer-events: none;
        white-space: nowrap;
    }

    .res-ko { font-family: 'Gowun Batang', serif; font-size: 1.08rem; font-weight: 700; color: var(--ink); line-height: 2; white-space: pre-wrap; }
    .res-ko[contenteditable="true"] { outline: none; background: #fffef8; border-radius: 3px; box-shadow: inset 0 0 0 1px var(--amber); padding: 8px 10px; }
    .res-run { font-family: 'DM Mono', monospace; font-size: 0.72rem; color: var(--amber); }
</style>
</head>
<body>

<!-- Screen Capture Overlay -->
<div id="captureOverlay">
    <canvas id="captureCanvas"></canvas>
    <div id="captureSelection" style="display:none"></div>
    <div id="captureHint">드래그하여 캡쳐할 영역을 선택하세요 &nbsp;·&nbsp; ESC 취소</div>
</div>

<header class="page-header">
    <div class="page-title">Eng_Img <span>to</span> Korean</div>
    <span style="flex:1"></span>
    <span id="modelStatus"><span class="model-dot" id="modelDot"></span><span id="modelText">초기화 중…</span></span>
</header>

<div class="wrap">
    <div class="cols">
        <!-- LEFT: image -->
        <div class="col">
            <div class="col-head">
                <span class="col-label">Source Image</span>
                <span class="status-msg" id="statusMsgL"></span>
                <span class="head-spacer"></span>
                <div class="btns">
                    <button class="btn" id="captureBtn">이미지 캡쳐</button>
                    <button class="btn" id="pasteBtn">붙여넣기</button>
                    <button class="btn" id="pauseBtn" disabled>멈춤</button>
                    <button class="btn ghost" id="imgZoomOutBtn" disabled>&minus; 이미지</button>
                    <button class="btn ghost" id="imgZoomInBtn" disabled>&plus; 이미지</button>
                    <button class="btn ghost" id="resetBtn">초기화</button>
                </div>
            </div>
            <div class="img-area" id="imgArea">
                <div class="img-placeholder" id="imgPlaceholder">
                    <div class="ico">&#9112;</div>
                    <div class="main">복사한 이미지를 붙여넣으세요</div>
                    <div class="hint">위 "붙여넣기" 버튼 또는 Ctrl+V (Mac: &#8984;+V)<br>붙여넣으면 자동으로 번역이 시작됩니다</div>
                </div>
            </div>
        </div>

        <!-- MIDDLE: vertical progress -->
        <div class="vprog-col">
            <div class="vprog-spacer"></div>
            <div class="vprog">
                <div class="vprog-text" id="vprogText"></div>
                <div class="vprog-track" id="vprogTrack"><div class="vprog-fill" id="vprogFill"></div></div>
            </div>
        </div>

        <!-- RIGHT: result -->
        <div class="col">
            <div class="col-head">
                <span class="col-label">Korean Translation</span>
                <span class="status-msg" id="statusMsgR"></span>
                <span class="head-spacer"></span>
                <div class="btns">
                    <button class="btn ghost" id="zoomOutBtn">&minus; 축소</button>
                    <button class="btn ghost" id="zoomInBtn">&plus; 확대</button>
                    <button class="btn ghost" id="editBtn" disabled>편집</button>
                    <button class="btn ghost" id="copyBtn" disabled>복사</button>
                </div>
            </div>
            <div class="result-box" id="resultBox">
                <div class="result-empty" id="resultEmpty">
                    <div class="big">No translation yet.</div>
                    <div class="sm">왼쪽에 이미지를 붙여넣으면 글자를 읽어 여기에 한국어로 표시됩니다. 모든 처리는 브라우저 안에서 이루어집니다.</div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
<script>
(function() {

const els = {
    pasteBtn: document.getElementById('pasteBtn'),
    pauseBtn: document.getElementById('pauseBtn'),
    imgZoomOutBtn: document.getElementById('imgZoomOutBtn'),
    imgZoomInBtn: document.getElementById('imgZoomInBtn'),
    resetBtn: document.getElementById('resetBtn'),
    zoomOutBtn: document.getElementById('zoomOutBtn'),
    zoomInBtn: document.getElementById('zoomInBtn'),
    editBtn: document.getElementById('editBtn'),
    copyBtn: document.getElementById('copyBtn'),
    imgArea: document.getElementById('imgArea'),
    imgPlaceholder: document.getElementById('imgPlaceholder'),
    resultBox: document.getElementById('resultBox'),
    resultEmpty: document.getElementById('resultEmpty'),
    statusMsgL: document.getElementById('statusMsgL'),
    statusMsgR: document.getElementById('statusMsgR'),
    vprogTrack: document.getElementById('vprogTrack'),
    vprogFill: document.getElementById('vprogFill'),
    vprogText: document.getElementById('vprogText'),
    modelDot: document.getElementById('modelDot'),
    modelText: document.getElementById('modelText'),
};

let currentUrl = null;
let workerReady = false;
let busy = false;
let paused = false;
let pauseResolvers = [];
let koFontSize = 1.08; // rem, controlled by zoom buttons
let imgScale = 1;      // image zoom controlled by image +/- buttons
let imgPanX = 0, imgPanY = 0;   // image pan offset (px) from hand tool
let panning = false, panStartX = 0, panStartY = 0, panOriginX = 0, panOriginY = 0;

function setProg(show, text, pct) {
    els.vprogTrack.classList.toggle('show', show);
    els.vprogText.classList.toggle('show', show);
    if (text != null) els.vprogText.textContent = text;
    if (pct != null) els.vprogFill.style.height = Math.max(0, Math.min(100, pct)) + '%';
}
function setModel(state, text) {
    if (els.modelDot) els.modelDot.className = 'model-dot' + (state ? ' ' + state : '');
    if (els.modelText) els.modelText.textContent = text;
}
function escapeHtml(s) {
    return String(s).replace(/[&<>"]/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;' }[c]));
}
function showImage(url) {
    if (currentUrl) URL.revokeObjectURL(currentUrl);
    currentUrl = url;
    imgScale = 1;
    imgPanX = 0; imgPanY = 0;
    els.imgArea.innerHTML = '<img src="' + url + '" alt="" style="transform:translate(0px,0px) scale(1); transition:transform 0.15s;">';
    els.imgZoomOutBtn.disabled = false;
    els.imgZoomInBtn.disabled = false;
    setupPan();
}
function applyImgTransform(animate) {
    const img = els.imgArea.querySelector('img');
    if (!img) return;
    img.style.transition = animate ? 'transform 0.15s' : 'none';
    img.style.transform = 'translate(' + imgPanX + 'px,' + imgPanY + 'px) scale(' + imgScale + ')';
    img.classList.toggle('pannable', imgScale > 1);
    if (imgScale <= 1) img.classList.remove('panning');
}
function applyImgZoom() {
    if (imgScale <= 1) { imgPanX = 0; imgPanY = 0; }  // recenter when not zoomed in
    applyImgTransform(true);
}
function setupPan() {
    const img = els.imgArea.querySelector('img');
    if (!img) return;
    img.addEventListener('mousedown', (e) => {
        if (imgScale <= 1) return;
        panning = true;
        panStartX = e.clientX; panStartY = e.clientY;
        panOriginX = imgPanX; panOriginY = imgPanY;
        img.classList.add('panning');
        e.preventDefault();
    });
}
window.addEventListener('mousemove', (e) => {
    if (!panning) return;
    imgPanX = panOriginX + (e.clientX - panStartX);
    imgPanY = panOriginY + (e.clientY - panStartY);
    applyImgTransform(false);
});
window.addEventListener('mouseup', () => {
    if (!panning) return;
    panning = false;
    const im = els.imgArea.querySelector('img');
    if (im) im.classList.remove('panning');
});
function setResultEmpty() { els.resultBox.innerHTML = ''; els.resultBox.appendChild(els.resultEmpty); }
function setStatusR(text, kind) {
    els.statusMsgR.textContent = text || '';
    els.statusMsgR.className = 'status-msg' + (kind ? ' ' + kind : '');
}
function clearStatusR() { setStatusR('', ''); }
function setStatusL(text, kind) {
    els.statusMsgL.textContent = text || '';
    els.statusMsgL.className = 'status-msg' + (kind ? ' ' + kind : '');
}
function clearStatusL() { setStatusL('', ''); }
function setResultKo(ko) { els.resultBox.innerHTML = '<div class="res-ko" style="font-size:' + koFontSize + 'rem">' + escapeHtml(ko) + '</div>'; }

function applyKoZoom() {
    const el = els.resultBox.querySelector('.res-ko');
    if (el) el.style.fontSize = koFontSize + 'rem';
}

// resolves once when not paused; if paused, waits until resume
function waitIfPaused() {
    if (!paused) return Promise.resolve();
    return new Promise(res => pauseResolvers.push(res));
}
function setPaused(p) {
    paused = p;
    els.pauseBtn.textContent = p ? '진행' : '멈춤';
    if (p) {
        setStatusL('일시정지됨 · 진행을 누르면 계속', 'err');
    } else {
        if (busy) setStatusL('진행 중…'); else clearStatusL();
        pauseResolvers.forEach(fn => fn()); pauseResolvers = [];
    }
}

// No local model anymore: translation uses free, key-less web APIs callable
// directly from a static page (GitHub Pages friendly). Primary = Google's
// public translate endpoint (best Korean quality), fallback = MyMemory.
function loadModel() {
    // Nothing to download — ready immediately.
    workerReady = true;
    setModel('ready', '번역 엔진 준비됨 (온라인)');
    return Promise.resolve();
}

async function googleTranslate(text) {
    const url = 'https://translate.googleapis.com/translate_a/single'
        + '?client=gtx&sl=en&tl=ko&dt=t&q=' + encodeURIComponent(text);
    const res = await fetch(url);
    if (!res.ok) throw new Error('google http ' + res.status);
    const data = await res.json();
    // data[0] is an array of [translatedChunk, originalChunk, ...]
    if (!Array.isArray(data) || !Array.isArray(data[0])) throw new Error('google bad response');
    return data[0].map(seg => (seg && seg[0]) ? seg[0] : '').join('');
}

async function myMemoryTranslate(text) {
    const url = 'https://api.mymemory.translated.net/get?langpair=en|ko&q='
        + encodeURIComponent(text);
    const res = await fetch(url);
    if (!res.ok) throw new Error('mymemory http ' + res.status);
    const data = await res.json();
    if (data.responseStatus !== 200 || !data.responseData) throw new Error('mymemory failed');
    return data.responseData.translatedText || '';
}

// ---- Tier 3: local in-browser model (NLLB 600M), loaded ON DEMAND ----
// Only spun up when both online services fail, so normal use stays
// download-free. Once loaded, it is cached by the browser for reuse.
let localWorker = null, localReady = false, localLoading = null;

function ensureLocalWorker() {
    if (localWorker) return;
    const workerCode = [
        'let translator = null;',
        'async function init() {',
        '  const mod = await import("https://cdn.jsdelivr.net/npm/@huggingface/transformers@3.0.2");',
        '  mod.env.allowLocalModels = false;',
        '  translator = await mod.pipeline("translation", "Xenova/nllb-200-distilled-600M", {',
        '    dtype: "q8",',
        '    progress_callback: (p) => {',
        '      if (p.status === "progress" && p.total) {',
        '        const pct = Math.round((p.loaded / p.total) * 100);',
        '        self.postMessage({ type: "dl", pct });',
        '      }',
        '    }',
        '  });',
        '  self.postMessage({ type: "ready" });',
        '}',
        'self.onmessage = async (e) => {',
        '  const d = e.data;',
        '  if (d.type === "init") { try { await init(); } catch (err) { self.postMessage({ type: "error", error: String(err) }); } return; }',
        '  if (d.type === "translate") {',
        '    try {',
        '      const out = await translator(d.text, { src_lang: "eng_Latn", tgt_lang: "kor_Hang", num_beams: 5, max_length: 512, no_repeat_ngram_size: 3 });',
        '      const ko = Array.isArray(out) ? out[0].translation_text : out.translation_text;',
        '      self.postMessage({ type: "result", id: d.id, ko });',
        '    } catch (err) {',
        '      self.postMessage({ type: "result", id: d.id, ko: "", error: String(err) });',
        '    }',
        '  }',
        '};'
    ].join('\n');
    const blob = new Blob([workerCode], { type: 'application/javascript' });
    localWorker = new Worker(URL.createObjectURL(blob), { type: 'module' });
}

function loadLocalModel() {
    if (localReady) return Promise.resolve();
    if (localLoading) return localLoading;
    ensureLocalWorker();
    setModel('loading', '로컬 모델 다운로드 중 (최초 1회)');
    localLoading = new Promise((resolve, reject) => {
        localWorker.onmessage = (e) => {
            const m = e.data;
            if (m.type === 'dl') { setModel('loading', '로컬 모델 다운로드 ' + m.pct + '%'); }
            else if (m.type === 'ready') { localReady = true; setModel('ready', '번역 엔진 준비됨 (로컬 600M)'); resolve(); }
            else if (m.type === 'error') { console.error('[로컬 모델 로딩 실패]', m.error); reject(new Error(m.error)); }
            else if (m.type === 'result') { const p = localPending.get(m.id); if (p) { localPending.delete(m.id); p(m.ko); } }
        };
        localWorker.postMessage({ type: 'init' });
    });
    return localLoading;
}

let localMsgId = 0; const localPending = new Map();
function localTranslateOne(text) {
    return new Promise((resolve) => {
        const id = ++localMsgId;
        localPending.set(id, resolve);
        localWorker.postMessage({ type: 'translate', id, text });
    });
}
// The local NLLB model has a ~512-token input window, much smaller than the
// online APIs. Split long chunks on sentence boundaries before sending.
async function localTranslate(text) {
    const LOCAL_MAX = 600;
    if (text.length <= LOCAL_MAX) return localTranslateOne(text);
    const sentences = text.match(/[^.!?]+[.!?]*/g) || [text];
    const parts = [];
    let buf = '';
    for (const s of sentences) {
        const t = s.trim();
        if (!t) continue;
        if (buf && (buf.length + 1 + t.length) > LOCAL_MAX) { parts.push(buf); buf = t; }
        else { buf = buf ? buf + ' ' + t : t; }
    }
    if (buf) parts.push(buf);
    const out = [];
    for (const p of parts) out.push(await localTranslateOne(p));
    return out.join(' ');
}

async function translate(text) {
    if (!text || !text.trim()) return '';
    // Tier 1: Google (best quality)
    try {
        return await googleTranslate(text);
    } catch (e) {
        console.warn('[기본 번역 실패, 백업 시도]', e);
    }
    // Tier 2: MyMemory
    try {
        return await myMemoryTranslate(text);
    } catch (e2) {
        console.warn('[백업 번역 실패, 로컬 모델로 전환]', e2);
    }
    // Tier 3: local model (download on first use, then cached)
    try {
        await loadLocalModel();
        return await localTranslate(text);
    } catch (e3) {
        console.error('[번역 실패: 모든 경로]', e3);
        return '[번역 실패] ' + text;
    }
}

// Preprocess for better OCR: upscale small images and boost contrast to near-B/W.
async function preprocessForOcr(url) {
    const img = await new Promise((res, rej) => {
        const im = new Image();
        im.onload = () => res(im);
        im.onerror = rej;
        im.src = url;
    });
    // Upscale so the smaller side is at least ~1600px (helps small book captures).
    const minSide = Math.min(img.naturalWidth, img.naturalHeight) || 1;
    const scale = Math.min(3, Math.max(1, 1600 / minSide));
    const w = Math.round(img.naturalWidth * scale);
    const h = Math.round(img.naturalHeight * scale);
    const canvas = document.createElement('canvas');
    canvas.width = w; canvas.height = h;
    const ctx = canvas.getContext('2d');
    ctx.imageSmoothingEnabled = true;
    ctx.imageSmoothingQuality = 'high';
    ctx.drawImage(img, 0, 0, w, h);
    // Grayscale + contrast stretch toward black text on white.
    const id = ctx.getImageData(0, 0, w, h);
    const d = id.data;
    for (let i = 0; i < d.length; i += 4) {
        let g = 0.299 * d[i] + 0.587 * d[i + 1] + 0.114 * d[i + 2];
        // soft thresholding: push mid-tones apart without hard binarizing
        g = g < 140 ? Math.max(0, g - 40) : Math.min(255, g + 40);
        d[i] = d[i + 1] = d[i + 2] = g;
    }
    ctx.putImageData(id, 0, 0);
    return canvas.toDataURL('image/png');
}

async function ocrImage(url) {
    let src = url;
    try { src = await preprocessForOcr(url); } catch (e) { src = url; }
    const { data } = await Tesseract.recognize(src, 'eng', {
        logger: msg => {
            if (msg.status === 'recognizing text') {
                setProg(true, 'OCR ' + Math.round(msg.progress * 100) + '%', 20 + msg.progress * 40);
            }
        },
        tessedit_pageseg_mode: '6',   // assume a uniform block of text (book paragraphs)
        preserve_interword_spaces: '1'
    });
    return (data.text || '').trim();
}

async function process(url) {
    if (busy) return;
    busy = true;
    paused = false;
    pauseResolvers.forEach(fn => fn()); pauseResolvers = [];
    els.pauseBtn.textContent = '멈춤';
    clearStatusL();
    els.pauseBtn.disabled = false;
    els.editBtn.disabled = true;
    els.copyBtn.disabled = true;
    els.editBtn.textContent = '편집';
    showImage(url);
    setStatusR('처리 중…'); clearStatusL();
    setResultEmpty();
    setProg(true, '준비 중', 5);

    await loadModel();
    if (!workerReady) { setStatusR('번역 엔진 준비 실패 · 새로고침 후 재시도', 'err'); setProg(false); busy = false; els.pauseBtn.disabled = true; return; }

    setProg(true, 'OCR 중', 20);
    setStatusR('글자 인식 중…');
    let en = '';
    try { en = await ocrImage(url); } catch (e) { en = ''; }

    if (!en) {
        setStatusR('이미지에서 글자를 찾지 못했습니다', 'err');
        setResultEmpty();
        setProg(false); busy = false; els.pauseBtn.disabled = true; return;
    }

    setProg(true, '번역 중', 65);
    setStatusR('번역 중…');

    // Repair OCR line-end hyphenation across the whole text first
    // (e.g. "inter-\nnational" -> "international"), then split into paragraphs.
    const dehyphenated = en.replace(/([A-Za-z])-\n\s*([a-z])/g, '$1$2');
    const paragraphs = dehyphenated.split(/\n\s*\n/).map(p => p.replace(/\s*\n\s*/g, ' ').replace(/\s+/g, ' ').trim()).filter(Boolean);

    // Context-aware chunking: translate whole paragraphs at once, keeping each
    // chunk under a character budget that the online translate endpoint handles
    // reliably per request. Long paragraphs are split on sentence boundaries and
    // regrouped into chunks rather than translated one sentence at a time.
    const MAX_CHARS = 1800;
    const chunks = [];
    for (const para of paragraphs) {
        if (para.length <= MAX_CHARS) { chunks.push({ text: para, lastInPara: true }); continue; }
        const sentences = para.match(/[^.!?]+[.!?]*/g) || [para];
        let buf = '';
        for (const s of sentences) {
            const t = s.trim();
            if (!t) continue;
            if (buf && (buf.length + 1 + t.length) > MAX_CHARS) {
                chunks.push({ text: buf, lastInPara: false });
                buf = t;
            } else {
                buf = buf ? buf + ' ' + t : t;
            }
        }
        if (buf) chunks.push({ text: buf, lastInPara: true });
        else if (chunks.length) chunks[chunks.length - 1].lastInPara = true;
    }

    const koParts = [];
    let done = 0;
    const totalUnits = chunks.length || 1;
    for (const ch of chunks) {
        await waitIfPaused();               // pause/resume gate (chunk-level)
        const ko = await translate(ch.text);
        koParts.push(ko + (ch.lastInPara ? '\n\n' : ' '));
        done++;
        setProg(true, '번역', 65 + (done / totalUnits) * 35);
    }
    setResultKo(koParts.join('').trim());   // show everything at once when finished
    setProg(true, '완료', 100);
    setStatusR('번역 완료', 'ok');
    setTimeout(() => { setProg(false); clearStatusR(); }, 1500);
    busy = false;
    els.pauseBtn.disabled = true;
    setPaused(false);
    els.editBtn.disabled = false;
    els.copyBtn.disabled = false;
}

async function pasteFromButton() {
    if (busy) return;
    if (!navigator.clipboard || !navigator.clipboard.read) {
        setStatusL('버튼 붙여넣기 미지원 · Ctrl+V 사용', 'err');
        return;
    }
    try {
        const items = await navigator.clipboard.read();
        for (const item of items) {
            const type = item.types.find(t => t.startsWith('image/'));
            if (type) { const blob = await item.getType(type); clearStatusL(); process(URL.createObjectURL(blob)); return; }
        }
        setStatusL('클립보드에 이미지가 없습니다 · 먼저 복사하세요', 'err');
    } catch (e) {
        setStatusL('클립보드 접근 거부됨 · Ctrl+V 로 붙여넣기', 'err');
    }
}
els.captureBtn = document.getElementById('captureBtn');

// ── Screen Capture ──────────────────────────────────────────────
(function() {
    const overlay   = document.getElementById('captureOverlay');
    const canvas    = document.getElementById('captureCanvas');
    const selection = document.getElementById('captureSelection');
    const hint      = document.getElementById('captureHint');
    const ctx       = canvas.getContext('2d');

    let stream = null, videoEl = null;
    let dragging = false, sx = 0, sy = 0;

    function stopStream() {
        if (stream) { stream.getTracks().forEach(t => t.stop()); stream = null; }
        videoEl = null;
    }

    function closeOverlay() {
        overlay.classList.remove('active');
        selection.style.display = 'none';
        stopStream();
    }

    async function startCapture() {
        if (busy) return;
        try {
            stream = await navigator.mediaDevices.getDisplayMedia({
                video: { cursor: 'always' }, audio: false
            });
        } catch (e) {
            setStatusL('화면 공유가 취소되었습니다', 'err');
            setTimeout(clearStatusL, 2000);
            return;
        }

        // Draw the captured frame onto the overlay canvas
        videoEl = document.createElement('video');
        videoEl.srcObject = stream;
        videoEl.muted = true;
        await videoEl.play();

        // Wait one frame so the video has content
        await new Promise(r => requestAnimationFrame(r));
        await new Promise(r => requestAnimationFrame(r));

        canvas.width  = window.screen.width;
        canvas.height = window.screen.height;
        canvas.style.width  = '100vw';
        canvas.style.height = '100vh';

        ctx.drawImage(videoEl, 0, 0, canvas.width, canvas.height);
        stopStream(); // screen share can stop now

        overlay.classList.add('active');
        setStatusL('영역을 드래그하여 선택하세요');
    }

    // Drag to select region
    overlay.addEventListener('mousedown', (e) => {
        if (e.button !== 0) return;
        dragging = true;
        sx = e.clientX; sy = e.clientY;
        selection.style.cssText = `display:block; left:${sx}px; top:${sy}px; width:0; height:0;`;
        e.preventDefault();
    });

    overlay.addEventListener('mousemove', (e) => {
        if (!dragging) return;
        const x = Math.min(e.clientX, sx), y = Math.min(e.clientY, sy);
        const w = Math.abs(e.clientX - sx), h = Math.abs(e.clientY - sy);
        selection.style.left   = x + 'px';
        selection.style.top    = y + 'px';
        selection.style.width  = w + 'px';
        selection.style.height = h + 'px';
    });

    overlay.addEventListener('mouseup', (e) => {
        if (!dragging) return;
        dragging = false;

        const x = Math.min(e.clientX, sx), y = Math.min(e.clientY, sy);
        const w = Math.abs(e.clientX - sx), h = Math.abs(e.clientY - sy);

        if (w < 8 || h < 8) { closeOverlay(); clearStatusL(); return; }

        // Scale from CSS pixels to actual canvas pixels
        const scaleX = canvas.width  / window.innerWidth;
        const scaleY = canvas.height / window.innerHeight;

        const crop = document.createElement('canvas');
        crop.width  = Math.round(w * scaleX);
        crop.height = Math.round(h * scaleY);
        crop.getContext('2d').drawImage(
            canvas,
            Math.round(x * scaleX), Math.round(y * scaleY),
            crop.width, crop.height,
            0, 0, crop.width, crop.height
        );

        closeOverlay();
        clearStatusL();

        crop.toBlob(blob => {
            if (blob) process(URL.createObjectURL(blob));
        }, 'image/png');
    });

    // ESC to cancel
    document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape' && overlay.classList.contains('active')) {
            closeOverlay(); clearStatusL();
        }
    });

    els.captureBtn.addEventListener('click', startCapture);
})();
// ────────────────────────────────────────────────────────────────

els.pasteBtn.addEventListener('click', pasteFromButton);

window.addEventListener('paste', (e) => {
    if (busy) return;
    const items = (e.clipboardData || window.clipboardData).items;
    for (const it of items) {
        if (it.type.startsWith('image/')) {
            const blob = it.getAsFile();
            if (blob) { process(URL.createObjectURL(blob)); e.preventDefault(); return; }
        }
    }
});

els.pauseBtn.addEventListener('click', () => {
    if (!busy) return;
    setPaused(!paused);
});

els.imgZoomInBtn.addEventListener('click', () => {
    imgScale = Math.min(5, imgScale + 0.25);
    applyImgZoom();
});
els.imgZoomOutBtn.addEventListener('click', () => {
    imgScale = Math.max(0.25, imgScale - 0.25);
    applyImgZoom();
});

els.zoomInBtn.addEventListener('click', () => {
    koFontSize = Math.min(2.2, koFontSize + 0.12);
    applyKoZoom();
});
els.zoomOutBtn.addEventListener('click', () => {
    koFontSize = Math.max(0.6, koFontSize - 0.12);
    applyKoZoom();
});

els.editBtn.addEventListener('click', () => {
    const el = els.resultBox.querySelector('.res-ko');
    if (!el) return;
    const editing = el.getAttribute('contenteditable') === 'true';
    if (editing) {
        el.removeAttribute('contenteditable');
        els.editBtn.textContent = '편집';
    } else {
        el.setAttribute('contenteditable', 'true');
        els.editBtn.textContent = '편집 완료';
        el.focus();
    }
});

els.copyBtn.addEventListener('click', async () => {
    const el = els.resultBox.querySelector('.res-ko');
    if (!el) return;
    const text = el.innerText;
    try {
        await navigator.clipboard.writeText(text);
        const orig = els.copyBtn.textContent;
        els.copyBtn.textContent = '복사됨';
        setTimeout(() => { els.copyBtn.textContent = orig; }, 1200);
    } catch (e) {
        // fallback: select the text so the user can copy manually
        const range = document.createRange();
        range.selectNodeContents(el);
        const sel = window.getSelection();
        sel.removeAllRanges(); sel.addRange(range);
        els.copyBtn.textContent = '직접 복사(Ctrl+C)';
        setTimeout(() => { els.copyBtn.textContent = '복사'; }, 1800);
    }
});

els.resetBtn.addEventListener('click', () => {
    if (currentUrl) { URL.revokeObjectURL(currentUrl); currentUrl = null; }
    els.imgArea.innerHTML = '';
    els.imgArea.appendChild(els.imgPlaceholder);
    setResultEmpty();
    setProg(false);
    setPaused(false);
    els.pauseBtn.disabled = true;
    els.editBtn.disabled = true;
    els.copyBtn.disabled = true;
    els.editBtn.textContent = '편집';
    els.imgZoomOutBtn.disabled = true;
    els.imgZoomInBtn.disabled = true;
    imgScale = 1;
    imgPanX = 0; imgPanY = 0;
    panning = false;
    clearStatusL(); clearStatusR();
});

// Online translation engine needs no download — show ready immediately.
loadModel();

})(); // standalone init
</script>
