<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IMTI - 운영진 보드</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&family=Noto+Sans+KR:wght@400;500;700;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="ad_common.css">
<style>
body { height: 100vh; overflow: hidden; }
:root {
  --y-bg:#FFF9C4;--y-bd:#E8D848;--y-tx:#4A3800;
  --b-bg:#DBEAFE;--b-bd:#93C5FD;--b-tx:#1E3A5F;
  --g-bg:#DCFCE7;--g-bd:#86EFAC;--g-tx:#14532D;
  --p-bg:#F3E8FF;--p-bd:#C084FC;--p-tx:#4A1D96;
  --accent:#3B5BDB;--accent-bg:#EEF2FF;
  --fn:'Noto Sans KR',sans-serif;
}
.main *{box-sizing:border-box}
.main{
    flex:1;display:flex;flex-direction:column;
    margin:20px;border:1px dashed #fff;border-radius:2px;
    overflow:hidden;min-height:0;
}
/* 로딩 */
.auth-loading{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px}
.auth-loading .sp2{width:22px;height:22px;border:2px solid #e9ecef;border-top-color:#adb5bd;border-radius:50%;animation:spin .8s linear infinite}
.auth-loading p{font-family:var(--fn);font-size:13px;color:#adb5bd}
@keyframes spin{to{transform:rotate(360deg)}}
/* 다이나믹 로딩 - Post-it 모티프 */
.dyn-loading{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;padding:2rem}
.dyn-stack{position:relative;width:54px;height:54px}
.dyn-stack span{position:absolute;inset:0;width:38px;height:38px;margin:auto;border-radius:6px;animation:dynFloat 1.4s ease-in-out infinite}
.dyn-stack span:nth-child(1){background:#FFE89A;transform:rotate(-10deg);animation-delay:0s}
.dyn-stack span:nth-child(2){background:#A8D8FF;transform:rotate(6deg);animation-delay:.18s}
.dyn-stack span:nth-child(3){background:#B9F3C9;transform:rotate(-2deg);animation-delay:.36s}
@keyframes dynFloat{0%,100%{transform:translateY(0) rotate(var(--r,0deg));opacity:.55}50%{transform:translateY(-9px) rotate(var(--r,0deg));opacity:1}}
.dyn-text{font-family:var(--fn);font-size:13px;color:#868e96;font-weight:600;display:flex;align-items:center;gap:2px}
.dyn-dots span{display:inline-block;animation:dynDot 1.2s infinite}
.dyn-dots span:nth-child(2){animation-delay:.2s}
.dyn-dots span:nth-child(3){animation-delay:.4s}
@keyframes dynDot{0%,80%,100%{opacity:.15;transform:translateY(0)}40%{opacity:1;transform:translateY(-3px)}}
.dyn-bar{width:160px;height:4px;border-radius:99px;background:#f1f3f5;overflow:hidden;position:relative}
.dyn-bar i{position:absolute;top:0;left:0;height:100%;width:38%;border-radius:99px;background:linear-gradient(90deg,var(--accent),#7c9bff);animation:dynBar 1.1s ease-in-out infinite}
@keyframes dynBar{0%{left:-38%}100%{left:100%}}
/* 보드 */
#board-wrap{flex:1;display:flex;flex-direction:column;overflow-y:auto;padding:24px 28px 40px;font-family:var(--fn)}
#cards-container{flex:1;display:flex;flex-direction:column;min-height:0}
.user-banner{display:none}
/* 툴바 */
.board-toolbar{display:flex;align-items:center;gap:8px;margin-bottom:22px;flex-wrap:wrap}
.filter-chips{display:flex;gap:6px;flex:1;flex-wrap:wrap}
.chip{padding:7px 16px;border-radius:99px;font-size:13px;font-weight:600;border:1.5px solid #adb5bd;background:#fff;color:#495057;cursor:pointer;font-family:var(--fn);transition:all .12s}
.chip:hover{border-color:#495057;color:#212529;background:#f8f9fa}
.chip.active{background:#212529;border-color:#212529;color:#fff}
.chip-공지{background:#F3E8FF !important;border-color:#C084FC !important;color:#4A1D96 !important}
.chip-공지:hover,.chip-공지.active{background:#C084FC !important;border-color:#4A1D96 !important;color:#fff !important}
.chip-아이디어{background:#DCFCE7 !important;border-color:#86EFAC !important;color:#14532D !important}
.chip-아이디어:hover,.chip-아이디어.active{background:#86EFAC !important;border-color:#14532D !important;color:#14532D !important}
.chip-할일{background:#DBEAFE !important;border-color:#93C5FD !important;color:#1E3A5F !important}
.chip-할일:hover,.chip-할일.active{background:#93C5FD !important;border-color:#1E3A5F !important;color:#1E3A5F !important}
.btn-refresh{padding:8px 16px;border-radius:99px;font-size:13px;font-weight:600;border:1.5px solid #adb5bd;background:#fff;color:#495057;cursor:pointer;font-family:var(--fn);transition:all .12s;white-space:nowrap}
.btn-refresh:hover{border-color:#495057;color:#212529;background:#f8f9fa}
.btn-archive{padding:8px 16px;border-radius:99px;font-size:13px;font-weight:600;border:1.5px solid #adb5bd;background:#fff;color:#495057;cursor:pointer;font-family:var(--fn);transition:all .12s;white-space:nowrap}
.btn-archive:hover{border-color:#495057;color:#212529}
.btn-conf{padding:8px 18px;border-radius:99px;background:#e9ecef;color:#212529;border:1.5px solid #ced4da;font-size:13px;font-weight:700;font-family:var(--fn);cursor:pointer;white-space:nowrap;transition:all .15s}
.btn-conf:hover{background:#dee2e6}
.btn-notify{padding:8px 18px;border-radius:99px;background:#fff7ed;color:#c2410c;border:1.5px solid #fed7aa;font-size:13px;font-weight:700;font-family:var(--fn);cursor:pointer;white-space:nowrap;transition:all .15s}
.btn-notify:hover{background:#ffedd5;border-color:#fb923c}
.btn-add{padding:10px 24px;border-radius:99px;background:#212529;color:#fff;border:none;font-size:14px;font-weight:700;font-family:var(--fn);cursor:pointer;white-space:nowrap;transition:opacity .15s}
.btn-add:hover{opacity:.82}
/* Post-it 그리드 */
.cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(315px,1fr));gap:18px;align-items:start}
.card{border-radius:10px;padding:20px;border:1px solid;display:flex;flex-direction:column;gap:13px;cursor:pointer;transition:transform .12s,box-shadow .12s;height:260px;overflow:hidden}
.card:hover{transform:translateY(-2px);box-shadow:0 6px 16px rgba(0,0,0,.18)}
.card.y{background:var(--y-bg);border-color:var(--y-bd)}
.card.b{background:var(--b-bg);border-color:var(--b-bd)}
.card.g{background:var(--g-bg);border-color:var(--g-bd)}
.card.p{background:var(--p-bg);border-color:var(--p-bd)}
.card-top{display:flex;align-items:center;gap:8px}
.cav{width:30px;height:30px;border-radius:50%;font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.cname{font-size:14px;font-weight:700;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.card.y .cname{color:var(--y-tx)}.card.b .cname{color:var(--b-tx)}.card.g .cname{color:var(--g-tx)}.card.p .cname{color:var(--p-tx)}
.type-badge{font-size:11px;padding:3px 9px;border-radius:99px;font-weight:700;flex-shrink:0}
.badge-공지{background:rgba(255,200,0,.25);color:#7A5000}
.badge-아이디어{background:rgba(59,91,219,.12);color:#2040AA}
.badge-할일{background:rgba(20,83,45,.12);color:#14532D}
.prio-badge{font-size:11px;padding:3px 9px;border-radius:99px;font-weight:700;flex-shrink:0;display:inline-flex;align-items:center;gap:3px;white-space:nowrap}
.prio-3{background:rgba(220,38,38,.16);color:#B91C1C}
.prio-2{background:rgba(107,114,128,.16);color:#4B5563}
.prio-1{background:rgba(107,114,128,.08);color:#9CA3AF}
.card-body{font-size:14px;line-height:1.7;overflow:hidden;flex:1;word-break:break-word;overflow-wrap:break-word;white-space:pre-wrap;mask-image:linear-gradient(to bottom,#000 70%,transparent 100%);-webkit-mask-image:linear-gradient(to bottom,#000 70%,transparent 100%)}
.card.y .card-body{color:var(--y-tx)}.card.b .card-body{color:var(--b-tx)}.card.g .card-body{color:var(--g-tx)}.card.p .card-body{color:var(--p-tx)}
.tagged{display:flex;flex-wrap:wrap;gap:4px}
.tag-pill{font-size:11px;padding:2px 8px;border-radius:99px;background:rgba(0,0,0,.08);font-weight:700}
.card.y .tag-pill{color:var(--y-tx)}.card.b .tag-pill{color:var(--b-tx)}.card.g .tag-pill{color:var(--g-tx)}.card.p .tag-pill{color:var(--p-tx)}
.deadline-row{display:flex;align-items:center;gap:5px;font-size:12px;opacity:.7}
.card.y .deadline-row{color:var(--y-tx)}.card.b .deadline-row{color:var(--b-tx)}.card.g .deadline-row{color:var(--g-tx)}.card.p .deadline-row{color:var(--p-tx)}
.deadline-urgent{color:#b91c1c!important;opacity:1!important;font-weight:700}
.card-footer{display:flex;align-items:center;justify-content:space-between}
.card-date{font-size:11px;opacity:.55}
.card.y .card-date{color:var(--y-tx)}.card.b .card-date{color:var(--b-tx)}.card.g .card-date{color:var(--g-tx)}.card.p .card-date{color:var(--p-tx)}
.card-actions{display:flex;align-items:center;gap:6px}
.action-btn{background:none;border:none;cursor:pointer;font-size:15px;display:flex;align-items:center;gap:4px;padding:3px 6px;border-radius:5px;font-family:var(--fn)}
.action-btn:hover{background:rgba(0,0,0,.07)}
.action-count{font-size:12px;font-weight:500;opacity:.75}
.card.y .action-count{color:var(--y-tx)}.card.b .action-count{color:var(--b-tx)}.card.g .action-count{color:var(--g-tx)}.card.p .action-count{color:var(--p-tx)}
/* 빈 상태 */
.empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;color:#adb5bd;font-family:var(--fn);font-size:14px;padding:3rem 1rem}
/* 모달 공통 */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);display:none;align-items:center;justify-content:center;z-index:300;padding:1rem}
.overlay.open{display:flex}
.modal{background:#fff;border-radius:16px;border:.5px solid #e5e7eb;padding:2rem;width:100%;max-width:560px;max-height:90vh;overflow-y:auto;box-shadow:0 12px 40px rgba(0,0,0,.25);font-family:var(--fn)}
.modal h2{font-size:18px;font-weight:700;margin-bottom:1.25rem;color:#1a1a1a}
.form-group{margin-bottom:1.25rem}
.form-label{font-size:13px;font-weight:700;color:#6b7280;margin-bottom:7px;display:block;letter-spacing:.03em}
.form-input,.form-textarea{width:100%;padding:11px 14px;border:.5px solid #d1d5db;border-radius:10px;font-size:14px;font-family:var(--fn);color:#1a1a1a;background:#f9fafb}
.form-input:focus,.form-textarea:focus{outline:none;border-color:var(--accent);background:#fff}
.form-textarea{resize:vertical;min-height:180px}
.type-row{display:flex;gap:8px}
.type-btn{flex:1;padding:10px 6px;border-radius:10px;border:.5px solid #e5e7eb;background:#f9fafb;font-size:14px;font-weight:700;cursor:pointer;font-family:var(--fn);color:#9ca3af;transition:all .12s}
.type-btn.sel{background:var(--accent-bg);border-color:var(--accent);color:var(--accent)}
.color-row{display:flex;gap:10px}
.color-dot{width:28px;height:28px;border-radius:50%;cursor:pointer;border:2.5px solid transparent;transition:all .12s}
.color-dot:hover{transform:scale(1.12)}
.color-dot.sel{border-color:#1a1a1a}
.member-checks{display:flex;flex-wrap:wrap;gap:6px}
.member-check{display:flex;align-items:center;gap:5px;padding:6px 13px;border-radius:99px;border:.5px solid #e5e7eb;cursor:pointer;font-size:13px;font-weight:500;color:#6b7280;background:#f9fafb;transition:all .12s;user-select:none}
.member-check.sel{background:var(--accent-bg);border-color:var(--accent);color:var(--accent)}
.modal-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:1.5rem}
.btn-cancel{padding:10px 20px;border-radius:10px;border:.5px solid #e5e7eb;background:#f9fafb;color:#6b7280;font-size:14px;cursor:pointer;font-family:var(--fn)}
.btn-cancel:hover{border-color:#d1d5db}
.btn-primary{padding:10px 22px;border-radius:10px;background:var(--accent);color:#fff;border:none;font-size:14px;font-weight:700;cursor:pointer;font-family:var(--fn)}
.btn-primary:hover{opacity:.88}
.btn-primary:disabled{opacity:.45;cursor:not-allowed}
.btn-danger{padding:10px 22px;border-radius:10px;background:#dc2626;color:#fff;border:none;font-size:14px;font-weight:700;cursor:pointer;font-family:var(--fn)}
.btn-danger:hover{opacity:.88}
.btn-success{padding:10px 22px;border-radius:10px;background:#16a34a;color:#fff;border:none;font-size:14px;font-weight:700;cursor:pointer;font-family:var(--fn)}
.btn-success:hover{opacity:.88}
/* 상세 모달 */
.detail-card-preview{border-radius:10px;padding:16px;border:1px solid;margin-bottom:1.25rem}
.detail-card-preview.y{background:var(--y-bg);border-color:var(--y-bd)}.detail-card-preview.b{background:var(--b-bg);border-color:var(--b-bd)}
.detail-card-preview.g{background:var(--g-bg);border-color:var(--g-bd)}.detail-card-preview.p{background:var(--p-bg);border-color:var(--p-bd)}
.detail-card-text{font-size:14px;line-height:1.7;word-break:break-word;overflow-wrap:break-word;white-space:pre-wrap}
.detail-card-preview.y .detail-card-text{color:var(--y-tx)}.detail-card-preview.b .detail-card-text{color:var(--b-tx)}
.detail-card-preview.g .detail-card-text{color:var(--g-tx)}.detail-card-preview.p .detail-card-text{color:var(--p-tx)}
.comments-list{display:flex;flex-direction:column;gap:12px;margin-bottom:1rem}
.comment-item{display:flex;gap:10px}
.comment-av{width:28px;height:28px;border-radius:50%;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.comment-bubble{flex:1}
.comment-meta{font-size:12px;color:#9ca3af;margin-bottom:4px}
.comment-meta strong{color:#6b7280}
.comment-text{font-size:14px;line-height:1.6;color:#1a1a1a;background:#f3f4f6;border-radius:0 8px 8px 8px;padding:9px 12px}
.comment-input-row{display:flex;gap:8px;align-items:flex-end}
.comment-input{flex:1;padding:10px 14px;border:.5px solid #d1d5db;border-radius:10px;font-size:14px;font-family:var(--fn);resize:none;min-height:42px;max-height:120px;background:#f9fafb}
.btn-comment{padding:10px 16px;border-radius:10px;background:var(--accent);color:#fff;border:none;font-size:14px;font-weight:700;cursor:pointer;font-family:var(--fn);flex-shrink:0}
.comment-input:focus{outline:none;border-color:var(--accent);background:#fff}
.btn-comment:hover{opacity:.88}
/* 상세 모달 레이아웃 */
.detail-modal{padding-bottom:0 !important;overflow-y:hidden !important;position:relative}
.detail-scroll-area{flex:1;overflow-y:auto;min-height:0;padding-bottom:4px;-ms-overflow-style:none;scrollbar-width:none}
.detail-scroll-area::-webkit-scrollbar{display:none}
.detail-sticky-bottom{flex-shrink:0;padding:12px 0 1.5rem;background:#fff;border-top:1px solid #f0f0f0}
/* 닫기 버튼 (우측 상단) */
.detail-close-btn{position:absolute;top:18px;right:18px;background:none;border:none;cursor:pointer;font-size:22px;color:#adb5bd;line-height:1;padding:4px;border-radius:6px;z-index:10;transition:color .15s,background .15s}
.detail-close-btn:hover{color:#495057;background:rgba(0,0,0,.05)}
/* 스크롤 인디케이터 */
.scroll-indicator{display:flex;justify-content:center;padding:4px 0 2px;opacity:0;pointer-events:none;transition:opacity .3s ease}
.scroll-indicator.visible{opacity:1;pointer-events:auto;cursor:pointer}
.scroll-indicator-icon{font-size:18px;animation:scrollBounce 1.8s ease-in-out infinite;filter:drop-shadow(0 1px 3px rgba(0,0,0,.12))}
@keyframes scrollBounce{0%,100%{transform:translateY(0)}50%{transform:translateY(4px)}}
.comment-item{transition:opacity .5s cubic-bezier(.4,0,.2,1),max-height .5s cubic-bezier(.4,0,.2,1),margin .5s cubic-bezier(.4,0,.2,1);max-height:2000px;overflow:hidden}
.comment-item.removing{opacity:0;max-height:0;margin:0}
.comment-meta{position:relative}
.comment-del-btn,.comment-edit-btn{background:none;border:none;cursor:pointer;font-size:11px;color:#cbd5e1;padding:0 0 0 6px;font-family:var(--fn);font-weight:700;vertical-align:middle}
.comment-del-btn:hover{color:#dc2626}
.comment-edit-btn:hover{color:var(--accent)}
.comment-edit-area{width:100%;padding:8px 11px;border:1.5px solid var(--accent);border-radius:8px;font-size:14px;font-family:var(--fn);resize:vertical;min-height:44px;max-height:200px;line-height:1.6;color:#1a1a1a;background:#fff;box-sizing:border-box}
.comment-edit-area:focus{outline:none;border-color:var(--accent)}
.comment-edit-actions{display:flex;gap:6px;margin-top:6px;justify-content:flex-end}
.comment-edit-actions button{padding:5px 14px;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;font-family:var(--fn);border:none}
.btn-edit-save{background:var(--accent);color:#fff}
.btn-edit-save:hover{opacity:.85}
.btn-edit-save:disabled{opacity:.45;cursor:not-allowed}
.btn-edit-cancel{background:#f3f4f6;color:#6b7280;border:1px solid #e5e7eb !important}
.btn-edit-cancel:hover{background:#e5e7eb}
/* 보관함 */
.archive-cards{display:flex;flex-direction:column;gap:10px;min-height:140px;max-height:55vh;overflow-y:auto;justify-content:center}
.archive-item{border-radius:10px;padding:14px 16px;border:1px solid;display:flex;flex-direction:column;gap:8px}
.archive-item.y{background:var(--y-bg);border-color:var(--y-bd)}.archive-item.b{background:var(--b-bg);border-color:var(--b-bd)}
.archive-item.g{background:var(--g-bg);border-color:var(--g-bd)}.archive-item.p{background:var(--p-bg);border-color:var(--p-bd)}
.archive-item-text{font-size:14px;line-height:1.6;word-break:break-word;overflow-wrap:anywhere;white-space:pre-wrap;max-height:140px;overflow-y:auto}
.archive-item.y .archive-item-text{color:var(--y-tx)}.archive-item.b .archive-item-text{color:var(--b-tx)}
.archive-item.g .archive-item-text{color:var(--g-tx)}.archive-item.p .archive-item-text{color:var(--p-tx)}
.archive-item-meta{font-size:12px;opacity:.6}
.archive-item.y .archive-item-meta{color:var(--y-tx)}.archive-item.b .archive-item-meta{color:var(--b-tx)}
.archive-item.g .archive-item-meta{color:var(--g-tx)}.archive-item.p .archive-item-meta{color:var(--p-tx)}
.archive-item-actions{display:flex;gap:8px;margin-top:2px}
.archive-item{transition:opacity .55s cubic-bezier(.4,0,.2,1),max-height .55s cubic-bezier(.4,0,.2,1),padding .55s cubic-bezier(.4,0,.2,1),margin .55s cubic-bezier(.4,0,.2,1),transform .55s cubic-bezier(.4,0,.2,1);max-height:400px;overflow:hidden;transform-origin:top center}
.archive-item.removing{opacity:0;transform:scale(.9) translateY(-6px);max-height:0;padding-top:0;padding-bottom:0;margin-top:0;margin-bottom:0;border-width:0}
.archive-item-del-spin{display:inline-block;width:13px;height:13px;border:2px solid rgba(255,255,255,.5);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;margin-right:5px;vertical-align:middle}
.btn-repost{padding:7px 14px;border-radius:99px;background:#fff;border:1px solid #adb5bd;font-size:13px;font-weight:700;cursor:pointer;font-family:var(--fn);color:#495057;transition:all .12s}
.btn-repost:hover{background:#f8f9fa;border-color:#495057}
.btn-archive-del{padding:7px 14px;border-radius:99px;background:#fff;border:1px solid #fca5a5;font-size:13px;font-weight:700;cursor:pointer;font-family:var(--fn);color:#dc2626;transition:all .12s}
.btn-archive-del:hover{background:#fef2f2;border-color:#dc2626}
/* 알림 모달 */
.alert-modal{background:#fff;border-radius:16px;padding:2rem;width:100%;max-width:440px;box-shadow:0 12px 40px rgba(0,0,0,.3);font-family:var(--fn)}
.alert-modal .alert-icon{font-size:38px;text-align:center;margin-bottom:14px}
.alert-modal .alert-title{font-size:18px;font-weight:700;color:#1a1a1a;text-align:center;margin-bottom:10px}
.alert-modal .alert-msg{font-size:14px;color:#6b7280;text-align:center;line-height:1.7;margin-bottom:1.5rem;white-space:pre-line}
.alert-modal .alert-actions{display:flex;gap:10px;justify-content:center}
/* 진행 모달 */
.progress-modal{background:#fff;border-radius:16px;padding:2rem 2.5rem;width:100%;max-width:380px;box-shadow:0 12px 40px rgba(0,0,0,.3);font-family:var(--fn);text-align:center}
.progress-modal .pm-icon{font-size:32px;margin-bottom:12px}
.progress-modal .pm-msg{font-size:16px;font-weight:600;color:#1a1a1a;margin-bottom:8px}

/* 스피너 */
.loading{text-align:center;padding:2rem;color:#9ca3af;font-size:14px}
.loading .sp{display:inline-block;width:18px;height:18px;border:2px solid #e5e7eb;border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;margin-right:6px;vertical-align:middle}
/* 드래그 가능한 모달 */
.modal.draggable,.alert-modal.draggable,.progress-modal.draggable{position:relative;cursor:default}
.modal .drag-handle,.alert-modal .drag-handle,.progress-modal .drag-handle{cursor:grab;user-select:none;-webkit-user-select:none;display:flex;align-items:center;justify-content:center;padding:6px 0 2px;margin:-2rem -2rem 0 -2rem;padding:8px 2rem 4px;border-radius:16px 16px 0 0;position:relative}
.modal .drag-handle:active,.alert-modal .drag-handle:active,.progress-modal .drag-handle:active{cursor:grabbing}
.drag-handle .drag-indicator{width:36px;height:4px;border-radius:99px;background:#d1d5db;position:absolute;top:8px;left:50%;transform:translateX(-50%);transition:background .15s}

.modal.dragging,.alert-modal.dragging,.progress-modal.dragging{box-shadow:0 20px 60px rgba(0,0,0,.35);transition:box-shadow .15s}

<script>
window.__pageInit = function() {
  const email = sessionStorage.getItem('admin_email');
  initWithEmail(email);

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
const POSTIT_GAS_URL = "https://script.google.com/macros/s/AKfycbx7tfEvBODndMZxrS63Fa3ONSlHYuXHiWXbpQN5rmv7P6yQGaiTknrnwPdGzCSRF6eGHA/exec";
const CSV_CARDS    = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRlaICJucqoPp-IUQzEU5Z0xKfY8CYLym7dVYlMSSndi3kUD2sBczVi84zE0dglr9TOJEyYnEuJ-SL5/pub?gid=0&single=true&output=csv";
const CSV_COMMENTS = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRlaICJucqoPp-IUQzEU5Z0xKfY8CYLym7dVYlMSSndi3kUD2sBczVi84zE0dglr9TOJEyYnEuJ-SL5/pub?gid=1628714566&single=true&output=csv";
const CSV_MEMBERS  = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTl_lyF4ykH7Kbs_Y8wOUPNeru3HSReqZUwzBNLAGHJDoXA3g8TuQsa-efBkwtBiXudxTknoz4CX1NE/pub?gid=0&single=true&output=csv";
const AV_COLORS = [
  {bg:"#FFD6A5",tx:"#7A4000"},{bg:"#C8F5C8",tx:"#1A5A1A"},
  {bg:"#BBE4FF",tx:"#0A3F6E"},{bg:"#EDD9FF",tx:"#4A1A7A"},
  {bg:"#FFD6D6",tx:"#7A1A1A"},{bg:"#D6D6FF",tx:"#1A1A7A"},
  {bg:"#D6FFEE",tx:"#1A6A40"},
];

// ── 상태
let currentUser = null;
let allCards = [], allEmails = [];
let currentFilter = 'all', currentCardId = null;
let selCardColor = 'y', selCardType = '공지', taggedEmails = [], selCardWeight = 2;
let editCardId = null, editCardColor = 'y', editCardType = '공지', editCardWeight = 2;
let _archiveCache = []; // 보관함 Post-it 캐시 (재게시 즉시 반영용)
let commentCounts = {}; // cardId → 댓글 수 매핑

// 유형 → 색상 자동 매핑 (공지=p, 아이디어=g, 할일=b)
function typeToColor(type){ return type==='공지'?'p':type==='아이디어'?'g':'b'; }

// 날짜 문자열을 정렬용 숫자로 변환 (작을수록 앞)
function dateToSort(d){
  if(!d) return Infinity;
  // "2026. 6. 29. 오전 1:08:04" 형식 처리
  const m=d.match(/(\d{4})[.\s]+(\d{1,2})[.\s]+(\d{1,2})/);
  if(m) return parseInt(m[1])*10000+parseInt(m[2])*100+parseInt(m[3]);
  return Infinity;
}

function sortCards(cards){
  const typeOrder={'공지':0,'아이디어':1,'할일':2};
  return [...cards].sort((a,b)=>{
    // 1차: 중요도 높은 순
    const wa=Number(a.weight)||2, wb=Number(b.weight)||2;
    if(wa!==wb) return wb-wa;
    // 2차: 같은 중요도면 공지 → 아이디어 → 할일 순
    const ta=typeOrder[a.type]??9, tb=typeOrder[b.type]??9;
    if(ta!==tb) return ta-tb;
    // 3차: 같은 유형이면 먼저 등록된(입력일 빠른) 순
    return dateToSort(a.date)-dateToSort(b.date);
  });
}
function emailLocal(e){ return (e||'').split('@')[0]; }
function emailToColor(e){ if(!e) return {bg:'#E9ECEF',tx:'#495057'}; let h=0; for(let i=0;i<e.length;i++) h=(h*31+e.charCodeAt(i))>>>0; return AV_COLORS[h%AV_COLORS.length]; }
function emailToInitials(e){ return emailLocal(e).slice(0,1).toUpperCase(); }
function emailToName(e){ const l=emailLocal(e); return l.charAt(0).toUpperCase()+l.slice(1); }
function prioMeta(w){
  w=Number(w)||2;
  if(w>=3) return {cls:'prio-3',icon:'🔴',text:'높음'};
  if(w<=1) return {cls:'prio-1',icon:'⚫',text:'낮음'};
  return {cls:'prio-2',icon:'⚪',text:'보통'};
}
function escHtml(s){ return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function linkify(html){
  return html.replace(/(https?:\/\/[^\s<>&"']+)/g, '<a href="$1" target="_blank" rel="noopener noreferrer" style="color:inherit;text-decoration:underline;word-break:break-all" onclick="event.stopPropagation()">$1</a>');
}
function dynLoadingHTML(text){
  return `<div class="dyn-loading" style="padding:1.5rem"><div class="dyn-stack"><span></span><span></span><span></span></div><div class="dyn-text">${text}<span class="dyn-dots"><span>.</span><span>.</span><span>.</span></span></div></div>`;
}
function textLoadingHTML(text){
  return `<div style="text-align:center;padding:1.5rem;font-size:12px;color:#9ca3af">${text}...</div>`;
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// 모달 유틸
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function closeOverlay(id){ document.getElementById(id).classList.remove('open'); }

// 알림 모달 (확인 버튼만)
function showAlert(icon, title, msg, onOk){
  document.getElementById('alert-icon').textContent = icon;
  document.getElementById('alert-title').textContent = title;
  document.getElementById('alert-msg').textContent = msg;
  document.getElementById('alert-actions').innerHTML = `<button class="btn-primary" id="alert-ok-btn">확인</button>`;
  document.getElementById('alert-ok-btn').onclick = () => { closeOverlay('alert-overlay'); if(onOk) onOk(); };
  document.getElementById('alert-overlay').classList.add('open');
}

// 확인 모달 (취소 + 확인)
function showConfirm(icon, title, msg, confirmLabel, confirmClass, onConfirm){
  document.getElementById('alert-icon').textContent = icon;
  document.getElementById('alert-title').textContent = title;
  document.getElementById('alert-msg').textContent = msg;
  document.getElementById('alert-actions').innerHTML =
    `<button class="btn-cancel" id="alert-cancel-btn">취소</button>
     <button class="${confirmClass}" id="alert-confirm-btn">${confirmLabel}</button>`;
  document.getElementById('alert-cancel-btn').onclick = () => closeOverlay('alert-overlay');
  document.getElementById('alert-confirm-btn').onclick = () => { closeOverlay('alert-overlay'); onConfirm(); };
  document.getElementById('alert-overlay').classList.add('open');
}

// 진행 모달
let _progressTimer = null;
function showProgress(msg){
  document.getElementById('pm-msg').textContent = msg;
  document.getElementById('pm-sub').textContent = '잠시만 기다려 주세요...';
  document.getElementById('progress-overlay').classList.add('open');
}

function updateProgress(msg, tries, maxTries){
  document.getElementById('pm-msg').textContent = msg;
  document.getElementById('pm-sub').textContent = '잠시만 기다려 주세요...';
}
function hideProgress(){ clearInterval(_progressTimer); closeOverlay('progress-overlay'); }

// ── 변경이 실제로 반영됐는지 확인
// GAS(getCards)는 시트를 직접 읽기 때문에 거의 즉시 반영되지만,
// 만에 하나 지연/불일치가 있을 경우를 대비해 짧은 간격으로 몇 번 재확인
// GAS 호출 자체가 실패하면(차단 등) 게시용 CSV로 폴백해서 확인
function fetchLatestCards(){
  return gas({action:'getCards'})
    .then(res=>(res && res.cards) ? res.cards : [])
    .catch(()=>fetch(CSV_CARDS+'&t='+Date.now(), {cache:'no-store'}).then(r=>r.text()).then(text=>csvRowsToCards(parseCSV(text))));
}
function pollUntilConfirmed(checkFn, opts={}){
  const {maxTries=6, interval=700, onTick=null} = opts;
  let tries = 0;
  return new Promise(resolve=>{
    const tick = ()=>{
      tries++;
      fetchLatestCards().then(cards=>{
        const ok = checkFn(cards);
        if(onTick) onTick(tries, maxTries, ok);
        if(ok || tries>=maxTries) resolve({ok, cards});
        else setTimeout(tick, interval);
      }).catch(()=>{
        if(tries>=maxTries) resolve({ok:false, cards:null});
        else setTimeout(tick, interval);
      });
    };
    tick();
  });
}

// 초기화

    return;

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// CSV 파서
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function parseCSV(text){
  const rows=[]; let cur='', inQ=false, cells=[];
  for(let i=0;i<text.length;i++){
    const ch=text[i], next=text[i+1];
    if(ch==='"'){
      if(inQ&&next==='"'){cur+='"';i++;} // escaped quote ""
      else inQ=!inQ;
    } else if(ch===','&&!inQ){
      cells.push(cur); cur='';
    } else if((ch==='\n'||ch==='\r')&&!inQ){
      if(ch==='\r'&&next==='\n') i++; // CRLF
      cells.push(cur); rows.push(cells); cells=[]; cur='';
    } else {
      cur+=ch;
    }
  }
  cells.push(cur); if(cells.some(c=>c!=='')) rows.push(cells);
  return rows;
}

// CSV 폴백 파서 (GAS 읽기가 막혀있을 때만 사용되는 예전 방식)
function csvRowsToCards(rows){
  const cards=[];
  for(let i=1;i<rows.length;i++){
    const r=rows[i]; if(!r[0]) continue;
    const hiddenBy=r[8]?r[8].split(',').filter(Boolean):[];
    if(hiddenBy.length) continue; // 누구든(작성자가) 숨겼으면 전체 사용자에게 안 보이게
    cards.push({id:r[0],text:r[1],type:r[2],color:r[3],author:r[4],date:r[5],
      likes:parseInt(r[6])||0,
      likedBy:r[7]?r[7].split(',').filter(Boolean):[],
      hiddenBy,deadline:r[9]||'',
      taggedMembers:r[10]?r[10].split(',').filter(Boolean):[],
      weight:parseInt(r[11])||2,
    });
  }
  return cards.reverse();
}
function csvRowsToComments(rows, cardId){
  const comments=[];
  for(let i=1;i<rows.length;i++){
    const r=rows[i]; if(!r[0]||r[1]!==cardId) continue;
    comments.push({id:r[0],cardId:r[1],author:r[2],text:r[3],date:r[4]});
  }
  return comments;
}
function gas(params){
  // 텍스트를 URL 쿼리스트링이 아닌 POST 본문으로 전송 (긴 한글 텍스트로 인한
  // URL 길이 초과 → 응답 실패(실제 저장은 되지만 클라이언트가 오류로 인식) 방지)
  const body=new URLSearchParams({...params,author:currentUser.email});
  return fetch(POSTIT_GAS_URL, {method:'POST', body, cache:'no-store'}).then(r=>r.json());
}

// ── 운영진 + Post-it 동시 로드
// Post-it은 GAS getCards를 직접 호출해 캐시 지연 없이 항상 최신 상태를 읽는다.
// (GAS가 막혀있는 예외 상황에서는 게시용 CSV로 자동 폴백)
// GAS 호출 자체가 느릴 수 있어(콜드스타트 등), 직전에 불러온 결과를 짧은 시간 동안만
// 캐시해뒀다가 즉시 보여주고 백그라운드에서 최신 데이터로 조용히 교체한다 (체감 속도 개선).
// 캐시가 너무 오래되면(POSTIT_CACHE_MAX_AGE 초과) 그새 다른 운영진이 삭제/숨김한
// 항목이 섞여있을 위험이 커지므로 그 경우는 캐시를 쓰지 않고 평소대로 로딩한다.
const POSTIT_CACHE_MAX_AGE = 3 * 60 * 1000; // 3분
function postitCacheKey(){
  return 'imti_postit_cache_v1:' + ((currentUser && currentUser.email) || 'anon');
}
function setSyncIndicator(on){
  const el=document.getElementById('sync-indicator');
  if(el) el.style.display = on ? 'inline-flex' : 'none';
}
function loadMembersAndCards(skipLoadingUI){
  // 기존 Post-it 즉시 초기화 (강제 새로고침 시 이전 Post-it 노출 방지)
  allCards=[];
  let renderedFromCache=false;
  let finalLoaded=false; // GAS(최종) 결과가 이미 도착했는지 여부 (프리뷰 경쟁 방지용)

  if(!skipLoadingUI){
    try{
      const cached=JSON.parse(localStorage.getItem(postitCacheKey())||'null');
      if(cached && Array.isArray(cached.cards) && cached.cards.length &&
         cached.ts && (Date.now()-cached.ts)<POSTIT_CACHE_MAX_AGE){
        allCards=cached.cards;
        allEmails=cached.allEmails||[];
        buildTagChecks();
        renderCards();
        renderedFromCache=true;
        setSyncIndicator(true); // 화면은 즉시 보여주되, 최신 상태 확인 중임을 표시
      }
    }catch(e){ /* 캐시 손상/미지원 시 무시 */ }

    if(!renderedFromCache){
      document.getElementById('cards-container').innerHTML=dynLoadingHTML('Post-it을 불러오는 중');
      // 로컬 캐시가 없는 첫 접속의 경우, 응답이 느릴 수 있는 GAS를 기다리는 대신
      // 게시용 CSV(공개된 정적 파일이라 훨씬 빠름)로 먼저 화면을 채워 체감 속도를 높인다.
      // 최종 데이터는 항상 GAS 결과로 다시 한 번 교체되므로 정합성 문제는 없다.
      fetch(CSV_CARDS+'&t='+Date.now(), {cache:'no-store'}).then(r=>r.text()).then(text=>{
        if(finalLoaded) return; // 이미 GAS 결과가 먼저 도착했다면 무시
        const previewCards=csvRowsToCards(parseCSV(text));
        if(finalLoaded || !previewCards.length) return;
        allCards=previewCards;
        buildTagChecks();
        renderCards();
        setSyncIndicator(true);
      }).catch(()=>{ /* 프리뷰 실패는 무시하고 GAS 결과를 기다림 */ });
    }
  }

  const noCache={cache:'no-store',headers:{'Cache-Control':'no-cache, no-store, must-revalidate','Pragma':'no-cache'}};
  const cardsPromise = gas({action:'getCards'})
    .then(res=>(res && res.cards) ? res.cards : [])
    .catch(e=>{
      console.error('[getCards] GAS 읽기 실패, CSV로 폴백', e);
      return fetch(CSV_CARDS+'&t='+Date.now(), noCache).then(r=>r.text()).then(text=>csvRowsToCards(parseCSV(text)));
    });
  return Promise.all([
    fetch(CSV_MEMBERS+'&t='+Date.now(), noCache).then(r=>r.text()).catch(()=>''),
    cardsPromise,
  ]).then(([mText, cards])=>{
    finalLoaded=true;
    // 운영진 이메일
    if(mText){
      const rows=parseCSV(mText);
      const emails=new Set();
      for(let i=1;i<rows.length;i++){if(rows[i][1]) emails.add(rows[i][1].trim());}
      allEmails=Array.from(emails).filter(e=>e!==currentUser.email);
    }
    buildTagChecks();
    // Post-it (GAS/CSV 둘 다 이미 본인이 숨긴 Post-it은 제외, 최신순)
    allCards = cards || [];
    renderCards();
    loadCommentCounts(); // 댓글 수 로드 후 카드에 표시
    setSyncIndicator(false);
    // 다음 로딩 때 즉시 보여줄 수 있도록 최신 결과를 캐시에 저장
    try{
      localStorage.setItem(postitCacheKey(), JSON.stringify({cards:allCards, allEmails, ts:Date.now()}));
    }catch(e){ /* 저장 공간 부족 등은 무시 */ }
  }).catch(e=>{
    finalLoaded=true;
    console.error('[loadMembersAndCards]',e);
    setSyncIndicator(false);
    if(!renderedFromCache && !allCards.length){
      document.getElementById('cards-container').innerHTML=
        '<div class="empty"><p>⚠️ 데이터를 불러올 수 없어요.</p></div>';
    }
  });
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// 댓글 수 로드 (CSV에서 cardId별 댓글 개수를 세어 commentCounts에 저장)
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function loadCommentCounts(){
  fetch(CSV_COMMENTS+'&t='+Date.now(), {cache:'no-store'})
    .then(r=>r.text())
    .then(text=>{
      const rows=parseCSV(text);
      const counts={};
      for(let i=1;i<rows.length;i++){
        const cardId=rows[i][1];
        if(cardId) counts[cardId]=(counts[cardId]||0)+1;
      }
      commentCounts=counts;
      renderCards(); // 댓글 수가 반영된 상태로 다시 그리기
    })
    .catch(e=>console.error('[loadCommentCounts]',e));
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// Post-it 렌더링
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function setFilter(btn,type){
  currentFilter=type;
  document.querySelectorAll('.chip').forEach(c=>c.classList.remove('active'));
  btn.classList.add('active'); renderCards();
}

function renderCards(){
  let filtered=currentFilter==='all'?allCards:allCards.filter(c=>c.type===currentFilter);
  // 유형별 색상 자동 보정 + 정렬
  filtered=sortCards(filtered.map(c=>({...c,color:typeToColor(c.type),weight:Number(c.weight)||2})));
  const container=document.getElementById('cards-container');
  if(!filtered.length){
    container.innerHTML='<div class="empty"><p>아직 Post-it이 없어요 ✨<br>첫 번째 Post-it을 Post해 보세요!</p></div>';
    return;
  }
  container.innerHTML=`<div class="cards-grid">${filtered.map(cardHTML).join('')}</div>`;
}

function cardHTML(c){
  const col=emailToColor(c.author);
  const ini=emailToInitials(c.author);
  const nm=emailToName(c.author);
  const isMe=c.author===currentUser.email;
  const liked=c.likedBy&&c.likedBy.includes(currentUser.email);
  const pm=prioMeta(c.weight);
  const today=new Date(); today.setHours(0,0,0,0);
  let dlHTML='';
  if(c.deadline){
    const dl=new Date(c.deadline);
    const diff=Math.ceil((dl-today)/86400000);
    const urgent=diff<=2;
    const lbl=diff<0?`D+${Math.abs(diff)}`:diff===0?'D-day':`D-${diff}`;
    dlHTML=`<div class="deadline-row${urgent?' deadline-urgent':''}">📅 ${c.deadline} <strong>${lbl}</strong></div>`;
  }
  const tagsHTML=(c.taggedMembers&&c.taggedMembers.length)
    ?`<div class="tagged">${c.taggedMembers.map(e=>`<span class="tag-pill">@${emailToName(e)}</span>`).join('')}</div>`:'';
  const myBtns=isMe
    ?`<button class="action-btn" style="font-size:13px;opacity:.5" onclick="event.stopPropagation();openEdit('${c.id}')" title="수정">✏️</button>
      <button class="action-btn" style="font-size:13px;opacity:.5;color:#dc2626" onclick="event.stopPropagation();confirmHide('${c.id}')" title="숨기기">🗑</button>`
    :'';
  return `<div class="card ${c.color}" onclick="openDetail('${c.id}')">
    <div class="card-top">
      <div class="cav" style="background:${col.bg};color:${col.tx}">${ini}</div>
      <span class="cname">${nm}</span>
      <span class="prio-badge ${pm.cls}">${pm.icon} ${pm.text}</span>
      <span class="type-badge badge-${c.type}">${c.type==='공지'?'📢':c.type==='아이디어'?'💡':'✅'} ${c.type}</span>
    </div>
    <div class="card-body">${linkify(escHtml(c.text))}</div>
    ${tagsHTML}${dlHTML}
    <div class="card-footer">
      <span class="card-date">${c.date}</span>
      <div class="card-actions">
        <button class="action-btn" onclick="event.stopPropagation();likeCard('${c.id}')">${liked?'❤️':'🤍'}<span class="action-count">${c.likes?c.likes:'-'}</span></button>
        <button class="action-btn" onclick="event.stopPropagation();openDetail('${c.id}')">💬<span class="action-count">${commentCounts[c.id]?commentCounts[c.id]:'-'}</span></button>
        ${myBtns}
      </div>
    </div>
  </div>`;
}

// 태그 체크박스
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function buildTagChecks(){
  const wrap=document.getElementById('tag-checks');
  if(!allEmails.length){wrap.innerHTML='<span style="font-size:11px;color:#9ca3af">운영진 없음</span>';return;}
  wrap.innerHTML=allEmails.map(email=>{
    const col=emailToColor(email);
    return `<label class="member-check" onclick="toggleTag(this,'${email}')">
      <div style="width:14px;height:14px;border-radius:50%;background:${col.bg};color:${col.tx};font-size:7px;font-weight:700;display:flex;align-items:center;justify-content:center;">${emailToInitials(email)}</div>
      @${emailToName(email)}</label>`;
  }).join('');
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// Post-it 추가
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function openAddModal(){
  selCardType='공지'; taggedEmails=[]; selCardWeight=2;
  document.getElementById('card-text').value='';
  document.getElementById('card-deadline').value='';
  document.querySelectorAll('#card-type-row .type-btn').forEach(b=>b.classList.remove('sel'));
  document.querySelector('#card-type-row .type-btn').classList.add('sel');
  document.querySelectorAll('#card-weight-row .type-btn').forEach(b=>b.classList.remove('sel'));
  document.querySelector('#card-weight-row .type-btn[onclick*="selWeight(this,2)"]').classList.add('sel');
  document.querySelectorAll('#tag-checks .member-check').forEach(m=>m.classList.remove('sel'));
  const btn=document.getElementById('post-btn'); btn.disabled=false; btn.textContent='Post';
  document.getElementById('add-overlay').classList.add('open');
}
function closeAdd(){ closeOverlay('add-overlay'); }
function selType(btn,type){ selCardType=type; document.querySelectorAll('#card-type-row .type-btn').forEach(b=>b.classList.remove('sel')); btn.classList.add('sel'); }
function selWeight(btn,w){ selCardWeight=w; document.querySelectorAll('#card-weight-row .type-btn').forEach(b=>b.classList.remove('sel')); btn.classList.add('sel'); }
function selColor(dot,c){ selCardColor=c; document.querySelectorAll('.color-dot').forEach(d=>d.classList.remove('sel')); dot.classList.add('sel'); }
function toggleTag(label,email){ label.classList.toggle('sel'); if(taggedEmails.includes(email)) taggedEmails=taggedEmails.filter(e=>e!==email); else taggedEmails.push(email); }

function submitCard(){
  const text=document.getElementById('card-text').value.trim();
  if(!text){showAlert('⚠️','내용 없음','Post-it 내용을 입력해주세요.');return;}

  const deadline=document.getElementById('card-deadline').value;
  const tagged=[...taggedEmails];
  const color=typeToColor(selCardType);
  const type=selCardType;

  showConfirm('📝','Post-it 저장','이 내용으로 Post-it을 게시할까요?','저장','btn-primary',()=>{
    closeAdd();
    showProgress('Post-it Board에 반영 중...');

    // GAS 저장
    gas({action:'addCard',text,type,color,deadline,taggedMembers:tagged.join(','),weight:selCardWeight})
    .then(()=>{
      reloadAfterAction('Post-it을 게시했어요 ✨', cards=>
        cards.some(c=>c.author===currentUser.email && c.text===text)
      );
    })
    .catch(()=>{
      hideProgress();
      showAlert('❌','오류','저장 중 오류가 발생했어요. 다시 시도해주세요.');
    });
  });
}

// Post-it 수정
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function openEdit(id){
  const c=allCards.find(x=>x.id===id); if(!c) return;
  editCardId=id; editCardType=c.type; editCardWeight=Number(c.weight)||2;
  document.getElementById('edit-text').value=c.text;
  document.getElementById('edit-deadline').value=c.deadline||'';
  document.querySelectorAll('[id^="edit-type-"]').forEach(b=>b.classList.remove('sel'));
  const tb=document.getElementById('edit-type-'+c.type); if(tb) tb.classList.add('sel');
  document.querySelectorAll('[id^="edit-weight-"]').forEach(b=>b.classList.remove('sel'));
  const wb=document.getElementById('edit-weight-'+editCardWeight); if(wb) wb.classList.add('sel');
  const btn=document.getElementById('edit-btn'); btn.disabled=false; btn.textContent='Re-Post';
  document.getElementById('edit-overlay').classList.add('open');
}
function closeEdit(){ closeOverlay('edit-overlay'); }
function selEditType(btn,type){ editCardType=type; document.querySelectorAll('[id^="edit-type-"]').forEach(b=>b.classList.remove('sel')); btn.classList.add('sel'); }
function selEditWeight(btn,w){ editCardWeight=w; document.querySelectorAll('[id^="edit-weight-"]').forEach(b=>b.classList.remove('sel')); btn.classList.add('sel'); }
function selEditColor(dot,c){ editCardColor=c; document.querySelectorAll('[id^="edit-color-"]').forEach(d=>d.classList.remove('sel')); dot.classList.add('sel'); }

function submitEdit(){
  const text=document.getElementById('edit-text').value.trim();
  if(!text){showAlert('⚠️','내용 없음','Post-it 내용을 입력해주세요.');return;}

  const deadline=document.getElementById('edit-deadline').value;
  const id=editCardId;
  const type=editCardType;
  const color=typeToColor(editCardType);

  showConfirm('📝','Post-it 수정','이 내용으로 Post-it을 수정하여 게시할까요?','수정','btn-primary',()=>{
    closeEdit();
    showProgress('Post-it Board에 반영 중...');

    gas({action:'updateCard',id,text,type,color,deadline,weight:editCardWeight})
    .then(()=>{
      reloadAfterAction('Post-it을 수정했어요 ✏️', cards=>
        cards.some(c=>c.id===id && c.text===text)
      );
    })
    .catch(()=>{
      hideProgress();
      showAlert('❌','오류','저장 중 오류가 발생했어요. 다시 시도해주세요.');
    });
  });
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// Post-it 숨기기 (삭제)
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function confirmHide(id){
  showConfirm('🗑️','Post-it 숨기기',
    '이 Post-it을 보드에서 숨길까요?\n숨긴 Post-it은 보관함에서 확인할 수 있어요.',
    '숨기기','btn-danger',()=>doHide(id));
}
function doHide(id){
  showProgress('Post-it Board에 반영 중...');
  gas({action:'hideCard',id})
    .then(()=>reloadAfterAction('보관함으로 이동했어요 📦', cards=>
      !cards.some(c=>c.id===id) // getCards는 본인이 숨긴 Post-it을 아예 제외하고 내려줌
    ))
    .catch(()=>{ hideProgress(); showAlert('❌','오류','숨기기 중 오류가 발생했어요.'); });
}

// ── 좋아요
function likeCard(id){
  // 즉시 토글
  const c=allCards.find(x=>x.id===id); if(!c) return;
  const liked=c.likedBy.includes(currentUser.email);
  c.likedBy=liked?c.likedBy.filter(e=>e!==currentUser.email):[...c.likedBy,currentUser.email];
  c.likes=c.likedBy.length;
  renderCards();
  gas({action:'likeCard',id}).catch(()=>{
    // 실패 시 되돌리기
    c.likedBy=liked?[...c.likedBy,currentUser.email]:c.likedBy.filter(e=>e!==currentUser.email);
    c.likes=c.likedBy.length;
    renderCards();
  });
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// Post-it 상세 / 댓글
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function openDetail(id){

    dlHTML=`<div style="font-size:11px;margin-top:6px;color:#6b7280">📅 마감: ${c.deadline} (${lbl})</div>`;

  document.getElementById('detail-card-preview').innerHTML=`

      <span style="font-size:12px;font-weight:700">${emailToName(c.author)}</span>
      <span class="prio-badge ${pm.cls}">${pm.icon} ${pm.text}</span>
      <span style="font-size:10px;color:#9ca3af;margin-left:auto">${c.date}</span>
    </div>
    <div class="detail-card-text">${linkify(escHtml(c.text))}</div>${tagsHTML}${dlHTML}`;

  document.getElementById('comment-count').textContent='';

}

function loadComments(cardId){
  const minDelay=new Promise(resolve=>setTimeout(resolve, 700));
  Promise.all([
    gas({action:'getComments', cardId})
      .then(res=>(res && res.comments) ? res.comments : [])
      .catch(e=>{
        console.error('[getComments] GAS 읽기 실패, CSV로 폴백', e);
        return fetch(CSV_COMMENTS+'&t='+Date.now(), {cache:'no-store'}).then(r=>r.text()).then(text=>csvRowsToComments(parseCSV(text), cardId));
      }),
    minDelay
  ])
    .then(([comments])=>{
      document.getElementById('comment-count').textContent=`(${comments.length})`;
      document.getElementById('comments-list').innerHTML=comments.length
        ?comments.map(cm=>commentItemHTML(cm)).join('')
        :'<div style="text-align:center;padding:1rem;font-size:12px;color:#9ca3af">첫 번째 댓글을 남겨보세요 💬</div>';
    })
    .catch(()=>{
      document.getElementById('comments-list').innerHTML=
        '<div style="text-align:center;padding:1rem;font-size:12px;color:#9ca3af">댓글을 불러올 수 없어요</div>';
    });
}

// 댓글 1개 렌더링 (본인 댓글이면 수정·삭제 버튼 포함)
function commentItemHTML(cm){
  const mc=emailToColor(cm.author);
  const isMine = cm.author===currentUser.email;
  const editBtn = (isMine && cm.id)
    ? `<button class="comment-edit-btn" onclick="startEditComment('${cm.id}')" title="댓글 수정">✎ 수정</button>`
    : '';
  const delBtn = (isMine && cm.id)
    ? `<button class="comment-del-btn" onclick="confirmDeleteComment('${cm.id}', this)" title="댓글 삭제">✕ 삭제</button>`
    : '';
  const safeText = cm.text.replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/\n/g,'\\n');
  return `<div class="comment-item" id="${cm.id?('cm-'+cm.id):''}" data-raw-text="${escHtml(cm.text)}">
    <div class="comment-av" style="background:${mc.bg};color:${mc.tx}">${emailToInitials(cm.author)}</div>
    <div class="comment-bubble">
      <div class="comment-meta"><strong>${emailToName(cm.author)}</strong> · ${cm.date}${editBtn}${delBtn}</div>
      <div class="comment-text">${linkify(escHtml(cm.text))}</div>
    </div>
  </div>`;
}

// ── 스크롤 인디케이터
function updateScrollIndicator(){
  const area = document.getElementById('detail-scroll-area');
  const indicator = document.getElementById('scroll-indicator');
  if(!area || !indicator) return;
  const hasOverflow = area.scrollHeight > area.clientHeight + 8;
  const nearBottom = area.scrollTop + area.clientHeight >= area.scrollHeight - 20;
  if(hasOverflow && !nearBottom){
    indicator.classList.add('visible');
  } else {
    indicator.classList.remove('visible');
  }
}
function smoothScrollDown(){
  const area = document.getElementById('detail-scroll-area');
  if(area) area.scrollBy({top: 200, behavior:'smooth'});
}
(function(){
  let scrollArea;
  const obs = new MutationObserver(()=>{
    scrollArea = document.getElementById('detail-scroll-area');
    if(scrollArea){
      scrollArea.removeEventListener('scroll', updateScrollIndicator);
      scrollArea.addEventListener('scroll', updateScrollIndicator);
    }
    setTimeout(updateScrollIndicator, 100);
  });
  const detailList = document.getElementById('comments-list');
  if(detailList) obs.observe(detailList, {childList:true, subtree:true});
  // 모달 열릴 때도 체크
  const overlay = document.getElementById('detail-overlay');
  if(overlay){
    new MutationObserver(()=>{
      if(overlay.classList.contains('open')){
        setTimeout(updateScrollIndicator, 300);
        setTimeout(updateScrollIndicator, 800);
      }
    }).observe(overlay, {attributes:true});
  }
})();

function closeDetail(){ closeOverlay('detail-overlay'); currentCardId=null; }

function submitComment(){
  const text=document.getElementById('comment-input').value.trim();
  if(!text||!currentCardId) return;
  const btn=document.getElementById('comment-submit-btn');
  btn.disabled=true; btn.textContent='저장 중...';
  const savedId=currentCardId;

  gas({action:'addComment',cardId:savedId,text})
  .then(res=>{
    // 즉시 댓글 목록에 추가 (GAS가 새 댓글 id를 돌려주면 바로 삭제 가능, 아니면
    // 다음에 상세를 다시 열 때 시트에서 id를 받아와 삭제 버튼이 나타남)
    const newId = res && (res.id || res.commentId) ? String(res.id || res.commentId) : null;
    const now=new Date().toLocaleString('ko-KR',{timeZone:'Asia/Seoul'});
    const newComment = commentItemHTML({id:newId, author:currentUser.email, text, date:now});
    const list=document.getElementById('comments-list');
    // "첫 번째 댓글" 안내문이 있으면 교체, 아니면 추가
    if(list.querySelector('[style*="9ca3af"]')){
      list.innerHTML=newComment;
    } else {
      list.insertAdjacentHTML('beforeend',newComment);
    }
    // 댓글 수 업데이트
    const countEl=document.getElementById('comment-count');
    const cur=parseInt((countEl.textContent||'0').replace(/\D/g,''))||0;
    countEl.textContent=`(${cur+1})`;

    document.getElementById('comment-input').value='';
    document.getElementById('comment-input').style.height='auto';
    btn.disabled=false; btn.textContent='등록';
    showToast('댓글을 달았어요 💬');
  })
  .catch(()=>{
    btn.disabled=false; btn.textContent='등록';
    showAlert('❌','오류','댓글 저장 중 오류가 발생했어요.');
  });
}

// ── 댓글 수정 (작성자 본인만)
function startEditComment(id){
  const item = document.getElementById('cm-'+id);
  if(!item) return;
  const bubble = item.querySelector('.comment-bubble');
  const textEl = item.querySelector('.comment-text');
  const metaEl = item.querySelector('.comment-meta');
  const rawText = item.getAttribute('data-raw-text') || textEl.textContent;
  // 이미 수정 모드면 무시
  if(item.querySelector('.comment-edit-area')) return;
  // 수정/삭제 버튼 숨기기
  metaEl.querySelectorAll('.comment-edit-btn,.comment-del-btn').forEach(b=>b.style.display='none');
  // 텍스트를 편집 영역으로 교체
  textEl.style.display='none';
  const editWrap = document.createElement('div');
  editWrap.className='comment-edit-wrap';
  editWrap.innerHTML=`<textarea class="comment-edit-area" id="edit-cm-${id}">${escHtml(rawText)}</textarea>
    <div class="comment-edit-actions">
      <button class="btn-edit-cancel" onclick="cancelEditComment('${id}')">취소</button>
      <button class="btn-edit-save" id="save-cm-${id}" onclick="submitEditComment('${id}')">저장</button>
    </div>`;
  bubble.appendChild(editWrap);
  const ta = document.getElementById('edit-cm-'+id);
  ta.focus();
  ta.style.height = ta.scrollHeight + 'px';
  ta.addEventListener('input',function(){ this.style.height='auto'; this.style.height=this.scrollHeight+'px'; });
}

function cancelEditComment(id){
  const item = document.getElementById('cm-'+id);
  if(!item) return;
  const wrap = item.querySelector('.comment-edit-wrap');
  if(wrap) wrap.remove();
  const textEl = item.querySelector('.comment-text');
  if(textEl) textEl.style.display='';
  // 수정/삭제 버튼 복원
  item.querySelectorAll('.comment-edit-btn,.comment-del-btn').forEach(b=>b.style.display='');
}

function submitEditComment(id){
  const ta = document.getElementById('edit-cm-'+id);
  if(!ta) return;
  const newText = ta.value.trim();
  if(!newText){ showAlert('⚠️','내용 없음','댓글 내용을 입력해 주세요.'); return; }
  const saveBtn = document.getElementById('save-cm-'+id);
  if(saveBtn){ saveBtn.disabled=true; saveBtn.textContent='저장 중...'; }

  gas({action:'editComment', id, cardId: currentCardId, text: newText})
    .then(()=>{
      const item = document.getElementById('cm-'+id);
      if(item){
        item.setAttribute('data-raw-text', newText);
        const textEl = item.querySelector('.comment-text');
        if(textEl){ textEl.innerHTML = linkify(escHtml(newText)); textEl.style.display=''; }
        const wrap = item.querySelector('.comment-edit-wrap');
        if(wrap) wrap.remove();
        // 수정/삭제 버튼 복원
        item.querySelectorAll('.comment-edit-btn,.comment-del-btn').forEach(b=>b.style.display='');
      }
      showToast('댓글을 수정했어요 ✏️');
    })
    .catch(()=>{
      if(saveBtn){ saveBtn.disabled=false; saveBtn.textContent='저장'; }
      showAlert('❌','오류','댓글 수정 중 오류가 발생했어요.');
    });
}

// ── 댓글 삭제 (작성자 본인만)
function confirmDeleteComment(id, btnEl){
  showConfirm('🗑️','댓글 삭제','이 댓글을 삭제할까요?\n삭제 후에는 복구할 수 없어요.',
    '삭제','btn-danger',()=>doDeleteComment(id));
}
function doDeleteComment(id){
  const item = document.getElementById('cm-'+id);
  const delBtn = item ? item.querySelector('.comment-del-btn') : null;
  if(delBtn){ delBtn.disabled = true; delBtn.textContent = '삭제 중...'; }

  gas({action:'deleteComment', id, cardId: currentCardId})
    .then(()=>{
      if(item){
        item.classList.add('removing');
        setTimeout(()=>{
          item.remove();
          const list=document.getElementById('comments-list');
          if(!list.querySelector('.comment-item')){
            list.innerHTML='<div style="text-align:center;padding:1rem;font-size:12px;color:#9ca3af">첫 번째 댓글을 남겨보세요 💬</div>';
          }
        }, 500); // 다이나믹한 제거 애니메이션 후 DOM에서 정리
      }
      // 댓글 수 업데이트
      const countEl=document.getElementById('comment-count');
      const cur=parseInt((countEl.textContent||'0').replace(/\D/g,''))||0;
      countEl.textContent=`(${Math.max(0,cur-1)})`;
      showToast('댓글을 삭제했어요 🗑');
    })
    .catch(()=>{
      if(delBtn){ delBtn.disabled = false; delBtn.textContent = '✕ 삭제'; }
      showAlert('❌','오류','댓글 삭제 중 오류가 발생했어요.');
    });
}
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// 보관함
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function openArchive(){
  document.getElementById('archive-list').innerHTML=textLoadingHTML('보관된 Post-it을 불러오는 중');
  document.getElementById('archive-overlay').classList.add('open');
  const minDelay=new Promise(resolve=>setTimeout(resolve, 700));
  const dataPromise=gas({action:'getMyHidden'})
    .then(res=>({cards:(res && res.cards) ? res.cards : [], alreadySorted:true}))
    .catch(e=>{
      console.error('[getMyHidden] GAS 읽기 실패, CSV로 폴백', e);
      return fetch(CSV_CARDS+'&t='+Date.now(), {cache:'no-store'}).then(r=>r.text()).then(text=>{
        const rows=parseCSV(text);
        const cards=[];
        for(let i=1;i<rows.length;i++){
          const r=rows[i]; if(!r[0]) continue;
          if(r[4]!==currentUser.email) continue;
          const hiddenBy=r[8]?r[8].split(',').filter(Boolean):[];
          if(!hiddenBy.includes(currentUser.email)) continue;
          cards.push({id:r[0],text:r[1],type:r[2],color:r[3],date:r[5],deadline:r[9]||''});
        }
        return {cards: cards.reverse(), alreadySorted:true};
      });
    });
  Promise.all([dataPromise, minDelay])
    .then(([{cards}])=>{
      _archiveCache = cards; // 재게시 즉시 반영을 위해 캐시
      if(!cards.length){
        document.getElementById('archive-list').innerHTML=
          '<div style="text-align:center;padding:1.5rem;font-size:13px;color:#9ca3af">숨긴 Post-it이 없어요</div>';
        return;
      }
      document.getElementById('archive-list').innerHTML=cards.map(c=>`
        <div class="archive-item ${c.color}" id="arc-${c.id}">
          <div class="archive-item-text">${linkify(escHtml(c.text))}</div>
          <div class="archive-item-meta">${c.type} · ${c.date}${c.deadline?' · 마감 '+c.deadline:''}</div>
          <div class="archive-item-actions">
            <button class="btn-repost" onclick="confirmRepost('${c.id}')">📌 재게시</button>
            <button class="btn-archive-del" onclick="confirmDeleteCard('${c.id}')">🗑 영구 삭제</button>
          </div>
        </div>`).join('');
    })
    .catch(()=>{
      document.getElementById('archive-list').innerHTML=
        '<div style="text-align:center;padding:1rem;font-size:12px;color:#9ca3af">불러오기 실패</div>';
    });
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// 액션 후 진행 모달 표시 → 시트에 실제 반영됐는지 폴링 확인 → CSV 재로드
// (고정 대기 대신, 변경이 실제로 보일 때까지 확인해서
//  "수정/삭제 후에도 예전 내용이 남아있는" 문제를 방지)
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function reloadAfterAction(toastMsg, checkFn, opts={}){
  // 기존 Post-it 즉시 비우기 (이전 상태가 남아 보이는 것 방지)
  allCards=[];
  document.getElementById('cards-container').innerHTML='';
  showProgress('Post-it Board에 반영 중...');

  const finish = ()=>{
    loadMembersAndCards(true).then(()=>{
      hideProgress();
      showToast(toastMsg);
    });
  };

  if(typeof checkFn !== 'function'){
    setTimeout(finish, 500);
    return;
  }

  pollUntilConfirmed(checkFn, {
    maxTries: opts.maxTries || 6,
    interval: opts.interval || 700,
    onTick: (tries, maxTries)=> updateProgress('Post-it Board에 반영 중...', tries, maxTries)
  }).then(()=> finish());
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// 토스트
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function showToast(msg){
  if(!msg) return;
  let t=document.getElementById('toast');
  if(!t){ t=document.createElement('div'); t.id='toast';
    t.style.cssText='position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%);background:#1a1a1a;color:#fff;padding:9px 20px;border-radius:99px;font-size:12px;font-weight:500;font-family:var(--fn);z-index:999;opacity:0;transition:opacity .2s;pointer-events:none;white-space:nowrap';
    document.body.appendChild(t);
  }
  t.textContent=msg; t.style.opacity='1';
  setTimeout(()=>{ t.style.opacity='0'; },2200);
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// Post 알리기
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
const CSV_MAILTO  = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRlaICJucqoPp-IUQzEU5Z0xKfY8CYLym7dVYlMSSndi3kUD2sBczVi84zE0dglr9TOJEyYnEuJ-SL5/pub?gid=1557750800&single=true&output=csv";
const CSV_RECIPIENTS = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTl_lyF4ykH7Kbs_Y8wOUPNeru3HSReqZUwzBNLAGHJDoXA3g8TuQsa-efBkwtBiXudxTknoz4CX1NE/pub?gid=0&single=true&output=csv";
const DEFAULT_NOTIFY_MSG = '새로운 Post-it이 게시되었습니다. IMTI에 운영자 모드로 접속하여 Post-it Board를 확인해 주세요.';

function openNotifyModal(){
  const list     = document.getElementById('notify-email-list');
  const textarea = document.getElementById('notify-msg');
  list.innerHTML = '<span style="font-size:13px;color:#9ca3af">목록 불러오는 중...</span>';
  textarea.value = DEFAULT_NOTIFY_MSG;
  document.getElementById('notify-overlay').classList.add('open');

  const t = '&t=' + Date.now();
  Promise.all([
    fetch(CSV_RECIPIENTS + t, {cache:'no-store'}).then(r => r.text()),
    fetch(CSV_MAILTO     + t, {cache:'no-store'}).then(r => r.text())
  ]).then(([recipientText, mailtoText]) => {

    /* 수신자 이메일 — Admin_info B열 */
    const recipientRows = parseCSV(recipientText);
    const emails = [];
    for(let i = 1; i < recipientRows.length; i++){
      const b = (recipientRows[i][1] || '').trim();
      if(b && b !== currentUser.email) emails.push(b);
    }

    /* 기본 메시지 — mailto 탭 C열 2행 */
    const mailtoRows = parseCSV(mailtoText);
    const sheetMsg = mailtoRows[1] && (mailtoRows[1][2] || '').trim();
    if(sheetMsg) textarea.value = sheetMsg;

    if(!emails.length){
      list.innerHTML = '<span style="font-size:13px;color:#9ca3af">수신자 이메일을 찾을 수 없어요.</span>';
      return;
    }
    list.innerHTML = emails.map(e => `
      <label class="member-check sel notify-chip" data-email="${escHtml(e)}" style="cursor:pointer">
        <input type="checkbox" checked style="display:none" data-email="${escHtml(e)}">
        ${escHtml(e)}
      </label>`).join('');
    list.querySelectorAll('.notify-chip').forEach(chip => {
      chip.addEventListener('click', () => {
        const cb = chip.querySelector('input');
        cb.checked = !cb.checked;
        chip.classList.toggle('sel', cb.checked);
      });
    });
  }).catch(() => {
    list.innerHTML = '<span style="font-size:13px;color:#ef4444">불러오기 실패. 다시 시도해 주세요.</span>';
  });
}

function notifySelectAll(){
  document.querySelectorAll('#notify-email-list .notify-chip').forEach(chip => {
    chip.querySelector('input').checked = true;
    chip.classList.add('sel');
  });
}
function notifySelectNone(){
  document.querySelectorAll('#notify-email-list .notify-chip').forEach(chip => {
    chip.querySelector('input').checked = false;
    chip.classList.remove('sel');
  });
}

function sendNotify(){
  const chips = [...document.querySelectorAll('#notify-email-list .notify-chip.sel')];
  const selected = chips.map(chip => chip.dataset.email).filter(Boolean);
  if(!selected.length){ showAlert('⚠️','수신자 없음','수신할 운영진을 한 명 이상 선택해 주세요.'); return; }
  const msg = document.getElementById('notify-msg').value.trim();
  if(!msg){ showAlert('⚠️','내용 없음','발송할 메시지를 입력해 주세요.'); return; }

  const btn = document.getElementById('notify-send-btn');
  btn.disabled = true; btn.textContent = '발송 중…';

  gas({ action: 'sendNotify', to: selected.join(','), message: msg })
    .then(res => {
      btn.disabled = false; btn.textContent = '📨 발송';
      closeOverlay('notify-overlay');
      if(res.status === 'OK' || res.status === 'PARTIAL'){
        showToast(`알림 메일을 ${res.sent}명에게 발송했어요 📨`);
      } else {
        showAlert('❌','발송 실패', res.msg || res.error || '메일 발송 중 오류가 발생했어요.');
      }
    })
    .catch(err => {
      btn.disabled = false; btn.textContent = '📨 발송';
      showAlert('❌','오류','메일 발송 중 오류가 발생했어요. 잠시 후 다시 시도해 주세요.');
    });
}

// 오버레이 바깥 클릭 닫기 (진행 모달 제외)
['add-overlay','detail-overlay','archive-overlay','edit-overlay','alert-overlay','notify-overlay'].forEach(id=>{
  document.getElementById(id).addEventListener('click',e=>{
    if(e.target.id===id) closeOverlay(id);
  });
});

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// 모달 드래그 이동
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
(function(){
  // 모든 모달 요소에 드래그 핸들 삽입
  document.querySelectorAll('.modal, .alert-modal, .progress-modal').forEach(modal=>{
    modal.classList.add('draggable');
    const handle=document.createElement('div');
    handle.className='drag-handle';
    handle.innerHTML='<span class="drag-indicator"></span>';
    modal.insertBefore(handle, modal.firstChild);
    initDrag(modal, handle);
  });

  function initDrag(modal, handle){
    let isDragging=false, startX=0, startY=0, origLeft=0, origTop=0;

    function resetPosition(){
      modal.style.transform=''; modal.style.left=''; modal.style.top='';
      modal.style.margin='';
    }

    // 모달이 열릴 때마다 위치 초기화
    const overlay=modal.closest('.overlay');
    if(overlay){
      const obs=new MutationObserver(muts=>{
        muts.forEach(m=>{
          if(m.attributeName==='class'){
            if(!overlay.classList.contains('open')) resetPosition();
          }
        });
      });
      obs.observe(overlay,{attributes:true});
    }

    function onStart(e){
      // 입력 요소 위에서는 드래그 하지 않음
      const tag=e.target.tagName.toLowerCase();
      if(tag==='input'||tag==='textarea'||tag==='button'||tag==='select') return;

      isDragging=true;
      modal.classList.add('dragging');

      const rect=modal.getBoundingClientRect();
      // 첫 드래그 시 fixed position으로 전환
      if(!modal.style.left){
        modal.style.position='fixed';
        modal.style.left=rect.left+'px';
        modal.style.top=rect.top+'px';
        modal.style.margin='0';
        modal.style.transform='none';
      }

      const clientX=e.touches?e.touches[0].clientX:e.clientX;
      const clientY=e.touches?e.touches[0].clientY:e.clientY;
      startX=clientX;
      startY=clientY;
      origLeft=parseFloat(modal.style.left);
      origTop=parseFloat(modal.style.top);

      e.preventDefault();
    }

    function onMove(e){
      if(!isDragging) return;
      const clientX=e.touches?e.touches[0].clientX:e.clientX;
      const clientY=e.touches?e.touches[0].clientY:e.clientY;

      let newLeft=origLeft+(clientX-startX);
      let newTop=origTop+(clientY-startY);

      // 화면 경계 제한
      const w=modal.offsetWidth, h=modal.offsetHeight;
      const vw=window.innerWidth, vh=window.innerHeight;
      const margin=40; // 최소 margin 영역이 화면 안에 남도록
      newLeft=Math.max(-w+margin, Math.min(vw-margin, newLeft));
      newTop=Math.max(0, Math.min(vh-margin, newTop));

      modal.style.left=newLeft+'px';
      modal.style.top=newTop+'px';

      e.preventDefault();
    }

    function onEnd(){
      if(!isDragging) return;
      isDragging=false;
      modal.classList.remove('dragging');
    }

    // 마우스
    handle.addEventListener('mousedown', onStart);
    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup', onEnd);

    // 터치
    handle.addEventListener('touchstart', onStart, {passive:false});
    document.addEventListener('touchmove', onMove, {passive:false});
    document.addEventListener('touchend', onEnd);
  }
})();
</script>
