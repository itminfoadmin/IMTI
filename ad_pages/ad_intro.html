<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IMTI - Admin Door</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&family=Noto+Sans+KR:wght@400;500;700;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="ad_common.css">
    <style>
        body { height: 100vh; overflow: hidden; }
        .main {
            flex: 1; display: flex; flex-direction: column;
            margin: 20px; border: 1px dashed #fff; border-radius: 2px;
            overflow: hidden; min-height: 0; position: relative;
        }
        .dashboard {
            flex: 1; display: flex; align-items: center; justify-content: center;
            gap: 20px; padding: 40px 60px;
            padding-bottom: calc(40px + 40%);
        }
        .stat-card { display: flex; flex-direction: column; align-items: center; gap: 18px; flex: 1; min-width: 0; max-width: 260px; }
        .stat-number {
            font-family: 'Gowun Batang', serif;
            font-size: clamp(2rem, 6vw, 9rem); font-weight: 500; color: #343a40;
            line-height: 1; width: 100%; text-align: center;
            letter-spacing: -0.03em; white-space: nowrap; overflow: hidden;
        }
        .stat-label {
            font-family: 'Gowun Batang', serif;
            font-size: clamp(0.5rem, 0.9vw, 0.82rem); font-weight: 500; color: #6c757d;
            letter-spacing: 0.08em; text-align: center; white-space: nowrap;
            text-transform: uppercase; width: 100%; overflow: hidden; text-overflow: ellipsis;
        }
        .stat-label::before { content: '> '; color: #adb5bd; }
        .loading-wrap {
            flex: 1; display: flex; align-items: center; justify-content: center; gap: 10px;
            font-family: 'Gowun Batang', serif; font-size: 0.82rem; color: #adb5bd;
        }
        .spinner {
            width: 18px; height: 18px; border: 2px solid #e9ecef; border-top-color: #adb5bd;
            border-radius: 50%; animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<br><br><br><br><br><br><br>
<div class="main" id="main-wrap">
    <div class="loading-wrap" id="loading-wrap">
        <div class="spinner"></div>
        <span>Loading...</span>
    </div>
    <div class="dashboard" id="dashboard" style="display:none;"></div>
</div>

<script src="ad_common.js"></script>
<script>
window.__pageInit = function() {
    const SHEET_ID = '2PACX-1vQRxi28M9azVIO7Nyp3wpr5PUuCUSDNXMwuIbPZ-KaZxuPUVVF15zFlfAao0QttcGN4BJJcZQLikqv_';
    const GID      = '557422957';
    const CSV_URL  = `https://docs.google.com/spreadsheets/d/e/${SHEET_ID}/pub?gid=${GID}&single=true&output=csv`;

    const DATA_ROW    = 2;
    const LABEL_ROW   = 4;
    const COL_INDEXES = [1, 3, 5, 7, 9, 11];

    function parseCSV(text) {
        return text.split('\n').map(row => {
            const cells = [];
            let cur = '', inQ = false;
            for (let i = 0; i < row.length; i++) {
                const ch = row[i];
                if (ch === '"') { inQ = !inQ; }
                else if (ch === ',' && !inQ) { cells.push(cur.trim()); cur = ''; }
                else { cur += ch; }
            }
            cells.push(cur.trim());
            return cells;
        });
    }

    function render(rows) {
        const dashboard = document.getElementById('dashboard');
        const loading   = document.getElementById('loading-wrap');
        dashboard.innerHTML = '';
        const dataRow  = rows[DATA_ROW]  || [];
        const labelRow = rows[LABEL_ROW] || [];
        COL_INDEXES.forEach(idx => {
            const num   = (dataRow[idx]  || '—').replace(/"/g, '').trim();
            const label = (labelRow[idx] || '').replace(/"/g, '').trim();
            const card = document.createElement('div');
            card.className = 'stat-card';
            card.innerHTML =
                '<div class="stat-number">' + num + '</div>' +
                '<div class="stat-label">'  + label + '</div>';
            dashboard.appendChild(card);
        });
        loading.style.display   = 'none';
        dashboard.style.display = 'flex';
        setTimeout(fitNumbers, 50);
    }

    fetch(CSV_URL)
        .then(r => { if (!r.ok) throw new Error('fetch failed'); return r.text(); })
        .then(text => render(parseCSV(text)))
        .catch(err => {
            console.error('[ad_intro] CSV fetch error:', err);
            document.getElementById('loading-wrap').innerHTML =
                '<span style="color:#e03131;">Failed to load data. Please refresh the page.</span>';
        });

    /* Auto-shrink oversized stat numbers */
    function fitNumbers() {
        document.querySelectorAll('.stat-number').forEach(function(el) {
            el.style.fontSize = '';
            var size   = parseFloat(getComputedStyle(el).fontSize);
            var parent = el.parentElement;
            if (parent && parent.clientWidth > 0) {
                while (el.scrollWidth > parent.clientWidth && size > 16) {
                    size -= 2;
                    el.style.fontSize = size + 'px';
                }
            }
        });
    }
    window.addEventListener('resize', fitNumbers);
};
</script>
</body>
</html>
