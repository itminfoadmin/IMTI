<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IMTI - Admin Door</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&family=Noto+Sans+KR:wght@400;500;700;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="ad_common.css">
    <style>
        body { height: 100vh; overflow: hidden; }

        /* ── Main ── */
        .main {
            flex: 1; display: flex; flex-direction: column;
            margin: 20px; border: 1px dashed #fff; border-radius: 2px;
            overflow: hidden; min-height: 0; position: relative;
        }

        /* ── Dashboard ── */
        .dashboard {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 120px;
            padding: 40px 60px;
            padding-bottom: calc(40px + 40%);
        }
        .stat-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 18px;
            flex: 1;
            min-width: 0;
            max-width: 260px;
        }
        .stat-number {
            font-family: 'DM Mono', monospace;
            font-size: clamp(2rem, 6vw, 9rem);
            font-weight: 500;
            color: #343a40;
            line-height: 1;
            width: 100%;
            text-align: center;
            letter-spacing: -0.03em;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: clip;
        }

        .stat-label {
            font-family: 'DM Mono', monospace;
            font-size: clamp(0.5rem, 0.9vw, 0.82rem);
            font-weight: 500;
            color: #6c757d;
            letter-spacing: 0.08em;
            text-align: center;
            white-space: nowrap;
            text-transform: uppercase;
            width: 100%;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .stat-label::before { content: '> '; color: #adb5bd; }
        .stat-label::after  { content: ''; }

        /* ── Loading / Error ── */
        .loading-wrap {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            font-family: 'DM Mono', monospace;
            font-size: 0.82rem;
            color: #adb5bd;
        }
        .spinner {
            width: 18px; height: 18px;
            border: 2px solid #e9ecef;
            border-top-color: #adb5bd;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<!-- ※ 네비바 + 로그아웃 팝업은 ad_common.js 가 자동 삽입합니다 -->

<!-- ── Main ── -->
<br><br><br><br><br><br><br>
<div class="main" id="main-wrap">
    <div class="loading-wrap" id="loading-wrap">
        <div class="spinner"></div>
        <span>Loading...</span>
    </div>
    <div class="dashboard" id="dashboard" style="display:none;"></div>
</div>

<!-- ── 공통 스크립트 ── -->
<script src="ad_common.js"></script>
<script>
/**
 * ad_common.js의 자동 실행 로직으로 인한 중복 실행을 방지하기 위해
 * 즉시 실행 함수(IIFE) 대신 window.__pageInit에 로직을 담습니다.
 */
window.__pageInit = function() {
    /* ── 스프레드시트 CSV export URL ── */
    const SHEET_ID  = '2PACX-1vQRxi28M9azVIO7Nyp3wpr5PUuCUSDNXMwuIbPZ-KaZxuPUVVF15zFlfAao0QttcGN4BJJcZQLikqv_';
    const GID       = '557422957';
    const CSV_URL   = `https://docs.google.com/spreadsheets/d/e/${SHEET_ID}/pub?gid=${GID}&single=true&output=csv`;

    /* 스프레드시트 구조 설정 */
    const DATA_ROW    = 2;
    const LABEL_ROW   = 4;
    const COL_INDEXES = [1, 3, 5, 7];

    function parseCSV(text) {
        return text.split('\n').map(row => {
            const cells = [];
            let cur = '', inQ = false;
            for (let i = 0; i < row.length; i++) {
                const ch = row[i];
                if (ch === '"') { inQ = !inQ; }
                else if (ch === ',' && !inQ) { cells.push(cur.trim()); cur = ''; }
                else { cur += ch; }
            }
            cells.push(cur.trim());
            return cells;
        });
    }

    function render(rows) {
        const dashboard = document.getElementById('dashboard');
        const loading   = document.getElementById('loading-wrap');

        // [수정] 데이터 렌더링 전 기존 내용을 비워 중복 생성을 확실히 방지합니다.
        dashboard.innerHTML = '';

        const dataRow  = rows[DATA_ROW]  || [];
        const labelRow = rows[LABEL_ROW] || [];

        COL_INDEXES.forEach(idx => {
            const num   = (dataRow[idx]  || '—').replace(/"/g, '').trim();
            const label = (labelRow[idx] || '').replace(/"/g, '').trim();

            const card = document.createElement('div');
            card.className = 'stat-card';
            card.innerHTML =
                '<div class="stat-number">' + num + '</div>' +
                '<div class="stat-label">'  + label + '</div>';
            dashboard.appendChild(card);
        });

        loading.style.display   = 'none';
        dashboard.style.display = 'flex';
        setTimeout(fitNumbers, 50);
    }

    fetch(CSV_URL)
        .then(function(r) {
            if (!r.ok) throw new Error('fetch failed');
            return r.text();
        })
        .then(function(text) { render(parseCSV(text)); })
        .catch(function(err) {
            console.error('[ad_intro] CSV fetch error:', err);
            document.getElementById('loading-wrap').innerHTML =
                '<span style="color:#e03131;">데이터를 불러오지 못했습니다. 잠시 후 새로고침해주세요.</span>';
        });

    /* 숫자가 카드 너비를 넘칠 경우 폰트 자동 축소 */
    function fitNumbers() {
        document.querySelectorAll('.stat-number').forEach(function(el) {
            el.style.fontSize = '';
            var maxSize = parseFloat(getComputedStyle(el).fontSize);
            var parent  = el.parentElement;
            var size    = maxSize;
            if (parent && parent.clientWidth > 0) {
                while (el.scrollWidth > parent.clientWidth && size > 16) {
                    size -= 2;
                    el.style.fontSize = size + 'px';
                }
            }
        });
    }
    window.addEventListener('resize', fitNumbers);
};
</script>
</body>
</html>
