<script>
    function imtiToggleMenu() {
        const drawer   = document.getElementById('nav-drawer');
        const backdrop = document.getElementById('nav-drawer-backdrop');
        const isOpen   = drawer.classList.contains('open');
        if (isOpen) { imtiCloseMenu(); } else {
            drawer.classList.add('open');
            backdrop.classList.add('open');
        }
    }
    function imtiCloseMenu() {
        document.getElementById('nav-drawer').classList.remove('open');
        document.getElementById('nav-drawer-backdrop').classList.remove('open');
    }
    document.addEventListener('keydown', e => { if (e.key === 'Escape') imtiCloseMenu(); });
</script>
