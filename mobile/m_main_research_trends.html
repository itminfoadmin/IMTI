<!DOCTYPE html>
<html lang="ko">
<head>
    <link rel="preconnect" href="https://lookerstudio.google.com">
    <link rel="dns-prefetch" href="https://lookerstudio.google.com">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IMTI - Research Trends</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&family=Noto+Sans+KR:wght@400;500;700;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        html { font-size: calc(14px + (18 - 14) * ((100vw - 1000px) / (1920 - 1000))); scrollbar-width: none !important; -ms-overflow-style: none !important; overflow-x: hidden; }
        html::-webkit-scrollbar { display: none !important; width: 0 !important; height: 0 !important; }
        body { scrollbar-width: none !important; -ms-overflow-style: none !important; overflow-x: hidden; }
        body::-webkit-scrollbar { display: none !important; width: 0 !important; height: 0 !important; }
        @media (max-width: 1000px) { html { font-size: 13px; } }

        body {
            font-family: 'Noto Sans KR', 'DM Mono', sans-serif;
            background: #fff; color: #343a40;
            min-height: 100vh;
            display: block;
        }

        /* ── topnav ── */
        .topnav { background: #fff; padding: 3vh 5% 1.5vh 5%; display: flex; justify-content: space-between; align-items: center; }
        .logo-area { padding-left: 5%; flex-shrink: 0; }
        .logo-img { height: 4rem; width: auto; transition: transform 0.3s; cursor: pointer; }
        .logo-img:hover { transform: scale(1.03); }

        /* 햄버거 버튼 */
        .nav-hamburger { margin-right: 5%; width: 38px; height: 30px; display: flex; flex-direction: column; justify-content: space-between; background: none; border: none; cursor: pointer; padding: 4px 0; }
        .nav-hamburger span { display: block; height: 2px; width: 100%; background: #495057; border-radius: 2px; transition: 0.3s; }
        .nav-hamburger:hover span { background: #212529; }

        /* 슬라이드 메뉴 백드롭 */
        .nav-drawer-backdrop { position: fixed; inset: 0; background: rgba(0,0,0,0.35); opacity: 0; pointer-events: none; transition: opacity 0.3s ease; z-index: 1500; }
        .nav-drawer-backdrop.open { opacity: 1; pointer-events: auto; }

        /* 슬라이드 메뉴 패널 */
        .nav-drawer { position: fixed; top: 0; right: 0; width: 320px; max-width: 85vw; height: 100%; background: #fff; box-shadow: -4px 0 24px rgba(0,0,0,0.12); transform: translateX(100%); transition: transform 0.3s ease; z-index: 1600; display: flex; flex-direction: column; overflow-y: auto; scrollbar-width: none; }
        .nav-drawer::-webkit-scrollbar { display: none; }
        .nav-drawer.open { transform: translateX(0); }

        .nav-drawer-header { display: flex; align-items: center; justify-content: flex-end; padding: 20px 22px; border-bottom: 1px solid #f1f3f5; }
        .nav-drawer-logo { display: none; }
        .nav-drawer-logo-img { height: 2.4rem; width: auto; }
        .nav-drawer-close { background: none; border: none; cursor: pointer; font-size: 1.8rem; line-height: 1; color: #868e96; }
        .nav-drawer-close:hover { color: #212529; }

        /* 맨 상단: 접속 이메일 */
        .nav-drawer-account { display: flex; flex-direction: column; gap: 4px; padding: 18px 22px; background: #f8f9fa; border-bottom: 1px solid #f1f3f5; }
        .nav-drawer-account-label { font-family: 'DM Mono', monospace; font-size: 0.68rem; letter-spacing: 0.12em; text-transform: uppercase; color: #adb5bd; }
        .nav-drawer-email { font-family: 'DM Mono', monospace; font-size: 0.95rem; font-weight: 500; color: #343a40; word-break: break-all; }

        /* 메인 메뉴 */
        .nav-drawer-menu { display: flex; flex-direction: column; padding: 10px 0; }
        .nav-drawer-menu .nav-menu-item { font-family: 'Noto Sans KR', sans-serif; font-size: 1rem; color: #495057; text-align: left; text-decoration: none; background: none; border: none; padding: 14px 22px; cursor: pointer; border-left: 3px solid transparent; transition: 0.15s; }
        .nav-drawer-menu .nav-menu-item:hover { background: #f8f9fa; color: #212529; }
        .nav-drawer-menu .nav-menu-item.active { color: #212529; font-weight: 700; border-left-color: #d47878; background: #fdf5f5; }

        /* 계정 관리 버튼 */
        .nav-drawer-account-actions { margin-top: 8px; display: flex; flex-direction: column; gap: 2px; padding: 14px 22px 8px; border-top: 1px solid #f1f3f5; }
        .nav-drawer-account-actions .nav-btn { font-family: 'DM Mono', monospace; font-size: 0.85rem; color: #868e96; text-align: left; background: none; border: none; cursor: pointer; padding: 10px 0; }
        .nav-drawer-account-actions .nav-btn:hover { color: #1a56db; }
        .nav-drawer-account-actions .nav-btn-logout:hover { color: #d4452f; }

        /* ── iframe area ── */
        .iframe-wrap { padding: 20px 20%; position: relative; overflow: visible; display: block; }
        .iframe-inner { width: 100%; background: #fff; position: relative; min-height: 0; overflow: visible; }

        /* ── preload overlay ── */
        #preload-overlay {
            position: fixed; inset: 0; background: #fff; z-index: 2000;
            display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 24px;
            transition: opacity 0.5s ease;
        }
        #preload-overlay.fade-out { opacity: 0; pointer-events: none; }
        .preload-logo { height: 10rem; width: auto; opacity: 0.85; }
        .preload-title { font-family: 'DM Mono', monospace; font-size: 0.82rem; letter-spacing: 0.18em; text-transform: uppercase; color: #adb5bd; }
        .preload-bar-row { display: flex; align-items: center; gap: 10px; width: 260px; }
        .preload-pulse-dot { width: 8px; height: 8px; border-radius: 50%; background: #d47878; flex-shrink: 0; animation: preload-pulse 1.2s ease-in-out infinite; }
        @keyframes preload-pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.35;transform:scale(0.65)} }
        .preload-bar-wrap { flex: 1; height: 2px; background: #f1f3f5; border-radius: 99px; overflow: hidden; }
        .preload-bar { height: 100%; width: 0%; background: #d47878; border-radius: 99px; transition: width 0.4s ease; }
        .preload-count { font-family: 'DM Mono', monospace; font-size: 0.72rem; color: transparent; letter-spacing: 0.1em; }

        @keyframes spin { to { transform: rotate(360deg); } }

        /* ── tab loading overlay ── */
        #tab-loading-overlay {
            position: absolute; inset: 0; background: #fff;
            display: none; flex-direction: column;
            align-items: center; justify-content: center;
            gap: 16px; z-index: 50;
            opacity: 0; transition: opacity 0.18s ease;
        }
        #tab-loading-overlay.show { display: flex; }
        #tab-loading-overlay.visible { opacity: 1; }
        .tab-loading-label {
            font-family: 'Noto Sans KR', sans-serif; font-size: 0.82rem;
            font-weight: 500; letter-spacing: 0.04em; color: #868e96;
        }
        .tab-progress-track {
            width: 220px; height: 2px; background: #f1f3f5;
            border-radius: 99px; overflow: hidden;
        }
        .tab-progress-bar {
            height: 100%; width: 0%; background: #d47878;
            border-radius: 99px; transition: width 0.28s ease;
        }

        /* ── iframes ── */
        iframe {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%;
            border: none;
            visibility: hidden;
            z-index: 0;
            pointer-events: none;
            transition: none;
        }
        iframe.active {
            visibility: visible;
            z-index: 1;
            pointer-events: auto;
        }
        /* 단일 Looker 리포트 iframe: 일반 흐름에 두고 scale로 폭 맞춤 */
        iframe.report-frame {
            position: static !important;
            top: auto !important; left: auto !important;
            visibility: visible !important;
            pointer-events: auto !important;
            z-index: 1;
            display: block;
        }
        /* iframe 영역 스크롤바 숨김 (페이지/내부 모두) */
        .iframe-wrap, .iframe-inner {
            scrollbar-width: none !important;
            -ms-overflow-style: none !important;
        }
        .iframe-wrap::-webkit-scrollbar,
        .iframe-inner::-webkit-scrollbar { display: none !important; width: 0 !important; height: 0 !important; }

        /* ===================== MOBILE OPTIMIZATION ===================== */
        @media (max-width: 768px) {
            html { font-size: 14px; }

            #navbar-placeholder { position: fixed; top: 0; left: 0; right: 0; z-index: 1400; background: #fff; box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
            .topnav { flex-direction: row; align-items: center; justify-content: space-between; gap: 12px; padding: 16px 4%; background: #fff; }
            #main-body { padding-top: 72px; }
            .logo-area { padding-left: 0; }
            .logo-img { height: 3rem; }
            .nav-hamburger { flex: 0 0 auto; margin-right: 0; }
            .nav-drawer { width: 300px; }

            /* iframe area: 높이는 JS가 리포트 크기에 맞춰 동적 설정 */
            .iframe-wrap { padding: 12px 3% 16px; display: block; overflow: visible; }
            .iframe-inner { min-height: 0; height: auto; overflow: visible; }

            html, body { scrollbar-width: none !important; -ms-overflow-style: none !important; }
            html::-webkit-scrollbar, body::-webkit-scrollbar { display: none !important; width: 0 !important; height: 0 !important; }

            .preload-logo { height: 6rem; }
        }
    </style>

</head>
<body id="main-body">

<div id="preload-overlay">
    <img src="../img/logo.png" alt="IMTI" class="preload-logo"
         onerror="this.style.display='none'">
    <div class="preload-bar-row">
        <div class="preload-pulse-dot" id="preload-dot"></div>
        <div class="preload-bar-wrap">
            <div class="preload-bar" id="preload-bar"></div>
        </div>
    </div>
    <div class="preload-title">Loading Contents...</div>
    <div class="preload-count" id="preload-count">0 / 2</div>
</div>

<div id="navbar-placeholder">
<nav class="topnav">
    <div class="logo-area">
        <img src="../img/logo-main_mobile.png" alt="IMTI" class="logo-img">
    </div>
    <button class="nav-hamburger" id="nav-hamburger" onclick="imtiToggleMenu()" aria-label="메뉴 열기">
        <span></span><span></span><span></span>
    </button>
</nav>

<div class="nav-drawer-backdrop" id="nav-drawer-backdrop" onclick="imtiCloseMenu()"></div>

<aside class="nav-drawer" id="nav-drawer">
    <div class="nav-drawer-header">
        <div class="nav-drawer-logo">
            <img src="../img/logo-main_con.png" alt="IMTI" class="nav-drawer-logo-img">
        </div>

    <div class="nav-drawer-account">

        <span class="nav-drawer-email" id="user-email-display">Guest User</span>
    </div>

    <nav class="nav-drawer-menu">
        <a class="nav-menu-item" href="m_main_what_about.html" data-page="m_main_what_about.html">What's_IMTI?</a>
        <a class="nav-menu-item active" href="m_main_research_trends.html" data-page="m_main_research_trends.html">Reserach_Trends</a>
        <a class="nav-menu-item" href="m_main_mti_seraching.html" data-page="m_main_mti_seraching.html">MTI_Searching</a>

        <button class="nav-btn" onclick="imtiOpenModal('modal-withdraw')">회원탈퇴</button>
        <button class="nav-btn nav-btn-logout" onclick="imtiOpenModal('modal-logout')">로그아웃</button>

</aside>
</div>

<div class="iframe-wrap">
    <div class="iframe-inner" id="iframe-container">
        <div id="tab-loading-overlay">
            <div class="tab-loading-label" id="tab-loading-label">Data를 불러오는 중...</div>
            <div class="tab-progress-track">
                <div class="tab-progress-bar" id="tab-progress-bar"></div>
            </div>
        </div>
    </div>
</div>

<script>
/* ───────────────────────────────────────────────
   단일 Looker Studio 리포트 임베드
   리포트 페이지 설정: 400 x 1300 (가로 x 세로)
   - 화면 폭에 맞춰 비율 유지 축소(scale)
   - 세로는 페이지 전체 스크롤로 읽힘
   ─────────────────────────────────────────────── */
const LOOKER_SRC = "https://datastudio.google.com/embed/reporting/f1dfff92-d28f-4016-bc65-6d533689006b/page/YpqxF";
const REPORT_W = 400;   // 리포트 페이지 가로
const REPORT_H = 1450;  // 리포트 페이지 세로

function sizeReportIframe() {
    const c = document.getElementById('iframe-container');
    if (!c) return;
    const f = c.querySelector('iframe.report-frame');
    if (!f) return;

    // 가용 폭 측정 (컨테이너 부모 기준)
    const wrap = c.parentElement || c;
    const availW = wrap.clientWidth || c.clientWidth || window.innerWidth;
    const scale  = availW / REPORT_W;

    // iframe은 리포트 실제 크기 그대로 두고, scale로 축소만 한다.
    f.style.width  = REPORT_W + 'px';
    f.style.height = REPORT_H + 'px';
    f.style.transformOrigin = 'top left';
    f.style.transform = 'scale(' + scale + ')';
    f.style.position = 'static';
    f.style.display = 'block';
    f.style.margin = '0';

    // scale 후 실제 차지하는 크기로 컨테이너 높이를 맞춰 잘림 방지
    const scaledW = Math.round(REPORT_W * scale);
    const scaledH = Math.round(REPORT_H * scale);
    c.style.position = 'relative';
    c.style.overflow = 'visible';
    c.style.width    = scaledW + 'px';
    c.style.maxWidth = '100%';
    c.style.margin   = '0 auto';
    c.style.height   = scaledH + 'px';
    c.style.minHeight = scaledH + 'px';
}

function hideReportOverlay() {
    const ov = document.getElementById('tab-loading-overlay');
    if (ov) { ov.classList.remove('visible'); setTimeout(() => ov.classList.remove('show'), 200); }
    // 전체 화면 프리로드 오버레이(로고/진행바)도 함께 닫는다
    const pre = document.getElementById('preload-overlay');
    if (pre) {
        const bar = document.getElementById('preload-bar');
        if (bar) bar.style.width = '100%';
        pre.classList.add('fade-out');
        setTimeout(() => { if (pre && pre.parentNode) pre.style.display = 'none'; }, 500);
    }
}

window.addEventListener('DOMContentLoaded', () => {
    const c = document.getElementById('iframe-container');
    if (!c) return;
    const ov = document.getElementById('tab-loading-overlay');
    if (ov) ov.classList.add('show', 'visible');

    // 프리로드 진행바를 천천히 채워 "멈춰 있지 않게" 보이도록
    const bar = document.getElementById('preload-bar');
    let pct = 0;
    const barTimer = setInterval(() => {
        pct = Math.min(pct + 4, 90);
        if (bar) bar.style.width = pct + '%';
        if (pct >= 90) clearInterval(barTimer);
    }, 200);

    let done = false;
    function finish() {
        if (done) return; done = true;
        clearInterval(barTimer);
        sizeReportIframe();
        hideReportOverlay();
    }

    const f = document.createElement('iframe');
    f.className = 'report-frame active';
    f.setAttribute('frameborder', '0');
    f.setAttribute('allowfullscreen', '');
    f.setAttribute('scrolling', 'no');
    f.style.border = '0';
    f.onload = function() { sizeReportIframe(); setTimeout(finish, 400); };
    f.src = LOOKER_SRC;
    c.appendChild(f);
    sizeReportIframe();
    // 안전장치: onload가 안 와도 일정 시간 뒤 무조건 표시
    setTimeout(finish, 5000);
});

window.addEventListener('resize', sizeReportIframe);
</script>
<script src="m_common.js"></script>
<script>
    function imtiToggleMenu() {
        const drawer   = document.getElementById('nav-drawer');
        const backdrop = document.getElementById('nav-drawer-backdrop');
        if (!drawer) return;
        if (drawer.classList.contains('open')) { imtiCloseMenu(); }
        else { drawer.classList.add('open'); backdrop.classList.add('open'); }
    }
    function imtiCloseMenu() {
        const drawer   = document.getElementById('nav-drawer');
        const backdrop = document.getElementById('nav-drawer-backdrop');
        if (drawer)   drawer.classList.remove('open');
        if (backdrop) backdrop.classList.remove('open');
    }
    document.addEventListener('keydown', e => { if (e.key === 'Escape') imtiCloseMenu(); });
</script>
<script>imtiRequireAuth(); imtiLoadNavbar("m_main_research_trends.html");</script>
</body>
</html>
