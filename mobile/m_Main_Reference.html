<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>관련 연구물 목록</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
    <link href="https://googleapis.com/css2?family=Gowun+Batang:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        html, body {
            width: 100%; height: 100%;
            scrollbar-width: none !important;
            -ms-overflow-style: none !important;
        }
        html::-webkit-scrollbar,
        body::-webkit-scrollbar { display: none !important; width: 0 !important; }

        body {
            font-family: 'Noto Sans KR', sans-serif;
            background: #fff;
            color: #333;
            display: flex;
            flex-direction: column;
            -webkit-font-smoothing: antialiased;
        }

        .fixed-header {
            flex-shrink: 0;
            position: sticky;
            top: 0;
            z-index: 10;
            background: #fff;
            margin-left: 3%;
            padding: 10px 10% 10px;
            border-bottom: 1px solid #ffffff;
        }
        .header-row {
            display: flex;
            align-items: baseline;
            justify-content: flex-end;
            gap: 16px;
        }
        .sub-notice {
            font-size: 0.73rem;
            font-weight: 600;
            font-family: 'Gowun Batang', serif;
            color: #343a40;
            display: none;
        }
        .notice {
            font-family: 'Noto Sans KR', sans-serif;
            font-size: 0.7rem;
            font-weight: 600;
            color: #D49860;
            white-space: nowrap;
            display: none;
        }

        .content-wrap {
            flex: 1;
            margin-left: 3%;
            padding: 10px 10% 20px;
            overflow-y: auto;
            scrollbar-width: none;
            -ms-overflow-style: none;
            min-height: 0;
        }
        .content-wrap::-webkit-scrollbar { display: none; }

        .loading {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 30px 0;
            color: #adb5bd;
            font-size: 0.78rem;
            font-family: 'DM Mono', monospace;
            letter-spacing: 0.1em;
        }
        .loading-dot {
            width: 7px; height: 7px; border-radius: 50%;
            background: #d49860;
            animation: dot-pulse 1.2s ease-in-out infinite;
        }
        @keyframes dot-pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50%       { opacity: 0.3; transform: scale(0.6); }
        }

        .error {
            display: none;
            padding: 20px 0;
            color: #e03131;
            font-size: 0.82rem;
        }

        ol {
            display: none;
            list-style: none;
            padding-left: 0;
        }
        ol li {
            padding: 5px 0 5px 3.5em;
            text-indent: -3.5em;
            font-size: 12.6px;
            line-height: 2;
            color: #343a40;
            font-family: 'Gowun Batang', serif;
            word-break: keep-all;
        }
        .end-of-list {
            display: none;
            margin-top: 16px;
            font-size: 0.9rem;
            color: #343a40;
            font-family: 'Noto Sans KR', sans-serif;
            text-align: right;
        }

        /* 모바일: 부모 iframe이 콘텐츠 높이만큼 늘어나는 구조이므로
           자체 스크롤(flex + overflow:auto)을 풀고 일반 문서 흐름으로 표시 */
        @media (max-width: 768px) {
            html, body { height: auto; min-height: 0; }
            body { display: block; }
            .fixed-header { position: static; margin-left: 0; padding: 10px 4%; }
            .content-wrap { flex: none; overflow-y: visible; min-height: 0; height: auto; margin-left: 0; padding: 10px 4% 20px; }
            ol li { font-size: 12.6px; line-height: 2; }
            .notice { font-size: 0.92rem; white-space: normal; }
            .sub-notice { font-size: 0.92rem; }
            .end-of-list { font-size: 1rem; }
        }
    </style>
</head>
<body>

    <div class="fixed-header">
        <div class="header-row">
            <p class="notice" id="notice-count"></p>
        </div>
    </div>

    <div class="content-wrap">
        <div class="loading" id="loading">
            <div class="loading-dot"></div>
            <span>Loading...</span>
        </div>
        <div class="error" id="error">데이터를 불러오는 데 실패했습니다. 잠시 후 다시 시도해 주세요.</div>
        <div class="sub-notice" id="sub-notice">※ 누락, 오기 혹은 추천 연구물이 있으면 상단 메뉴의 [Contact-US]를 통해 운영진에게 알려주세요.</div><br>
        <ol id="ref-list"></ol>
        <div class="end-of-list" id="end-of-list">— End of List —</div>
    </div>

    <script>
    const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vReDdJqNzhR0M-GLK0d5fvyALhSllo1vbFGrB3FRFcU7gpdYbriPrx-Sb6FN1eiAUHrBlvdOY4Y5Y9E/pub?gid=0&single=true&output=csv';

    function parseCSV(text) {
        const rows = [];
        let curRow = [];
        let curCell = '';
        let inQuotes = false;

        for (let i = 0; i < text.length; i++) {
            const char = text[i];
            const nextChar = text[i + 1];

            if (inQuotes && char === '"' && nextChar === '"') {
                curCell += '"';
                i++;
            } else if (char === '"') {
                inQuotes = !inQuotes;
            } else if (!inQuotes && char === ',') {
                curRow.push(curCell);
                curCell = '';
            } else if (!inQuotes && (char === '\r' || char === '\n')) {
                if (curCell !== '' || curRow.length > 0) {
                    curRow.push(curCell);
                    rows.push(curRow);
                    curRow = [];
                    curCell = '';
                }
                if (char === '\r' && nextChar === '\n') i++; // skip CRLF
            } else {
                curCell += char;
            }
        }
        // Process any remaining data after the loop
        if (curRow.length > 0 || curCell !== '') {
            curRow.push(curCell);
            rows.push(curRow);
        }
        return rows;
    }

    async function loadData() {
        try {
            const res = await fetch(CSV_URL);
            if (!res.ok) throw new Error('fetch failed');
            const text = await res.text();
            const rows = parseCSV(text);

            const items = rows
                .slice(1)
                .map(r => {
                    let text = (r[23] || '').trim();            // col 23: full reference text
                    const type = (r[22] || '').trim();          // col 22: entry type
                    const target4 = (r[4] || '').trim();        // col 4:  bold target 1
                    const anchor16 = (r[16] || '').trim();      // col 16: anchor point
                    const target6Raw = (r[6] || '').trim();     // col 6:  bold target 2 (raw)
                    const target6Name = target6Raw.split('(')[0].trim(); // extract name before '('

                    if (type === "학술지 논문" && text) {
                        if (target4 && text.includes(target4)) {
                            text = text.split(target4).join(`<strong>${target4}</strong>`);
                        }
                        if (anchor16 && target6Name && text.includes(anchor16)) {
                            const anchorIdx = text.indexOf(anchor16) + anchor16.length;
                            const beforePart = text.substring(0, anchorIdx);
                            const afterPart = text.substring(anchorIdx);
                            if (afterPart.includes(target6Name)) {
                                const newAfterPart = afterPart.replace(target6Name, `<strong>${target6Name}</strong>`);
                                text = beforePart + newAfterPart;
                            }
                        }
                    }
                    return text;
                })
                .filter(v => v.length > 0 && /\S/.test(v));

            items.sort((a, b) => {
                // Strip HTML tags for plain text comparison
                const cleanA = a.replace(/<\/?[^>]+(>|$)/g, "");
                const cleanB = b.replace(/<\/?[^>]+(>|$)/g, "");

                // Detect language by first character
                const isKorean = (str) => /^[가-힣]/.test(str);
                const aIsKo = isKorean(cleanA);
                const bIsKo = isKorean(cleanB);

                // Korean entries sort before English entries
                if (aIsKo !== bIsKo) return aIsKo ? -1 : 1;

                // Within the same language, make "(" sort before ","
                const sortA = cleanA.replace(/,/g, '\uffff');
                const sortB = cleanB.replace(/,/g, '\uffff');

                return sortA.localeCompare(sortB, 'ko');
            });

            const list = document.getElementById('ref-list');
            items.forEach(item => {
                const li = document.createElement('li');
                li.innerHTML = item;
                list.appendChild(li);
            });

            document.getElementById('loading').style.display = 'none';
            list.style.display = 'block';
            document.getElementById('end-of-list').style.display = 'block';

            // 목록이 모두 렌더된 뒤 부모(모바일 래퍼)에 높이 재측정 요청
            try { window.parent.postMessage('imti-content-resized', '*'); } catch (_) {}

        } catch (e) {
            document.getElementById('loading').style.display = 'none';
            document.getElementById('error').style.display = 'block';
        }
    }

    loadData();
    </script>

</body>
</html>
