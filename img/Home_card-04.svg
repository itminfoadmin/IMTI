<!-- 브라우저 창 -->
<rect x="20" y="20" width="640" height="640" rx="12" fill="#fff" stroke="#e0e0e0" stroke-width="1.5"/>
<!-- 타이틀바 -->
<rect x="20" y="20" width="640" height="46" rx="12" fill="#f5f5f5" stroke="#e5e5e5" stroke-width="1"/>
<rect x="20" y="52" width="640" height="14" rx="0" fill="#f5f5f5"/>
<circle cx="48" cy="43" r="7" fill="#ff5f57"/>
<circle cx="70" cy="43" r="7" fill="#febc2e"/>
<circle cx="92" cy="43" r="7" fill="#28c840"/>
<!-- URL 바 -->
<rect x="140" y="33" width="400" height="22" rx="11" fill="#fff" stroke="#ddd" stroke-width="1"/>
<text x="340" y="48" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#777">https://claude.ai/chat</text>
<!-- 사이드바 -->
<rect x="20" y="66" width="155" height="594" rx="0" fill="#f9fafb" stroke="#eee" stroke-width="1"/>
<text x="97" y="95" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#374151" font-weight="bold">Chats</text>
<rect x="30" y="104" width="135" height="32" rx="8" fill="#e0e7ff"/>
<text x="97" y="124" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#3730a3">Gradient Descent</text>
<rect x="30" y="142" width="135" height="32" rx="8" fill="none"/>
<text x="97" y="162" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#9ca3af">Neural Networks</text>
<rect x="30" y="180" width="135" height="32" rx="8" fill="none"/>
<text x="97" y="200" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#9ca3af">Python Basics</text>
<rect x="30" y="218" width="135" height="32" rx="8" fill="none"/>
<text x="97" y="238" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#9ca3af">Sorting Algorithms</text>
<!-- 메인 채팅 영역 -->
<!-- 사용자 메시지 1 -->
<rect x="360" y="78" width="280" height="52" rx="20" fill="#6366f1"/>
<text x="500" y="100" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#fff">What is gradient descent</text>
<text x="500" y="118" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#fff">in machine learning?</text>
<!-- AI 아바타 -->
<circle cx="190" cy="165" r="22" fill="#7c3aed"/>
<text x="190" y="170" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#fff" font-weight="bold">AI</text>
<!-- AI 응답 1 -->
<rect x="222" y="143" width="400" height="115" rx="16" fill="#f5f3ff" stroke="#ddd6fe" stroke-width="1"/>
<text x="242" y="165" font-family="sans-serif" font-size="12" fill="#1f2937" font-weight="bold">Gradient descent</text>
<text x="242" y="185" font-family="sans-serif" font-size="12" fill="#4b5563">is an optimization algorithm used to</text>
<text x="242" y="205" font-family="sans-serif" font-size="12" fill="#4b5563">minimize the loss function by iteratively</text>
<text x="242" y="225" font-family="sans-serif" font-size="12" fill="#7c3aed" font-weight="bold">moving in the steepest descent</text>
<text x="242" y="245" font-family="sans-serif" font-size="12" fill="#4b5563">direction (negative gradient).</text>
<!-- 사용자 메시지 2 -->
<rect x="345" y="278" width="295" height="35" rx="18" fill="#6366f1"/>
<text x="492" y="300" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#fff">Show me the Python code</text>
<!-- AI 응답 2 - 수식 -->
<circle cx="190" cy="340" r="22" fill="#7c3aed"/>
<text x="190" y="345" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#fff" font-weight="bold">AI</text>
<rect x="222" y="320" width="420" height="40" rx="10" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1"/>
<text x="242" y="337" font-family="sans-serif" font-size="13" fill="#166534">The update rule:</text>
<text x="400" y="337" font-family="sans-serif" font-size="14" fill="#15803d" font-weight="bold">θ = θ − α · ∇J(θ)</text>
<rect x="222" y="368" width="420" height="165" rx="10" fill="#1e1e1e"/>
<!-- 코드 에디터 스타일 -->
<rect x="222" y="368" width="420" height="22" rx="10" fill="#2d2d2d"/>
<rect x="222" y="380" width="420" height="10" rx="0" fill="#2d2d2d"/>
<text x="360" y="382" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#888">Python</text>
<text x="238" y="405" font-family="'Courier New',monospace" font-size="11" fill="#6a9955"># Gradient Descent implementation</text>
<text x="238" y="423" font-family="'Courier New',monospace" font-size="11" fill="#c586c0">import</text>
<text x="284" y="423" font-family="'Courier New',monospace" font-size="11" fill="#9cdcfe"> numpy </text>
<text x="345" y="423" font-family="'Courier New',monospace" font-size="11" fill="#c586c0">as</text>
<text x="363" y="423" font-family="'Courier New',monospace" font-size="11" fill="#9cdcfe"> np</text>
<text x="238" y="441" font-family="'Courier New',monospace" font-size="11" fill="#c586c0">def</text>
<text x="262" y="441" font-family="'Courier New',monospace" font-size="11" fill="#dcdcaa"> gradient_descent</text>
<text x="382" y="441" font-family="'Courier New',monospace" font-size="11" fill="#d4d4d4">(X, y, lr=</text>
<text x="454" y="441" font-family="'Courier New',monospace" font-size="11" fill="#b5cea8">0.01</text>
<text x="478" y="441" font-family="'Courier New',monospace" font-size="11" fill="#d4d4d4">, epochs=</text>
<text x="540" y="441" font-family="'Courier New',monospace" font-size="11" fill="#b5cea8">100</text>
<text x="238" y="459" font-family="'Courier New',monospace" font-size="11" fill="#d4d4d4">  theta = np.zeros(X.shape[1])</text>
<text x="238" y="477" font-family="'Courier New',monospace" font-size="11" fill="#c586c0">  for</text>
<text x="264" y="477" font-family="'Courier New',monospace" font-size="11" fill="#d4d4d4"> _ </text>
<text x="280" y="477" font-family="'Courier New',monospace" font-size="11" fill="#c586c0">in</text>
<text x="298" y="477" font-family="'Courier New',monospace" font-size="11" fill="#dcdcaa"> range</text>
<text x="338" y="477" font-family="'Courier New',monospace" font-size="11" fill="#d4d4d4">(epochs):</text>
<text x="238" y="495" font-family="'Courier New',monospace" font-size="11" fill="#d4d4d4">    pred = X @ theta</text>
<text x="238" y="513" font-family="'Courier New',monospace" font-size="11" fill="#d4d4d4">    theta -= lr * X.T @ (pred - y)</text>
<rect x="238" y="519" width="3" height="14" fill="#7c3aed"/>
<!-- 입력창 -->
<rect x="175" y="553" width="480" height="48" rx="24" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1.5"/>
<text x="280" y="581" font-family="sans-serif" font-size="12" fill="#9ca3af">Ask a follow-up question...</text>
<circle cx="630" cy="577" r="16" fill="#6366f1"/>
<text x="630" y="582" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#fff">↑</text>
<!-- 타이틀 -->
<text x="400" y="635" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#6b7280">AI Chatbot — Gradient Descent Explanation</text>
</svg>
