<!DOCTYPE html>
<html lang="ko">
<head>
    <link rel="preconnect" href="https://lookerstudio.google.com">
    <link rel="dns-prefetch" href="https://lookerstudio.google.com">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1400, initial-scale=1.0, minimum-scale=0.3, maximum-scale=3.0">
    <title>IMTI - Research Trends</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&family=Noto+Sans+KR:wght@400;500;700;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        html { font-size: calc(14px + (18 - 14) * ((100vw - 1000px) / (1920 - 1000))); scrollbar-width: none; -ms-overflow-style: none; }
        html::-webkit-scrollbar { display: none; }
        body { scrollbar-width: none; -ms-overflow-style: none; }
        body::-webkit-scrollbar { display: none; }
        @media (max-width: 1000px) { html { font-size: 13px; } }

        body {
            font-family: 'Noto Sans KR', 'DM Mono', sans-serif;
            background: #fff; color: #343a40;
            min-height: 100vh;
            display: grid;
            grid-template-rows: auto auto 0px 1fr;
            transition: grid-template-rows 0.2s ease;
        }
        body.has-subtab { grid-template-rows: auto auto 2.8rem 1fr; }

        /* ── TOP NAV ── */
        .topnav { background: #fff; padding: 4vh 5% 1vh 5%; display: flex; justify-content: space-between; align-items: flex-end; }
        .logo-area { padding-left: 5%; flex-shrink: 0; }
        .logo-img { height: 4rem; width: auto; transition: transform 0.3s; cursor: pointer; }
        .logo-img:hover { transform: scale(1.03); }
        .nav-right-wrap { display: flex; flex-direction: column; align-items: flex-end; gap: 12px; padding-right: 5%; }
        .nav-right-top { display: flex; gap: 15px; align-items: center; }
        .nav-email { font-family: 'DM Mono'; font-size: 0.8rem; color: #868e96; font-weight: 100; }
        .nav-btn { background: none; border: none; cursor: pointer; font-size: 0.8rem; color: #868e96; font-family: 'DM Mono'; }
        .nav-btn:hover { color: #1a56db; text-decoration: underline; }
        .nav-right-bottom { display: flex; gap: 20px; }
        .nav-menu-item { font-family: 'Noto Sans KR'; font-size: 0.85rem; color: #495057; text-decoration: none; transition: 0.2s; cursor: pointer; background: none; border: none; padding: 0; }
        .nav-menu-item:hover, .nav-menu-item.active { color: #212529; font-weight: 700; border-bottom: 2px solid #212529; }

        /* ── TAB BAR ── */
        .tab-bar { display: flex; padding: 0 15%; gap: 4px; margin-top: 3vh; }
        .tab-btn {
            flex: 1; padding: 10px 5px; font-size: 0.8rem; border: 1px solid #eee; border-bottom: none;
            border-radius: 6px 6px 0 0; cursor: pointer; transition: 0.2s; background: #f8f9fa;
            font-family: 'Noto Sans KR'; font-weight: 500; text-align: center;
        }
        .tab-btn.active[data-idx="0"] { background: #d47878; color: #fff; }
        .tab-btn.active[data-idx="1"] { background: #7392D5; color: #fff; }
        .tab-btn.active[data-idx="2"] { background: #c0b840; color: #fff; }

        /* ── SUB TAB BAR ── */
        .subtab-bar { display: flex; margin: 0 15%; background: #f1f3f5; overflow: hidden; height: 0; transition: 0.2s; border-radius: 0 0 8px 8px; }
        body.has-subtab .subtab-bar { height: 2.4rem; }
        .subtab-btn { flex: 1; border: none; background: none; cursor: pointer; font-size: 0.78rem; transition: 0.2s; font-family: 'Noto Sans KR'; }
        .subtab-btn.active { background: #fff; font-weight: 800; font-size: 0.89rem; color: #676565; box-shadow: inset 0 -33px 0 #ffffff; }
        .subtab-divider { display: flex; align-items: center; justify-content: center; padding: 0 54px; color: #495057; font-weight: 300; font-size: 0.9rem; background: #fff; user-select: none; transition: color 0.15s ease; cursor: pointer; }
        .subtab-divider:hover { font-weight: 700; color: #212529; }

        /* ── IFRAME AREA ── */
        .iframe-wrap { padding: 20px 20%; position: relative; overflow: hidden; display: flex; flex-direction: column; }
        .iframe-inner { width: 100%; flex: 1; background: #fff; position: relative; min-height: 600px; height: 600px; }

        /* iframe 스타일은 하단 블록에서 정의 */

        /* ── 전체화면 로딩 오버레이 ── */
        #preload-overlay {
            position: fixed; inset: 0; background: #fff; z-index: 2000;
            display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 24px;
            transition: opacity 0.5s ease;
        }
        #preload-overlay.fade-out { opacity: 0; pointer-events: none; }
        .preload-logo { height: 10rem; width: auto; opacity: 0.85; }
        .preload-title { font-family: 'DM Mono', monospace; font-size: 0.82rem; letter-spacing: 0.18em; text-transform: uppercase; color: #adb5bd; }
        .preload-bar-row { display: flex; align-items: center; gap: 10px; width: 260px; }
        .preload-pulse-dot { width: 8px; height: 8px; border-radius: 50%; background: #d47878; flex-shrink: 0; animation: preload-pulse 1.2s ease-in-out infinite; }
        @keyframes preload-pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.35;transform:scale(0.65)} }
        .preload-bar-wrap { flex: 1; height: 2px; background: #f1f3f5; border-radius: 99px; overflow: hidden; }
        .preload-bar { height: 100%; width: 0%; background: #d47878; border-radius: 99px; transition: width 0.4s ease; }
        .preload-count { font-family: 'DM Mono', monospace; font-size: 0.72rem; color: transparent; letter-spacing: 0.1em; }

        @keyframes spin { to { transform: rotate(360deg); } }

        /* ── 탭 전환 로딩 오버레이 ── */
        #tab-loading-overlay {
            position: absolute; inset: 0; background: #fff;
            display: none; flex-direction: column;
            align-items: center; justify-content: center;
            gap: 16px; z-index: 50;
            opacity: 0; transition: opacity 0.18s ease;
        }
        #tab-loading-overlay.show { display: flex; }
        #tab-loading-overlay.visible { opacity: 1; }
        .tab-loading-label {
            font-family: 'Noto Sans KR', sans-serif; font-size: 0.82rem;
            font-weight: 500; letter-spacing: 0.04em; color: #868e96;
        }
        .tab-progress-track {
            width: 220px; height: 2px; background: #f1f3f5;
            border-radius: 99px; overflow: hidden;
        }
        .tab-progress-bar {
            height: 100%; width: 0%; background: #d47878;
            border-radius: 99px; transition: width 0.28s ease;
        }

        /* iframe: opacity 대신 visibility로 전환 (레이아웃 유지) */
        iframe {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%;
            border: none;
            visibility: hidden;
            z-index: 0;
            pointer-events: none;
            transition: none;
        }
        iframe.active {
            visibility: visible;
            z-index: 1;
            pointer-events: auto;
        }
    </style>

</head>
<body id="main-body">

<!-- 전체화면 사전 로딩 오버레이 -->
<div id="preload-overlay">
    <img src="img/logo.png" alt="IMTI" class="preload-logo"
         onerror="this.style.display='none'">
    <div class="preload-bar-row">
        <div class="preload-pulse-dot" id="preload-dot"></div>
        <div class="preload-bar-wrap">
            <div class="preload-bar" id="preload-bar"></div>
        </div>
    </div>
    <div class="preload-title">Loading Contents...</div>
    <div class="preload-count" id="preload-count">0 / 2</div>
</div>

<div id="navbar-placeholder"></div>

<div class="tab-bar" id="tab-bar">
    <button class="tab-btn active" data-idx="0" onclick="switchTab(0)">연도별 연구 추이</button>
    <button class="tab-btn" data-idx="1" onclick="switchTab(1)">연구 현황 트리맵</button>
    <button class="tab-btn" data-idx="2" onclick="switchTab(2)">차원별 연구 현황</button>
</div>

<div class="subtab-bar" id="subtab-bar">
    <button class="subtab-btn active" id="subtab-0" onclick="switchSubtab(0)"></button>
    <span class="subtab-divider" onclick="switchSubtab(currentSubIdx === 0 ? 1 : 0)">⇠ switch ⇢</span>
    <button class="subtab-btn" id="subtab-1" onclick="switchSubtab(1)"></button>
</div>

<div class="iframe-wrap">
    <div class="iframe-inner" id="iframe-container">
        <!-- iframe들은 JS로 사전 삽입됨 -->
        <!-- 탭 전환 로딩 오버레이 -->
        <div id="tab-loading-overlay">
            <div class="tab-loading-label" id="tab-loading-label">Data를 불러오는 중...</div>
            <div class="tab-progress-track">
                <div class="tab-progress-bar" id="tab-progress-bar"></div>
            </div>
        </div>
    </div>
</div>



<script>
/* ── 탭 정의 ── */
const TABS = [
    {
        hasSub: false,
        src: "https://lookerstudio.google.com/embed/reporting/c0facffe-b79d-450a-95fc-70b3b13c6446/page/page_12345"
    },
    {
        hasSub: false,
        src: "https://lookerstudio.google.com/embed/reporting/85c3dd9b-d6e5-4c18-8b18-1fdc07abd00b/page/g6QuF"
    },
    {
        hasSub: false,
        src: "https://lookerstudio.google.com/embed/reporting/12cd48bf-b7fa-439b-91ab-fe944bca6eaf/page/ltQuF"
    },
];

/* Looker Studio는 onload 이후에도 내부 데이터 렌더링이 계속됨.
   onload 후 이 시간만큼 추가 대기해야 실제로 차트가 보임 */
const LOOKER_RENDER_DELAY = 4000;   /* ms — 필요시 조정 */
const PER_TIMEOUT         = 20000;  /* iframe onload 타임아웃 */

let currentTabIdx = 0;
let currentSubIdx = 0;

/* src → { iframe, loaded, ready } */
const iframeState = {};

/* ── 탭 로딩 오버레이 제어 ── */
var _tabProgressTimer = null, _tabProgressPct = 0;

function showTabOverlay() {
    var ov  = document.getElementById('tab-loading-overlay');
    var bar = document.getElementById('tab-progress-bar');
    if (!ov) return;
    if (_tabProgressTimer) { clearInterval(_tabProgressTimer); _tabProgressTimer = null; }
    _tabProgressPct = 0;
    if (bar) { bar.style.transition = 'none'; bar.style.width = '0%'; }
    ov.classList.add('show');
    requestAnimationFrame(() => requestAnimationFrame(() => {
        ov.classList.add('visible');
        if (bar) bar.style.transition = 'width 0.28s ease';
        _tabProgressTimer = setInterval(() => {
            var step = _tabProgressPct < 40 ? 2.5 : (_tabProgressPct < 70 ? 1.0 : 0.3);
            _tabProgressPct = Math.min(_tabProgressPct + step, 85);
            if (bar) bar.style.width = _tabProgressPct + '%';
            if (_tabProgressPct >= 85) { clearInterval(_tabProgressTimer); _tabProgressTimer = null; }
        }, 120);
    }));
}

function hideTabOverlay() {
    var ov  = document.getElementById('tab-loading-overlay');
    var bar = document.getElementById('tab-progress-bar');
    if (!ov) return;
    if (_tabProgressTimer) { clearInterval(_tabProgressTimer); _tabProgressTimer = null; }
    if (bar) { bar.style.transition = 'width 0.2s ease'; bar.style.width = '100%'; }
    setTimeout(() => {
        ov.classList.remove('visible');
        setTimeout(() => ov.classList.remove('show'), 200);
    }, 300);
}

/* ── 모든 src 평탄화 ── */
function getAllSrcs() {
    const srcs = [];
    TABS.forEach(tab => {
        if (!tab.hasSub) srcs.push(tab.src);
        else tab.sub.forEach(s => srcs.push(s.src));
    });
    return srcs;
}

/* ── 사전 로딩: 모든 Looker iframe이 완전히 렌더될 때까지 오버레이 유지 ── */
function preloadAll() {
    const container = document.getElementById('iframe-container');
    const bar       = document.getElementById('preload-bar');
    const countEl   = document.getElementById('preload-count');
    const overlay   = document.getElementById('preload-overlay');
    const allSrcs   = getAllSrcs();
    const total     = allSrcs.length;
    let   readyCnt  = 0;
    let   dismissed = false;

    /* ── 프로그레스 관리 ──
       각 탭을 3단계로 나눠 진행률 표현:
         단계1 (네트워크 요청 시작)  : 탭당 5%  → 전체 15%
         단계2 (onload 완료)        : 탭당 20% → 전체 60%
         단계3 (렌더 완료 대기)      : 탭당 ~8% → 전체 ~24%
       단계 사이엔 가짜 진행 타이머로 바를 부드럽게 채움 */
    const STEP_START  = 100 / total * 0.05;   /* 요청 시작: 탭당 5% */
    const STEP_LOADED = 100 / total * 0.20;   /* onload:   탭당 20% */
    const STEP_READY  = 100 / total * 0.08;   /* 렌더완료: 탭당 8%  */
    /* 나머지 ~67%는 각 단계 사이 가짜 진행 타이머가 채움 */

    let   pct        = 0;          /* 현재 실제 진행률 */
    let   fakeTimer  = null;

    function setBar(target) {
        /* 가짜 타이머 정리 후 목표값으로 즉시 점프 */
        if (fakeTimer) { clearInterval(fakeTimer); fakeTimer = null; }
        pct = Math.max(pct, target);
        bar.style.width = pct.toFixed(1) + '%';
    }

    function animateTo(target, stepMs) {
        /* 현재 pct → target 까지 stepMs 간격으로 부드럽게 올림 */
        if (fakeTimer) { clearInterval(fakeTimer); fakeTimer = null; }
        fakeTimer = setInterval(() => {
            if (dismissed) { clearInterval(fakeTimer); return; }
            pct = Math.min(pct + 0.6, target);
            bar.style.width = pct.toFixed(1) + '%';
            if (pct >= target) { clearInterval(fakeTimer); fakeTimer = null; }
        }, stepMs);
    }

    const firstSrc = TABS[0].hasSub ? TABS[0].sub[0].src : TABS[0].src;

    /* 1단계: 모든 iframe을 src 없이 DOM에 삽입 */
    allSrcs.forEach(src => {
        const iframe = document.createElement('iframe');
        iframe.dataset.src     = src;
        iframe.allow           = 'fullscreen';
        iframe.allowFullscreen = true;
        if (src === firstSrc) iframe.classList.add('active');
        container.appendChild(iframe);
        iframeState[src] = { iframe, loaded: false, ready: false, pctBase: 0 };
    });

    /* 각 탭의 기준 진행률 구간 설정 (탭 인덱스 × 33.3%) */
    allSrcs.forEach((src, i) => {
        iframeState[src].pctBase = (100 / total) * i;
    });

    function onOneReady(src) {
        if (iframeState[src].ready) return;
        iframeState[src].ready = true;
        readyCnt++;

        const base = iframeState[src].pctBase;
        setBar(base + STEP_START + STEP_LOADED + STEP_READY);

        countEl.textContent = `${readyCnt} / ${total}`;

        if (readyCnt >= total) {
            dismiss();
        } else {
            /* 다음 탭 구간 시작까지 가짜 진행 */
            const nextBase = base + (100 / total);
            animateTo(Math.min(nextBase + STEP_START, 99), 60);
        }
    }

    function dismiss() {
        if (dismissed) return;
        dismissed = true;
        if (fakeTimer) { clearInterval(fakeTimer); fakeTimer = null; }
        bar.style.transition = 'width 0.3s ease';
        bar.style.width = '100%';
        const dot = document.getElementById('preload-dot');
        if (dot) { dot.style.animation = 'none'; dot.style.opacity = '1'; }
        setTimeout(() => {
            overlay.classList.add('fade-out');
            setTimeout(() => { if (overlay.parentNode) overlay.remove(); }, 520);
        }, 300);
    }

    /* 2단계: 로딩 큐 — 각 단계마다 프로그레스 업데이트 */
    const queue = [firstSrc, ...allSrcs.filter(s => s !== firstSrc)];
    let   qIdx  = 0;
    const CONCURRENT = 3;

    function loadNext() {
        if (qIdx >= queue.length) return;
        const src    = queue[qIdx++];
        const state  = iframeState[src];
        const iframe = state.iframe;
        const base   = state.pctBase;

        /* 단계1: 요청 시작 */
        setBar(base + STEP_START);
        /* 요청~onload 사이 가짜 진행 (onload 직전 70%까지) */
        animateTo(base + STEP_START + STEP_LOADED * 0.7, 80);

        let loadDone = false;
        function onLoaded() {
            if (loadDone) return;
            loadDone = true;
            state.loaded = true;

            /* 단계2: onload 완료 */
            setBar(base + STEP_START + STEP_LOADED);
            /* onload~렌더완료 사이 가짜 진행 */
            animateTo(base + STEP_START + STEP_LOADED + STEP_READY * 0.5, 100);

            /* 단계3: LOOKER_RENDER_DELAY 후 렌더 완료 */
            setTimeout(() => {
                onOneReady(src);
                loadNext();
            }, LOOKER_RENDER_DELAY);
        }

        iframe.addEventListener('load',  onLoaded);
        iframe.addEventListener('error', onLoaded);
        setTimeout(onLoaded, PER_TIMEOUT);
        iframe.src = src;
    }

    /* 초기 가짜 진행: 0→5% (첫 요청 시작 전 짧은 준비 느낌) */
    animateTo(3, 60);
    setTimeout(() => {
        for (let i = 0; i < Math.min(CONCURRENT, total); i++) loadNext();
    }, 200);

    setTimeout(dismiss, 90000);
}

/* ── iframe 표시 — ready 상태에 따라 로딩 오버레이 제어 ── */
function showIframe(src) {
    /* 모든 iframe 숨김 */
    document.querySelectorAll('#iframe-container iframe').forEach(f => {
        f.classList.remove('active');
    });

    const state = iframeState[src];
    if (!state) return;

    if (state.ready) {
        /* 이미 렌더 완료 → 바로 표시 */
        state.iframe.classList.add('active');
        hideTabOverlay();
    } else {
        /* 아직 로딩 중 → 오버레이 표시 후 준비되면 전환 */
        showTabOverlay();
        /* 준비 완료 폴링 */
        var poll = setInterval(() => {
            if (iframeState[src] && iframeState[src].ready) {
                clearInterval(poll);
                state.iframe.classList.add('active');
                hideTabOverlay();
            }
        }, 200);
        /* 안전망: 30초 후 강제 표시 */
        setTimeout(() => {
            clearInterval(poll);
            state.iframe.classList.add('active');
            hideTabOverlay();
        }, 30000);
    }
}

/* ── 탭 전환 ── */
function switchTab(idx) {
    currentTabIdx = idx;
    currentSubIdx = 0;
    document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
    document.querySelector(`.tab-btn[data-idx="${idx}"]`).classList.add('active');

    const tabData = TABS[idx];
    const body    = document.getElementById('main-body');

    if (tabData.hasSub) {
        body.classList.add('has-subtab');
        updateSubtabLabels(idx, 0);
        showIframe(tabData.sub[0].src);
    } else {
        body.classList.remove('has-subtab');
        showIframe(tabData.src);
    }
}

/* ── 서브탭 전환 ── */
function switchSubtab(sIdx) {
    currentSubIdx = sIdx;
    const tabData = TABS[currentTabIdx];
    updateSubtabLabels(currentTabIdx, sIdx);
    showIframe(tabData.sub[sIdx].src);
}

function updateSubtabLabels(tabIdx, activeSubIdx) {
    const tabData = TABS[tabIdx];
    document.querySelectorAll('.subtab-btn').forEach((btn, i) => {
        const isActive = i === activeSubIdx;
        btn.classList.toggle('active', isActive);
        btn.textContent = (isActive ? '➯ ' : '') + tabData.sub[i].label;
    });
}

/* ── 초기화 ── */
window.addEventListener('DOMContentLoaded', () => {
    const firstTab = TABS[0];
    if (firstTab.hasSub) {
        document.getElementById('main-body').classList.add('has-subtab');
        updateSubtabLabels(0, 0);
    }
    preloadAll();
});
</script>
<script src="common.js"></script>
<script>imtiRequireAuth(); imtiLoadNavbar("main_research_trends.html");</script>
</body>
</html>
