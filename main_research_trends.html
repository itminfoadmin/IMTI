<!DOCTYPE html>
<html lang="ko">
<head>
    <link rel="preconnect" href="https://lookerstudio.google.com">
    <link rel="dns-prefetch" href="https://lookerstudio.google.com">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1400, initial-scale=1.0, minimum-scale=0.3, maximum-scale=3.0">
    <title>IMTI - Research Trends</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&family=Noto+Sans+KR:wght@400;500;700;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        html { font-size: calc(14px + (18 - 14) * ((100vw - 1000px) / (1920 - 1000))); scrollbar-width: none; -ms-overflow-style: none; }
        html::-webkit-scrollbar { display: none; }
        body { scrollbar-width: none; -ms-overflow-style: none; }
        body::-webkit-scrollbar { display: none; }
        @media (max-width: 1000px) { html { font-size: 13px; } }

        body {
            font-family: 'Noto Sans KR', 'DM Mono', sans-serif;
            background: #fff; color: #343a40;
            min-height: 100vh;
            display: grid;
            grid-template-rows: auto auto 0px 1fr;
            transition: grid-template-rows 0.2s ease;
        }
        body.has-subtab { grid-template-rows: auto auto 2.8rem 1fr; }

        /* ── topnav ── */
        .topnav { background: #fff; padding: 4vh 5% 1vh 5%; display: flex; justify-content: space-between; align-items: flex-end; }
        .logo-area { padding-left: 5%; flex-shrink: 0; }
        .logo-img { height: 4rem; width: auto; transition: transform 0.3s; cursor: pointer; }
        .logo-img:hover { transform: scale(1.03); }
        .nav-right-wrap { display: flex; flex-direction: column; align-items: flex-end; gap: 12px; padding-right: 5%; }
        .nav-right-top { display: flex; gap: 15px; align-items: center; }
        .nav-email { font-family: 'DM Mono'; font-size: 0.8rem; color: #868e96; font-weight: 100; }
        .nav-btn { background: none; border: none; cursor: pointer; font-size: 0.8rem; color: #868e96; font-family: 'DM Mono'; }
        .nav-btn:hover { color: #1a56db; text-decoration: underline; }
        .nav-right-bottom { display: flex; gap: 20px; }
        .nav-menu-item { font-family: 'Noto Sans KR'; font-size: 0.85rem; color: #495057; text-decoration: none; transition: 0.2s; cursor: pointer; background: none; border: none; padding: 0; }
        .nav-menu-item:hover, .nav-menu-item.active { color: #212529; font-weight: 700; border-bottom: 2px solid #212529; }

        /* ── tab bar ── */
        .tab-bar { display: flex; padding: 0 15%; gap: 4px; margin-top: 3vh; }
        .tab-btn {
            flex: 1; padding: 10px 5px; font-size: 0.8rem; border: 1px solid #eee; border-bottom: none;
            border-radius: 6px 6px 0 0; cursor: pointer; transition: 0.2s; background: #f8f9fa;
            font-family: 'Noto Sans KR'; font-weight: 500; text-align: center;
        }
        .tab-btn.active[data-idx="0"] { background: #d47878; color: #fff; }
        .tab-btn.active[data-idx="1"] { background: #7392D5; color: #fff; }
        .tab-btn.active[data-idx="2"] { background: #c0b840; color: #fff; }

        /* ── subtab bar ── */
        .subtab-bar {
            display: flex; margin: 0 15%; background: #f1f3f5;
            overflow: hidden; height: 0; transition: height 0.2s ease;
            border-radius: 0 0 8px 8px;
        }
        body.has-subtab .subtab-bar { height: 2.4rem; }

        .subtab-btn {
            flex: 1; border: none; background: none; cursor: pointer;
            font-size: 0.72rem; transition: 0.2s; font-family: 'Noto Sans KR';
            white-space: nowrap; padding: 0 4px;
        }
        .subtab-btn.active {
            background: #fff; font-weight: 800;
            color: #676565; box-shadow: inset 0 -33px 0 #ffffff;
        }

        /* ── iframe area ── */
        .iframe-wrap { padding: 20px 20%; position: relative; overflow: hidden; display: flex; flex-direction: column; }
        .iframe-inner { width: 100%; flex: 1; background: #fff; position: relative; min-height: 600px; height: 600px; }

        /* ── preload overlay ── */
        #preload-overlay {
            position: fixed; inset: 0; background: #fff; z-index: 2000;
            display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 24px;
            transition: opacity 0.5s ease;
        }
        #preload-overlay.fade-out { opacity: 0; pointer-events: none; }
        .preload-logo { height: 10rem; width: auto; opacity: 0.85; }
        .preload-title { font-family: 'DM Mono', monospace; font-size: 0.82rem; letter-spacing: 0.18em; text-transform: uppercase; color: #adb5bd; }
        .preload-bar-row { display: flex; align-items: center; gap: 10px; width: 260px; }
        .preload-pulse-dot { width: 8px; height: 8px; border-radius: 50%; background: #d47878; flex-shrink: 0; animation: preload-pulse 1.2s ease-in-out infinite; }
        @keyframes preload-pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.35;transform:scale(0.65)} }
        .preload-bar-wrap { flex: 1; height: 2px; background: #f1f3f5; border-radius: 99px; overflow: hidden; }
        .preload-bar { height: 100%; width: 0%; background: #d47878; border-radius: 99px; transition: width 0.4s ease; }
        .preload-count { font-family: 'DM Mono', monospace; font-size: 0.72rem; color: transparent; letter-spacing: 0.1em; }

        @keyframes spin { to { transform: rotate(360deg); } }

        /* ── tab loading overlay ── */
        #tab-loading-overlay {
            position: absolute; inset: 0; background: #fff;
            display: none; flex-direction: column;
            align-items: center; justify-content: center;
            gap: 16px; z-index: 50;
            opacity: 0; transition: opacity 0.18s ease;
        }
        #tab-loading-overlay.show { display: flex; }
        #tab-loading-overlay.visible { opacity: 1; }
        .tab-loading-label {
            font-family: 'Noto Sans KR', sans-serif; font-size: 0.82rem;
            font-weight: 500; letter-spacing: 0.04em; color: #868e96;
        }
        .tab-progress-track {
            width: 220px; height: 2px; background: #f1f3f5;
            border-radius: 99px; overflow: hidden;
        }
        .tab-progress-bar {
            height: 100%; width: 0%; background: #d47878;
            border-radius: 99px; transition: width 0.28s ease;
        }

        /* ── iframes ── */
        iframe {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%;
            border: none;
            visibility: hidden;
            z-index: 0;
            pointer-events: none;
            transition: none;
        }
        iframe.active {
            visibility: visible;
            z-index: 1;
            pointer-events: auto;
        }
    </style>

</head>
<body id="main-body">

<div id="preload-overlay">
    <img src="img/logo.png" alt="IMTI" class="preload-logo"
         onerror="this.style.display='none'">
    <div class="preload-bar-row">
        <div class="preload-pulse-dot" id="preload-dot"></div>
        <div class="preload-bar-wrap">
            <div class="preload-bar" id="preload-bar"></div>
        </div>
    </div>
    <div class="preload-title">Loading Contents...</div>
    <div class="preload-count" id="preload-count">0 / 2</div>
</div>

<div id="navbar-placeholder"></div>

<div class="tab-bar" id="tab-bar">
    <button class="tab-btn active" data-idx="0" onclick="switchTab(0)">연도별 연구 추이</button>
    <button class="tab-btn" data-idx="2" onclick="switchTab(2)">차원별 연구 현황</button>
    <button class="tab-btn" data-idx="1" onclick="switchTab(1)">연구 현황 트리맵</button>
</div>

<div class="subtab-bar" id="subtab-bar"></div>

<div class="iframe-wrap">
    <div class="iframe-inner" id="iframe-container">
        <div id="tab-loading-overlay">
            <div class="tab-loading-label" id="tab-loading-label">Data를 불러오는 중...</div>
            <div class="tab-progress-track">
                <div class="tab-progress-bar" id="tab-progress-bar"></div>
            </div>
        </div>
    </div>
</div>

<script>

/* ═══════════════════════════════════════════════
   TAB / SUBTAB 구성
   ═══════════════════════════════════════════════ */
const TABS = [
    {
        label: '연도별 연구 추이',
        hasSub: false,
        src: "https://datastudio.google.com/embed/reporting/de270d05-8f95-4e63-8a69-0b9c1191fcef/page/JfDwF",
        priority: true   // ← 초기 로딩 대상
    },
    {
        label: '연구 현황 트리맵',
        hasSub: true,
        priority: false,
        sub: [
            {
                label: '전체 영역 트리맵',
                src: "https://datastudio.google.com/embed/reporting/03549855-8e2d-4e3f-95ed-7f823d65d336/page/jluvF",
                priority: false
            },
            {
                label: '<컴퓨팅 시스템> 영역 트리맵',
                src: "https://datastudio.google.com/embed/reporting/86edf0c4-d073-41eb-acd6-023f7a57e7a6/page/jluvF",
                priority: false
            },
            {
                label: '<데이터> 영역 트리맵',
                src: "https://datastudio.google.com/embed/reporting/cf893fdd-3649-4997-95d7-20d9380db822/page/jluvF",
                priority: false
            },
            {
                label: '<알고리즘> 영역 트리맵',
                src: "https://datastudio.google.com/embed/reporting/ac3c549a-66f8-4a2d-bbd6-265c81e2578b/page/jluvF",
                priority: false
            },
            {
                label: '<프로그래밍> 영역 트리맵',
                src: "https://datastudio.google.com/embed/reporting/6a9f1801-9335-4868-be24-a4f229f66e6a/page/jluvF",
                priority: false
            },
            {
                label: '<인공지능> 영역 트리맵',
                src: "https://datastudio.google.com/embed/reporting/394de2bd-f639-4f78-ae83-e5cb241caa36/page/jluvF",
                priority: false
            },
            {
                label: '<디지털 문화> 영역 트리맵',
                src: "https://datastudio.google.com/embed/reporting/75c1d714-d9dd-41dc-983a-84b04afb11f6/page/jluvF",
                priority: false
            }
        ]
    },
    {
        label: '차원별 연구 현황',
        hasSub: false,
        src: "https://datastudio.google.com/embed/reporting/6eaefea0-492f-464d-a864-87abd6c05112/page/YpqxF",
        priority: true   // ← 초기 로딩 대상
    },
];

/* ═══════════════════════════════════════════════
   상수 및 상태
   ═══════════════════════════════════════════════ */
const LOOKER_RENDER_DELAY          = 4000;  // 일반 iframe 렌더 대기
const LOOKER_RENDER_DELAY_TREEMAP  = 1500;  // 트리맵 서브탭 렌더 대기 (단축)
const PER_TIMEOUT                  = 20000;

let currentTabIdx  = 0;
let currentSubIdx  = 0;
let treemapSubsLoaded = false;   // 트리맵 첫 번째 서브탭 lazy-load 시작 여부

const iframeState  = {};         // src → { iframe, loaded, ready, slotIdx }

var _tabProgressTimer = null, _tabProgressPct = 0;

/* ═══════════════════════════════════════════════
   탭 전환 로딩 오버레이
   ═══════════════════════════════════════════════ */
function showTabOverlay() {
    var ov  = document.getElementById('tab-loading-overlay');
    var bar = document.getElementById('tab-progress-bar');
    if (!ov) return;
    if (_tabProgressTimer) { clearInterval(_tabProgressTimer); _tabProgressTimer = null; }
    _tabProgressPct = 0;
    if (bar) { bar.style.transition = 'none'; bar.style.width = '0%'; }
    ov.classList.add('show');
    requestAnimationFrame(() => requestAnimationFrame(() => {
        ov.classList.add('visible');
        if (bar) bar.style.transition = 'width 0.28s ease';
        _tabProgressTimer = setInterval(() => {
            var step = _tabProgressPct < 40 ? 2.5 : (_tabProgressPct < 70 ? 1.0 : 0.3);
            _tabProgressPct = Math.min(_tabProgressPct + step, 85);
            if (bar) bar.style.width = _tabProgressPct + '%';
            if (_tabProgressPct >= 85) { clearInterval(_tabProgressTimer); _tabProgressTimer = null; }
        }, 120);
    }));
}

function hideTabOverlay() {
    var ov  = document.getElementById('tab-loading-overlay');
    var bar = document.getElementById('tab-progress-bar');
    if (!ov) return;
    if (_tabProgressTimer) { clearInterval(_tabProgressTimer); _tabProgressTimer = null; }
    if (bar) { bar.style.transition = 'width 0.2s ease'; bar.style.width = '100%'; }
    setTimeout(() => {
        ov.classList.remove('visible');
        setTimeout(() => ov.classList.remove('show'), 200);
    }, 300);
}

/* ═══════════════════════════════════════════════
   iframe 생성 + 로드 추적
   ═══════════════════════════════════════════════ */
function createIframe(src, isActive, slotIdx, onReady, renderDelay) {
    const container = document.getElementById('iframe-container');
    const iframe = document.createElement('iframe');
    iframe.dataset.src     = src;
    iframe.allow           = 'fullscreen';
    iframe.allowFullscreen = true;
    if (isActive) iframe.classList.add('active');
    container.appendChild(iframe);

    iframeState[src] = { iframe, loaded: false, ready: false, slotIdx };

    let loadDone = false;
    function onLoaded() {
        if (loadDone) return;
        loadDone = true;
        iframeState[src].loaded = true;
        setTimeout(() => {
            if (iframeState[src].ready) return;
            iframeState[src].ready = true;
            if (onReady) onReady(src);
        }, renderDelay !== undefined ? renderDelay : LOOKER_RENDER_DELAY);
    }

    iframe.addEventListener('load',  onLoaded);
    iframe.addEventListener('error', onLoaded);
    setTimeout(onLoaded, PER_TIMEOUT);
    iframe.src = src;

    return iframe;
}

/* ═══════════════════════════════════════════════
   초기 preload: priority === true 인 3개만 로드
   ═══════════════════════════════════════════════ */
function preloadPriority() {
    const bar     = document.getElementById('preload-bar');
    const countEl = document.getElementById('preload-count');
    const overlay = document.getElementById('preload-overlay');

    // priority src 목록 수집
    const prioritySrcs = [];
    TABS.forEach(tab => {
        if (!tab.hasSub && tab.priority) prioritySrcs.push(tab.src);
        if (tab.hasSub) tab.sub.forEach(s => { if (s.priority) prioritySrcs.push(s.src); });
    });

    const total   = prioritySrcs.length;
    let readyCnt  = 0;
    let dismissed = false;

    countEl.textContent = `0 / ${total}`;

    const SLOT     = 100 / total;
    const slotPct  = new Array(total).fill(0);
    const slotTimer= new Array(total).fill(null);

    function renderBar() {
        if (dismissed) return;
        const v = slotPct.reduce((s, p) => s + p * SLOT / 100, 0);
        bar.style.width = Math.min(v, 99.9).toFixed(1) + '%';
    }
    function slotFill(i, target, stepMs) {
        if (slotTimer[i]) { clearInterval(slotTimer[i]); slotTimer[i] = null; }
        if (dismissed) return;
        slotTimer[i] = setInterval(() => {
            if (dismissed) { clearInterval(slotTimer[i]); slotTimer[i] = null; return; }
            slotPct[i] = Math.min(slotPct[i] + 0.8, target);
            renderBar();
            if (slotPct[i] >= target) { clearInterval(slotTimer[i]); slotTimer[i] = null; }
        }, stepMs);
    }
    function slotAdvance(i, target) {
        if (slotTimer[i]) { clearInterval(slotTimer[i]); slotTimer[i] = null; }
        slotPct[i] = Math.max(slotPct[i], target);
        renderBar();
    }
    function dismiss() {
        if (dismissed) return;
        dismissed = true;
        slotTimer.forEach((t, i) => { if (t) { clearInterval(t); slotTimer[i] = null; } });
        bar.style.transition = 'width 0.3s ease';
        bar.style.width = '100%';
        const dot = document.getElementById('preload-dot');
        if (dot) { dot.style.animation = 'none'; dot.style.opacity = '1'; }
        setTimeout(() => {
            overlay.classList.add('fade-out');
            setTimeout(() => { if (overlay.parentNode) overlay.remove(); }, 520);
        }, 300);
    }

    // 첫 번째 priority src는 active 상태로 → 완료되는 순간 overlay 닫기
    const firstActiveSrc = prioritySrcs[0];

    prioritySrcs.forEach((src, i) => {
        slotAdvance(i, 15);
        slotFill(i, 70, 80);

        createIframe(src, src === firstActiveSrc, i, (doneSrc) => {
            const idx = prioritySrcs.indexOf(doneSrc);
            slotAdvance(idx, 100);
            readyCnt++;
            countEl.textContent = `${readyCnt} / ${total}`;
            // 첫 번째(현재 보여줄) 탭만 완료되면 즉시 overlay 닫기
            // 나머지는 백그라운드에서 계속 로드
            if (doneSrc === firstActiveSrc) {
                dismiss();
                // overlay가 닫히자마자 트리맵 전체 백그라운드 로딩 시작
                lazyLoadTreemapSubs();
            }
        });
    });

    prioritySrcs.forEach((_, i) => slotFill(i, 5, 60));
    setTimeout(dismiss, 90000);
}

/* ═══════════════════════════════════════════════
   트리맵 첫 번째 서브탭(전체 영역 트리맵)만 로드 (탭 클릭 시)
   나머지는 각 서브탭 클릭 시 lazy-load
   ═══════════════════════════════════════════════ */
function lazyLoadTreemapSubs() {
    if (treemapSubsLoaded) return;
    treemapSubsLoaded = true;

    const treemapTab = TABS[1]; // '연구 현황 트리맵'

    // 첫 번째(전체 영역) 즉시 로드
    const firstSub = treemapTab.sub[0];
    if (!iframeState[firstSub.src]) {
        createIframe(firstSub.src, false, 100, null, LOOKER_RENDER_DELAY_TREEMAP);
    }

    // 나머지는 첫 번째가 ready 된 후 백그라운드에서 순차 로드 (UX 방해 없이)
    const restSubs = treemapTab.sub.slice(1);
    let restIdx = 0;
    function loadNext() {
        if (restIdx >= restSubs.length) return;
        const sub = restSubs[restIdx++];
        if (!iframeState[sub.src]) {
            createIframe(sub.src, false, 100 + restIdx, null, LOOKER_RENDER_DELAY_TREEMAP);
        }
        // 500ms 간격으로 순차 로드 (네트워크 부하 분산)
        setTimeout(loadNext, 500);
    }

    // 전체 영역 트리맵이 ready 되면 나머지 순차 로드 시작
    const pollReady = setInterval(() => {
        if (iframeState[firstSub.src] && iframeState[firstSub.src].ready) {
            clearInterval(pollReady);
            setTimeout(loadNext, 300);
        }
    }, 300);
    // 최대 15초 후에는 강제로 시작
    setTimeout(() => { clearInterval(pollReady); loadNext(); }, 15000);
}

/* ═══════════════════════════════════════════════
   서브탭 클릭 시 해당 iframe을 그때 생성 (lazy-load)
   ═══════════════════════════════════════════════ */
function ensureIframe(src, slotIdx, renderDelay) {
    if (!iframeState[src]) {
        createIframe(src, false, slotIdx, null, renderDelay);
    }
}

/* ═══════════════════════════════════════════════
   iframe 보이기
   ═══════════════════════════════════════════════ */
function showIframe(src) {
    document.querySelectorAll('#iframe-container iframe').forEach(f => f.classList.remove('active'));

    // 아직 iframe이 생성되지 않은 경우 (lazy-load 전 접근 등) 대비
    if (!iframeState[src]) {
        createIframe(src, true, 999, null);
    }

    const state = iframeState[src];
    if (state.ready) {
        state.iframe.classList.add('active');
        hideTabOverlay();
    } else {
        showTabOverlay();
        var poll = setInterval(() => {
            if (iframeState[src] && iframeState[src].ready) {
                clearInterval(poll);
                iframeState[src].iframe.classList.add('active');
                hideTabOverlay();
            }
        }, 200);
        setTimeout(() => {
            clearInterval(poll);
            if (iframeState[src]) iframeState[src].iframe.classList.add('active');
            hideTabOverlay();
        }, 30000);
    }
}

/* ═══════════════════════════════════════════════
   탭 전환
   ═══════════════════════════════════════════════ */
function switchTab(idx) {
    currentTabIdx = idx;
    currentSubIdx = 0;

    document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
    document.querySelector(`.tab-btn[data-idx="${idx}"]`).classList.add('active');

    const tabData = TABS[idx];
    const body    = document.getElementById('main-body');

    if (tabData.hasSub) {
        body.classList.add('has-subtab');
        renderSubtabBar(idx, 0);

        // 트리맵 탭 클릭 즉시 → 첫 번째 서브탭(전체 영역 트리맵)만 로딩 시작
        lazyLoadTreemapSubs();

        showIframe(tabData.sub[0].src);
    } else {
        body.classList.remove('has-subtab');
        clearSubtabBar();
        showIframe(tabData.src);
    }
}

/* ═══════════════════════════════════════════════
   서브탭 바 렌더
   ═══════════════════════════════════════════════ */
function renderSubtabBar(tabIdx, activeSubIdx) {
    const bar     = document.getElementById('subtab-bar');
    const tabData = TABS[tabIdx];
    bar.innerHTML = '';

    tabData.sub.forEach((sub, i) => {
        const btn = document.createElement('button');
        btn.className  = 'subtab-btn' + (i === activeSubIdx ? ' active' : '');
        btn.textContent = sub.label;
        btn.onclick = () => switchSubtab(i);
        bar.appendChild(btn);
    });
}

function clearSubtabBar() {
    document.getElementById('subtab-bar').innerHTML = '';
}

/* ═══════════════════════════════════════════════
   서브탭 전환
   ═══════════════════════════════════════════════ */
function switchSubtab(sIdx) {
    currentSubIdx = sIdx;
    const tabData = TABS[currentTabIdx];
    renderSubtabBar(currentTabIdx, sIdx);

    const sub = tabData.sub[sIdx];
    // 아직 생성되지 않은 서브탭 iframe은 클릭 시점에 lazy-load
    ensureIframe(sub.src, 100 + sIdx, LOOKER_RENDER_DELAY_TREEMAP);

    showIframe(sub.src);
}

window.addEventListener('DOMContentLoaded', () => {
    preloadPriority();
});
