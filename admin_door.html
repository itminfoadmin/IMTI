<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IMTI - Admin Door</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&family=Noto+Sans+KR:wght@400;500;700;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root { --gray-text: #343a40; --gray-mid: #adb5bd; --gray-dark: #6c757d; --accent: #1a56db; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'DM Mono', 'Noto Sans KR', monospace; background: #fff; color: var(--gray-text); min-height: 100vh; display: flex; flex-direction: column; }
        .topnav { height: 56px; background: #fff; border-bottom: 1px solid #e9ecef; display: flex; align-items: center; padding: 0 28px; position: sticky; top: 0; z-index: 100; }
        .topnav-logo-area { display: flex; align-items: center; gap: 10px; flex-shrink: 0; margin-right: 28px; text-decoration: none; }
        .topnav-logo-img { height: 32px; width: auto; }
        .topnav-logo-text { font-family: 'Playfair Display', serif; font-size: 0.95rem; font-weight: 400; color: var(--gray-text); line-height: 1.2; white-space: nowrap; }
        .topnav-menu { display: flex; align-items: center; flex: 1; }
        .topnav-menu-item { font-family: 'DM Mono', monospace; font-size: 0.72rem; font-weight: 700; letter-spacing: 0.06em; color: var(--gray-dark); text-decoration: none; padding: 0 14px; height: 56px; display: flex; align-items: center; border-bottom: 2px solid transparent; transition: all 0.2s; white-space: nowrap; }
        .topnav-menu-item:hover { color: var(--accent); border-bottom-color: var(--accent); }
        .topnav-right { display: flex; align-items: center; gap: 0; flex-shrink: 0; }
        .topnav-email { font-family: 'DM Mono', monospace; font-size: 0.7rem; color: var(--gray-dark); padding: 0 12px; white-space: nowrap; }
        .topnav-divider-v { width: 1px; height: 16px; background: #e9ecef; flex-shrink: 0; }
        .topnav-timer { font-family: 'DM Mono', monospace; font-size: 0.7rem; font-weight: 700; color: var(--gray-mid); padding: 0 10px; white-space: nowrap; }
        .topnav-timer.warning { color: #e03131; }
        .topnav-btn { display: flex; align-items: center; gap: 4px; background: none; border: none; padding: 0 12px; height: 56px; font-family: 'DM Mono', monospace; font-size: 0.72rem; font-weight: 700; letter-spacing: 0.06em; color: var(--gray-dark); cursor: pointer; transition: color 0.2s; white-space: nowrap; }
        .topnav-btn:hover { color: var(--accent); }
        .main { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; margin: 24px; border: 1px dashed #ccc; border-radius: 2px; padding: 60px 36px; }
        .main-text { font-family: 'DM Mono', monospace; font-size: 0.95rem; color: var(--gray-text); line-height: 2.2; text-align: center; margin-bottom: 48px; }
        .admin-mode-btn { display: inline-flex; align-items: center; gap: 8px; background: #fff; border: 1.5px solid #adb5bd; border-radius: 20px; padding: 10px 32px; font-family: 'DM Mono', monospace; font-size: 0.82rem; font-weight: 700; letter-spacing: 0.06em; color: var(--gray-text); cursor: pointer; transition: all 0.2s; }
        .admin-mode-btn:hover { background: var(--gray-text); color: #fff; border-color: var(--gray-text); }
        @keyframes modalIn { from { opacity: 0; transform: scale(0.93) translateY(10px); } to { opacity: 1; transform: scale(1) translateY(0); } }
    </style>
</head>
<body>
<nav class="topnav">
    <a href="index.html" class="topnav-logo-area">
        <img src="img/logo_index.png" alt="IMTI" class="topnav-logo-img">
        <div class="topnav-logo-text"><em>I</em>nventory of <strong><em>M</em></strong>odels of <strong><em>T</em></strong>eaching for <strong><em>I</em></strong>nformatics</div>
    </a>
    <div class="topnav-menu">
        <a class="topnav-menu-item" href="#">What's IMTI?</a>
        <a class="topnav-menu-item" href="#">MTI-Searching</a>
        <a class="topnav-menu-item" href="main_reserach_trends.html">Research-Trends</a>
    </div>
    <div class="topnav-right">
        <span class="topnav-email" id="admin-email-display">-</span>
        <div class="topnav-divider-v"></div>
        <span class="topnav-timer" id="session-timer">30:00</span>
        <div class="topnav-divider-v"></div>
        <button class="topnav-btn" onclick="goAdminMode()">Admin-Mode</button>
        <div class="topnav-divider-v"></div>
        <button class="topnav-btn" onclick="goPassModify()">Password 변경</button>
        <div class="topnav-divider-v"></div>
        <button class="topnav-btn logout" onclick="handleAdminLogout()">Log-out</button>
    </div>
</nav>
<div class="main">
    <div class="main-text">You have logged in with the admin account.<br>If you wish to edit the web page, please click [Admin-Mode].</div>
    <button class="admin-mode-btn" onclick="goAdminMode()">Admin-Mode</button>
</div>
<script>
    function goAdminMode() { window.location.href = 'admin_mode.html'; }
    function goPassModify() { window.location.href = 'admin_pass_modify.html'; }
    function handleAdminLogout() { /* 로그아웃 로직 생략 */ window.location.href = 'index.html'; }
</script>
</body>
</html>
