<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1400, initial-scale=1.0, minimum-scale=0.3, maximum-scale=3.0">
    <title>IMTI - What's IMTI?</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&family=Noto+Sans+KR:wght@400;500;700;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        html {
            font-size: calc(14px + (18 - 14) * ((100vw - 1000px) / (1920 - 1000)));
            height: 100%;
            overflow: hidden;
        }
        @media (max-width: 1000px) { html { font-size: 13px; } }

        body {
            font-family: 'Noto Sans KR', 'DM Mono', sans-serif;
            background: #fff;
            color: #343a40;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            font-synthesis: none;
            -webkit-font-smoothing: antialiased;
            scrollbar-width: none;
            -ms-overflow-style: none;
        }
        body::-webkit-scrollbar { display: none; }
        html { scrollbar-width: none; -ms-overflow-style: none; }
        html::-webkit-scrollbar { display: none; }

        /* ── TOP NAV ── */
        .topnav {
            background: #fff;
            padding: 4vh 5% 1vh 5%;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            flex-shrink: 0;
        }
        .logo-area { padding-left: 10%; flex-shrink: 0; }
        .logo-img { height: 4rem; width: auto; transition: transform 0.3s; cursor: pointer; }
        .logo-img:hover { transform: scale(1.03); }

        .nav-right-wrap { display: flex; flex-direction: column; align-items: flex-end; gap: 12px; padding-right: 10%; }
        .nav-right-top { display: flex; gap: 15px; align-items: center; }
        .nav-email { font-family: 'DM Mono'; font-size: 0.85rem; color: #e03131; font-weight: 500; }
        .nav-btn { background: none; border: none; cursor: pointer; font-size: 0.8rem; color: #495057; font-family: 'Noto Sans KR'; }
        .nav-btn:hover { color: #1a56db; text-decoration: underline; }

        .nav-right-bottom { display: flex; gap: 20px; }
        .nav-menu-item {
            font-family: 'DM Mono'; font-size: 0.85rem; color: #868e96;
            text-decoration: none; transition: 0.2s;
            background: none; border: none; padding: 0; cursor: pointer;
        }
        .nav-menu-item:hover, .nav-menu-item.active { color: #212529; font-weight: 700; border-bottom: 2px solid #212529; }

        /* ── TAB BAR ── */
        .tab-bar {
            display: flex;
            padding: 0 15%;
            gap: 4px;
            margin-top: 3vh;
            height: 44px;
            align-items: stretch;
            flex-shrink: 0;
        }
        .tab-btn {
            flex: 1; padding: 10px 5px; font-size: 0.8rem; border: 1px solid #eee; border-bottom: none;
            border-radius: 6px 6px 0 0; cursor: pointer; background: #f8f9fa;
            font-family: 'Noto Sans KR'; font-weight: 500; text-align: center;
            height: 100%; white-space: nowrap;
            transition: background 0.15s, color 0.15s;
        }
        .tab-btn.active[data-idx="0"] { background: #d47878; color: #fff; }
        .tab-btn.active[data-idx="1"] { background: #d49860; color: #fff; }

        /* ── IFRAME AREA ── */
        .iframe-wrap { flex: 1; min-height: 0; padding: 10px 15%; position: relative; }
        .iframe-inner {
            width: 100%; height: 100%; background: #fff;
            position: relative; overflow: hidden;
        }

        /* 실제 스크롤이 일어나는 래퍼 - 스크롤바 숨김 */
        .iframe-scroll {
            position: absolute; inset: 0;
            overflow-y: auto; overflow-x: hidden;
            scrollbar-width: none;
            -ms-overflow-style: none;
        }
        .iframe-scroll::-webkit-scrollbar { display: none; }

        /* 스크롤 가능 높이를 만드는 spacer */
        .iframe-spacer { width: 1px; pointer-events: none; }

        iframe {
            border: none;
            opacity: 0;
            z-index: -1;
            position: absolute;
            top: 0; left: 0;
            transform-origin: top left;
            pointer-events: none;
            transition: opacity 0.2s ease;
        }
        iframe.active {
            opacity: 1;
            z-index: 1;
            pointer-events: auto;
        }


        /* ── 전체화면 로딩 오버레이 ── */
        #preload-overlay {
            position: fixed; inset: 0;
            background: #fff;
            z-index: 2000;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            gap: 24px;
            transition: opacity 0.5s ease;
        }
        #preload-overlay.fade-out { opacity: 0; pointer-events: none; }

        .preload-logo {
            height: 10rem; width: auto; opacity: 0.85;
        }

        .preload-title {
            font-family: 'DM Mono', monospace;
            font-size: 0.82rem; font-weight: 700;
            letter-spacing: 0.18em; text-transform: uppercase;
            color: #adb5bd;
        }

        .preload-bar-row {
            display: flex; align-items: center; gap: 10px;
            width: 260px;
        }
        .preload-pulse-dot {
            width: 8px; height: 8px; border-radius: 50%;
            background: #d47878; flex-shrink: 0;
            animation: preload-pulse 1.2s ease-in-out infinite;
        }
        @keyframes preload-pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50%       { opacity: 0.35; transform: scale(0.65); }
        }
        .preload-bar-wrap {
            flex: 1; height: 2px;
            background: #f1f3f5; border-radius: 99px; overflow: hidden;
        }
        .preload-bar {
            height: 100%; width: 0%;
            background: #d47878;
            border-radius: 99px;
            transition: width 0.4s ease;
        }

        .preload-count {
            font-family: 'DM Mono', monospace;
            font-size: 0.72rem; color: transparent;
            letter-spacing: 0.1em;
        }

        @keyframes spin { to { transform: rotate(360deg); } }
    </style>

</head>
<body id="main-body">

<!-- ════════════════════════════════
     전체화면 사전 로딩 오버레이
════════════════════════════════ -->
<div id="preload-overlay">
    <img src="img/logo.png" alt="IMTI" class="preload-logo"
         onerror="this.style.display='none'">
    <div class="preload-bar-row">
        <div class="preload-pulse-dot" id="preload-dot"></div>
        <div class="preload-bar-wrap">
            <div class="preload-bar" id="preload-bar"></div>
        </div>
    </div>
    <div class="preload-title">Loading Contents...</div>
    <div class="preload-count" id="preload-count">0 / 2</div>
</div>

<div id="navbar-placeholder"></div>

<div class="tab-bar" id="tab-bar">
    <button class="tab-btn active" data-idx="0" onclick="switchTab(0)">IMTI 소개 및 운영 안내</button>
    <button class="tab-btn" data-idx="1" onclick="switchTab(1)">관련 연구물 목록</button>
</div>

<div class="iframe-wrap">
    <div class="iframe-inner" id="iframe-container">
        <div class="iframe-scroll" id="iframe-scroll">
            <div class="iframe-spacer" id="iframe-spacer"></div>
        </div>
    </div>
</div>



<script>
/* ── 탭 정의 ── */
/* ※ 탭 1의 src에 Google Sheet 공유 embed URL을 입력하세요.
      예) https://docs.google.com/spreadsheets/d/YOUR_SHEET_ID/htmlembed          */
const TABS = [
    { src: "Main_Greeting.html",               type: "local", baseWidth: 1100 },
    { src: "Main_Reference.html",               type: "local", baseWidth: 1100 }
];
let currentTabIdx = 0;

/* ─ 콘텐츠 실제 높이(scale 적용 후 px) ─ */
function getScaledContentH(iframe, scale) {
    try {
        const doc = iframe.contentDocument || iframe.contentWindow?.document;
        if (doc && doc.body) return Math.ceil(doc.body.scrollHeight * scale);
    } catch(e) {}
    return Math.ceil(2400 * scale);
}

/* ─ iframe 스케일 & spacer 높이 설정 ─ */
function scaleIframes() {
    const container = document.getElementById('iframe-container');
    const spacer    = document.getElementById('iframe-spacer');
    const scrollEl  = document.getElementById('iframe-scroll');
    const scrollTop = scrollEl ? scrollEl.scrollTop : 0;

    document.querySelectorAll('#iframe-container iframe').forEach(f => {
        const idx       = parseInt(f.dataset.idx);
        const tab       = TABS[idx] ?? {};
        const baseWidth = tab.baseWidth ?? 980;
        const scale     = container.clientWidth / baseWidth;

        f.style.width     = baseWidth + 'px';
        f.style.height    = Math.ceil(container.clientHeight / scale) + 'px';
        f.style.transform = `scale(${scale})`;
        /* 스크롤 오프셋을 iframe top 이동으로 반영 */
        f.style.top  = (-scrollTop / scale) + 'px';
        f.style.left = '0px';

        /* 활성 탭의 spacer 높이 갱신 */
        if (idx === currentTabIdx && spacer) {
            const ch = getScaledContentH(f, scale);
            spacer.style.height = ch + 'px';
        }
    });
}
window.addEventListener('resize', scaleIframes);


/* ─ 스크롤 이벤트 → iframe top 오프셋 갱신 ─ */
function onScroll() {
    const container = document.getElementById('iframe-container');
    const scrollEl  = document.getElementById('iframe-scroll');
    if (!scrollEl) return;
    const scrollTop = scrollEl.scrollTop;
    document.querySelectorAll('#iframe-container iframe').forEach(f => {
        const idx       = parseInt(f.dataset.idx);
        const baseWidth = TABS[idx]?.baseWidth ?? 980;
        const scale     = container.clientWidth / baseWidth;
        f.style.top = (-scrollTop / scale) + 'px';
    });
}

/* ─ 사전 로딩 (Preload) ─ */
function preloadAll() {
    const container  = document.getElementById('iframe-container');
    const bar        = document.getElementById('preload-bar');
    const countEl    = document.getElementById('preload-count');
    const overlay    = document.getElementById('preload-overlay');
    const total      = TABS.length;

    /* 로컬 파일은 빠르게, Google Sheet는 여유 있게 */
    const PER_TIMEOUT_LOCAL = 8000;
    const PER_TIMEOUT_SHEET = 20000;

    let   loaded     = 0;
    let   dismissed  = false;

    countEl.textContent = `0 / ${total}`;

    /* ── 1단계: 모든 iframe을 src 없이 DOM에 삽입 (크기 확보) ── */
    const iframes = TABS.map((tab, idx) => {
        const iframe = document.createElement('iframe');
        iframe.dataset.idx     = idx;
        iframe.allow           = 'fullscreen';
        iframe.allowFullscreen = true;
        if (idx === 0) iframe.classList.add('active');
        container.appendChild(iframe);
        return iframe;
    });

    /* 크기 확보 후 스케일 적용 */
    scaleIframes();

    function onOneLoaded() {
        if (dismissed) return;
        loaded = Math.min(loaded + 1, total);
        bar.style.width     = Math.round((loaded / total) * 100) + '%';
        countEl.textContent = `${loaded} / ${total}`;
        if (loaded >= total) dismiss();
    }

    function dismiss() {
        if (dismissed) return;
        dismissed = true;
        bar.style.width     = '100%';
        countEl.textContent = `${total} / ${total}`;
        const dot = document.getElementById('preload-dot');
        if (dot) { dot.style.animation = 'none'; dot.style.opacity = '1'; dot.style.transform = 'scale(1)'; }
        setTimeout(() => {
            overlay.classList.add('fade-out');
            setTimeout(() => { if (overlay.parentNode) overlay.remove(); }, 520);
        }, 300);
    }

    /* ── 2단계: 각 탭 타입에 맞는 타임아웃으로 병렬 로딩 ── */
    TABS.forEach((tab, idx) => {
        const iframe  = iframes[idx];
        const timeout = tab.type === 'local' ? PER_TIMEOUT_LOCAL : PER_TIMEOUT_SHEET;

        let done = false;
        function markDone() {
            if (done) return;
            done = true;
            onOneLoaded();
        }
        iframe.addEventListener('load',  markDone);
        iframe.addEventListener('error', markDone);
        setTimeout(markDone, timeout);

        /* 캐시 방지: 로컬 파일은 타임스탬프 쿼리스트링 추가 */
        iframe.src = tab.type === 'local'
            ? tab.src + '?v=' + Date.now()
            : tab.src;
        /* 로드 완료 후 spacer 높이 재계산 */
        iframe.addEventListener('load', () => { scaleIframes(); }, { once: true });
    });

    /* 전체 안전망 */
    setTimeout(dismiss, 35000);
}

/* ── 탭 전환 ── */
function switchTab(idx) {
    currentTabIdx = idx;
    document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
    document.querySelector(`.tab-btn[data-idx="${idx}"]`).classList.add('active');
    document.querySelectorAll('#iframe-container iframe').forEach(f => {
        f.classList.toggle('active', parseInt(f.dataset.idx) === idx);
    });
    /* 스크롤 초기화 후 spacer & 위치 재계산 */
    const scrollEl = document.getElementById('iframe-scroll');
    if (scrollEl) scrollEl.scrollTop = 0;
    scaleIframes();
}

/* ── 초기화 ── */
document.addEventListener('DOMContentLoaded', () => {
    preloadAll();
});
</script>
<script src="common.js"></script>
<script>imtiRequireAuth(); imtiLoadNavbar("main_what_about.html");</script>
</body>
</html>
